  );
}

// ─────────────────────────────────────────────────────────────────────────
// REPORT — Gross Profit (from sales line cost basis)
// ─────────────────────────────────────────────────────────────────────────

function GrossProfitReport({ state, from, to }) {
  // Use weighted-avg cost (consistent with stock valuation) for COGS
  const sales = state.vouchers.filter(v => v.type === 'sales' && inRange(v.date, from, to));
  const rows = [];
  let totalSales = 0, totalCogs = 0;
  sales.forEach(v => {
    let saleAmt = 0, cogs = 0;
    v.lines?.forEach(l => {
      const amt = (Number(l.qty) || 0) * (Number(l.rate) || 0);
      saleAmt += amt;
      const avg = itemAvgCost(state, l.itemId, v.date);
      cogs += (Number(l.qty) || 0) * avg;
    });
    totalSales += saleAmt;
    totalCogs += cogs;
    rows.push({ id: v.id, no: v.voucherNo, date: v.date, party: v.partyName, sale: saleAmt, cogs, gp: saleAmt - cogs });
  });
  const gp = totalSales - totalCogs;
  const margin = totalSales ? (gp / totalSales) * 100 : 0;

  return (
    <div>
      <div className="flex justify-between items-baseline mb-3">
        <h3 className="display text-2xl">Gross Profit · Sales − COGS</h3>
        <div className="text-right">
          <div className="smcap text-mute">Gross Profit</div>
          <div className={`num text-2xl font-semibold ${gp >= 0 ? 'text-ok' : 'text-gold'}`}>₹ {inr(gp)}</div>
          <div className="num text-xs text-mute">{margin.toFixed(1)}% margin</div>
        </div>
      </div>
      <div className="grid grid-cols-3 gap-3 mb-5">
        <div className="bg-paper2/50 border border-rule p-3 rounded-sm"><div className="smcap text-mute">Sales</div><div className="num text-xl">₹ {inr(totalSales)}</div></div>
        <div className="bg-paper2/50 border border-rule p-3 rounded-sm"><div className="smcap text-mute">COGS (weighted avg)</div><div className="num text-xl">₹ {inr(totalCogs)}</div></div>
        <div className="bg-paper2/50 border border-rule p-3 rounded-sm"><div className="smcap text-mute">Gross Profit</div><div className={`num text-xl ${gp >= 0 ? 'text-ok' : 'text-gold'}`}>₹ {inr(gp)}</div></div>
      </div>
      <table className="ledger">
        <thead><tr><th>Date</th><th>Voucher</th><th>Customer</th><th style={{textAlign:'right'}}>Sale</th><th style={{textAlign:'right'}}>COGS</th><th style={{textAlign:'right'}}>GP</th><th style={{textAlign:'right'}}>%</th></tr></thead>
        <tbody>
          {rows.length === 0 && <tr><td colSpan="7" className="text-mute italic py-6 text-center">No sales</td></tr>}
          {rows.map(r => (
            <tr key={r.id}>
              <td className="num text-mute">{fmtDate(r.date)}</td>
              <td className="num">#{r.no}</td>
              <td>{r.party}</td>
              <td className="num text-right">₹ {inr(r.sale)}</td>
              <td className="num text-right text-mute">₹ {inr(r.cogs)}</td>
              <td className={`num text-right font-semibold ${r.gp >= 0 ? '' : 'text-gold'}`}>₹ {inr(r.gp)}</td>
              <td className="num text-right text-mute">{r.sale ? ((r.gp/r.sale)*100).toFixed(1) : '0'}%</td>
            </tr>
          ))}
        </tbody>
        {rows.length > 0 && (
          <tfoot>
            <tr className="font-semibold border-t-2 border-ink">
              <td colSpan="3" className="text-right">Total</td>
              <td className="num text-right">₹ {inr(totalSales)}</td>
              <td className="num text-right">₹ {inr(totalCogs)}</td>
              <td className="num text-right">₹ {inr(gp)}</td>
              <td className="num text-right">{margin.toFixed(1)}%</td>
            </tr>
          </tfoot>
        )}
      </table>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// REPORT — Receivables / Payables Ageing (FIFO bill-wise)
// ─────────────────────────────────────────────────────────────────────────

function Ageing({ state, asOf, type }) {
  const groupId = type === 'customer' ? 'g_sundry_dr' : 'g_sundry_cr';
  const parties = state.ledgers.filter(l => l.groupId === groupId);

  const partyData = parties.map(p => {
    const ag = billwiseAgeing(state, p.id, asOf, type);
    const total = ag.rows.reduce((s, b) => s + b.outstanding, 0);
    const buckets = { '0-30': 0, '31-60': 0, '61-90': 0, '91-180': 0, '180+': 0 };
    ag.rows.forEach(b => { buckets[b.bucket] += b.outstanding; });
    return { party: p, rows: ag.rows, onAccount: ag.onAccount, total, buckets };
  }).filter(d => d.total > 0.005 || d.onAccount > 0.005);

  partyData.sort((a, b) => b.total - a.total);

  const grandBuckets = { '0-30': 0, '31-60': 0, '61-90': 0, '91-180': 0, '180+': 0 };
  let grandTotal = 0;
  partyData.forEach(d => {
    grandTotal += d.total;
    Object.keys(grandBuckets).forEach(k => grandBuckets[k] += d.buckets[k]);
  });

  return (
    <div>
      <div className="flex justify-between items-baseline mb-3">
        <div>
          <h3 className="display text-2xl">{type === 'customer' ? 'Receivables Ageing' : 'Payables Ageing'}</h3>
          <div className="text-xs text-mute italic">as on {fmtDate(asOf)} · FIFO bill-by-bill · {partyData.length} parties</div>
        </div>
        <div className="text-right">
          <div className="smcap text-mute">Total {type === 'customer' ? 'Receivable' : 'Payable'}</div>
          <div className="num text-2xl font-semibold">₹ {inr(grandTotal)}</div>
        </div>
      </div>

      <div className="grid grid-cols-5 gap-2 mb-4">
        {['0-30', '31-60', '61-90', '91-180', '180+'].map(b => (
          <div key={b} className={`border border-rule rounded-sm p-2 ${grandBuckets[b] > 0 ? (b === '0-30' ? 'bg-ok/10' : b === '31-60' ? 'bg-paper2' : 'bg-gold/10') : 'bg-paper2/30'}`}>
            <div className="smcap text-mute text-[10px]">{b} days</div>
            <div className="num text-sm font-semibold">₹ {inr(grandBuckets[b])}</div>
            <div className="num text-[10px] text-mute">{grandTotal ? ((grandBuckets[b] / grandTotal) * 100).toFixed(1) : '0'}%</div>
          </div>
        ))}
      </div>

      <table className="ledger">
        <thead>
          <tr>
            <th>{type === 'customer' ? 'Customer' : 'Vendor'} / Bill</th>
            <th style={{width:'10%'}}>Bill Date</th>
            <th style={{width:'8%', textAlign:'right'}}>Days</th>
            <th style={{width:'10%', textAlign:'right'}}>0-30</th>
            <th style={{width:'10%', textAlign:'right'}}>31-60</th>
            <th style={{width:'10%', textAlign:'right'}}>61-90</th>
            <th style={{width:'10%', textAlign:'right'}}>91-180</th>
            <th style={{width:'10%', textAlign:'right'}}>180+</th>
            <th style={{width:'12%', textAlign:'right'}}>Total</th>
          </tr>
        </thead>
        <tbody>
          {partyData.length === 0 && <tr><td colSpan="9" className="text-mute italic py-6 text-center">No outstanding {type === 'customer' ? 'receivables' : 'payables'}</td></tr>}
          {partyData.map(d => (
            <React.Fragment key={d.party.id}>
              <tr className="bg-paper2/40">
                <td className="font-semibold">{d.party.name}{d.party.contact && <span className="text-xs text-mute font-normal ml-2">{d.party.contact}</span>}</td>
                <td></td>
                <td></td>
                {['0-30', '31-60', '61-90', '91-180', '180+'].map(b => (
                  <td key={b} className="num text-right font-semibold">{d.buckets[b] > 0 ? inr(d.buckets[b]) : ''}</td>
                ))}
                <td className="num text-right font-semibold">₹ {inr(d.total)}</td>
              </tr>
              {d.rows.map(b => (
                <tr key={b.id} className="text-xs">
                  <td className="pl-6 text-mute">Bill #{b.voucherNo}</td>
                  <td className="num text-mute">{fmtDate(b.date)}</td>
                  <td className="num text-right text-mute">{b.daysOld}</td>
                  {['0-30', '31-60', '61-90', '91-180', '180+'].map(bk => (
                    <td key={bk} className="num text-right text-mute">{bk === b.bucket ? inr(b.outstanding) : ''}</td>
                  ))}
                  <td className="num text-right">₹ {inr(b.outstanding)}</td>
                </tr>
              ))}
              {d.onAccount > 0 && (
                <tr className="text-xs">
                  <td className="pl-6 text-mute italic">On Account ({type === 'customer' ? 'advance received' : 'advance paid'})</td>

        {partyData.length > 0 && (
          <tfoot>
            <tr className="font-semibold border-t-2 border-ink">
              <td colSpan="3" className="text-right">Grand Total</td>
              {['0-30', '31-60', '61-90', '91-180', '180+'].map(b => (
                <td key={b} className="num text-right">{grandBuckets[b] > 0 ? inr(grandBuckets[b]) : ''}</td>
              ))}

            </tr>
          </tfoot>
        )}
      </table>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// REPORT — Cash Flow (movements through Cash + Bank ledgers)
// ─────────────────────────────────────────────────────────────────────────

function CashFlow({ state, from, to }) {
  const cashLedgers = state.ledgers.filter(l =>
    l.groupId === 'g_cash' || l.groupId === 'g_bank' || l.groupId === 'g_bank_od'
  );
  const cashLedgerIds = cashLedgers.map(l => l.id);
  const flows = [];
  state.ledgerEntries.forEach(e => {
    if (!inRange(e.date, from, to)) return;
    if (!cashLedgerIds.includes(e.ledgerId)) return;
    flows.push(e);
  });
  flows.sort((a, b) => a.date.localeCompare(b.date));
  let opening = 0;
  cashLedgers.forEach(l => {
    const g = state.groups.find(x => x.id === l.groupId);
    const naturalDr = g.nature === 'asset';
    let b = (naturalDr ? 1 : -1) * (Number(l.openingBalance) || 0);
    state.ledgerEntries.forEach(e => {
      if (e.ledgerId !== l.id) return;
      if (e.date < from) b += (Number(e.dr) || 0) - (Number(e.cr) || 0);
    });
    opening += b;
  });
  const inflow = flows.reduce((s, e) => s + (Number(e.dr) || 0), 0);
  const outflow = flows.reduce((s, e) => s + (Number(e.cr) || 0), 0);
  const closing = opening + inflow - outflow;

  // Build daily chart data
  const dailyMap = {};
  flows.forEach(e => {
    const d = e.date;
    if (!dailyMap[d]) dailyMap[d] = { date: fmtDate(d), inflow: 0, outflow: 0 };
    dailyMap[d].inflow  += Number(e.dr) || 0;
    dailyMap[d].outflow += Number(e.cr) || 0;
  });
  const chartData = Object.values(dailyMap).sort((a, b) => a.date.localeCompare(b.date));

  const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

  return (
    <div>
      <div className="flex justify-between items-baseline mb-3">
        <div>
          <h3 className="display text-2xl">Cash Flow Statement</h3>
          <div className="text-xs text-mute italic">{fmtDate(from)} to {fmtDate(to)} · cash + bank</div>
        </div>
      </div>
      <div className="grid grid-cols-4 gap-3 mb-5">
        <div className="bg-paper2/50 border border-rule p-3 rounded-sm"><div className="smcap text-mute">Opening</div><div className="num text-lg">₹ {inr(opening)}</div></div>
        <div className="bg-paper2/50 border border-rule p-3 rounded-sm"><div className="smcap text-mute">Inflow</div><div className="num text-lg text-ok">+₹ {inr(inflow)}</div></div>
        <div className="bg-paper2/50 border border-rule p-3 rounded-sm"><div className="smcap text-mute">Outflow</div><div className="num text-lg text-gold">−₹ {inr(outflow)}</div></div>
        <div className="bg-paper2/50 border border-rule p-3 rounded-sm"><div className="smcap text-mute">Closing</div><div className="num text-lg font-semibold">₹ {inr(closing)}</div></div>
      </div>
      {chartData.length > 0 && (
        <div className="mb-6 border border-rule rounded-sm p-3 bg-paper2/20">
          <div className="smcap text-mute mb-2">Daily Cash Movement</div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={chartData} margin={{ top: 4, right: 8, left: 8, bottom: 4 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" />
              <XAxis dataKey="date" tick={{ fontSize: 10 }} />
              <YAxis tickFormatter={v => `₹${(v/1000).toFixed(0)}k`} tick={{ fontSize: 10 }} width={55} />
              <Tooltip formatter={(val) => `₹ ${inr(val)}`} contentStyle={{ fontSize: 12 }} />
              <Legend wrapperStyle={{ fontSize: 12 }} />
              <Bar dataKey="inflow"  name="Inflow"  fill="#16a34a" radius={[2,2,0,0]} />
              <Bar dataKey="outflow" name="Outflow" fill="#ef4444" radius={[2,2,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      )}
      <table className="ledger">
        <thead><tr><th>Date</th><th>Account</th><th>Narration</th><th style={{textAlign:'right'}}>Inflow</th><th style={{textAlign:'right'}}>Outflow</th></tr></thead>
        <tbody>
          {flows.length === 0 && <tr><td colSpan="5" className="text-mute italic py-6 text-center">No cash movements</td></tr>}
          {flows.map(e => {
            const l = state.ledgers.find(x => x.id === e.ledgerId);
            return (
              <tr key={e.id}>
                <td className="num text-mute">{fmtDate(e.date)}</td>
                <td>{l?.name}</td>
                <td className="text-sm text-ink2">{e.narration}</td>
                <td className="num text-right text-ok">{e.dr ? '+₹ ' + inr(e.dr) : ''}</td>
                <td className="num text-right text-gold">{e.cr ? '−₹ ' + inr(e.cr) : ''}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// REPORT — Vendor Analysis
// ─────────────────────────────────────────────────────────────────────────

function VendorAnalysisReport({ state, from, to }) {
  const [selectedItemId, setSelectedItemId] = useState('');

  // ── Vendor summary (purchases only) ──────────────────────────────────────
  const tally = {};
  state.vouchers.filter(v => v.type === 'purchase' && inRange(v.date, from, to)).forEach(v => {
    if (!tally[v.partyId]) tally[v.partyId] = { name: v.partyName, count: 0, amount: 0 };
    tally[v.partyId].count += 1;
    tally[v.partyId].amount += v.grand || 0;
  });
  const rows = Object.keys(tally).map(id => ({
    id, ...tally[id], balance: ledgerBalance(state, id),
  })).sort((a, b) => b.amount - a.amount);
  const total = rows.reduce((s, r) => s + r.amount, 0);

  // ── Item comparison data ──────────────────────────────────────────────────
  // Build list of items that appear in purchase vouchers in the date range
  const purchasedItemIds = new Set();
  state.vouchers.filter(v => v.type === 'purchase' && inRange(v.date, from, to)).forEach(v => {
    (v.lines || []).forEach(l => { if (l.itemId) purchasedItemIds.add(l.itemId); });
  });
  const purchasedItems = state.items.filter(it => purchasedItemIds.has(it.id));

  // Build comparison rows for selected item
  const compRows = [];
  if (selectedItemId) {
    state.vouchers.filter(v => v.type === 'purchase' && inRange(v.date, from, to)).forEach(v => {
      (v.lines || []).filter(l => l.itemId === selectedItemId).forEach(l => {
        compRows.push({
          date: v.date,
          dateLabel: fmtDate(v.date),
          vendor: v.partyName || '—',
          qty: Number(l.qty) || 0,
          rate: Number(l.rate) || 0,
          amount: (Number(l.qty) || 0) * (Number(l.rate) || 0),
        });
      });
    });
    compRows.sort((a, b) => a.date.localeCompare(b.date));
  }

  // Assign a color per vendor for the chart
  const COLORS = ['#6366f1','#16a34a','#ef4444','#f59e0b','#06b6d4','#8b5cf6','#ec4899','#14b8a6'];
  const vendorColorMap = {};
  const allVendors = [...new Set(compRows.map(r => r.vendor))];
  allVendors.forEach((v, i) => { vendorColorMap[v] = COLORS[i % COLORS.length]; });

  const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ScatterChart, Scatter } = Recharts;

  const selectedItem = state.items.find(it => it.id === selectedItemId);

  return (
    <div>

        </div>

      <table className="ledger mb-8">
        <thead><tr><th>Vendor</th><th style={{textAlign:'right'}}>Bills</th><th style={{textAlign:'right'}}>Total</th><th style={{textAlign:'right'}}>%</th><th style={{textAlign:'right'}}>Outstanding</th></tr></thead>
        <tbody>
          {rows.length === 0 && <tr><td colSpan="5" className="text-mute italic py-6 text-center">No purchases in range</td></tr>}
          {rows.map(r => (
            <tr key={r.id}>
              <td className="font-medium">{r.name}</td>
              <td className="num text-right">{r.count}</td>
              <td className="num text-right">₹ {inr(r.amount)}</td>
              <td className="num text-right text-mute">{total ? ((r.amount/total)*100).toFixed(1) : '0'}%</td>

            </table>

            {/* Best price callout */}
            {allVendors.length > 1 && (() => {
              const byVendor = {};
              compRows.forEach(r => {
                if (!byVendor[r.vendor]) byVendor[r.vendor] = [];
                byVendor[r.vendor].push(r.rate);
              });
              const minByVendor = Object.entries(byVendor).map(([v, rates]) => ({
                vendor: v, min: Math.min(...rates)
              })).sort((a,b)=>a.min-b.min);
              const best = minByVendor[0];
              return (
                <div className="mt-3 text-xs bg-ok/5 border border-ok/20 rounded-sm px-3 py-2 text-ok">
                  ✓ Lowest purchase price: <strong>{best.vendor}</strong> — ₹ {inr(best.min)} per unit
                </div>
              );
            })()}
          </>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// REPORT — Ratio Analysis
// ─────────────────────────────────────────────────────────────────────────

function RatioAnalysis({ state, from, to, asOf }) {
  const fig = profitLossFigures(state, from, to);
  const sums = summarizeByGroupForBS(state, asOf);
  const closingStock = inventoryValue(state, asOf);

  // Aggregate balance sheet items
  const bankBal = sums['g_bank'].total;
  const cashBal = sums['g_cash'].total;
  const debtors = sums['g_sundry_dr'].total;
  const creditors = sums['g_sundry_cr'].total;
  const bankOd = sums['g_bank_od'].total;
  const currLiab = sums['g_curr_liab'].total + creditors + bankOd + sums['g_duties'].total + sums['g_provisions'].total;
  const currAssets = sums['g_curr_assets'].total + cashBal + bankBal + debtors + closingStock;
  const fixedAssets = sums['g_fixed_assets'].total;
  const totalAssets = currAssets + fixedAssets;
  const capital = sums['g_capital'].total + sums['g_reserves'].total + fig.netProfit;
  const totalLiab = capital + currLiab;

  // Ratios — guard divisions
  const safe = (n, d) => d !== 0 ? n / d : null;
  const fmtR = (r, suffix = '') => r === null ? '—' : (r.toFixed(2) + suffix);
  const fmtP = (r) => r === null ? '—' : ((r * 100).toFixed(1) + '%');

  const currentRatio = safe(currAssets, currLiab);
  const quickRatio = safe(currAssets - closingStock, currLiab);
  const cashRatio = safe(cashBal + bankBal, currLiab);
  const gpMargin = safe(fig.grossProfit, fig.sales);
  const npMargin = safe(fig.netProfit, fig.sales);
  const debtToEquity = safe(currLiab, capital);
  const inventoryTurnover = safe(fig.sales - fig.grossProfit, closingStock); // COGS / closing stock
  const receivableDays = (() => {
    if (fig.sales <= 0) return null;
    const days = daysBetween(from, to) + 1;
    return safe(debtors * days, fig.sales);
  })();
  const payableDays = (() => {
    if (fig.purchases <= 0) return null;
    const days = daysBetween(from, to) + 1;
    return safe(creditors * days, fig.purchases);
  })();

  const rows = [
    { group: 'Liquidity', ratios: [
      { name: 'Current Ratio', value: fmtR(currentRatio), formula: 'Current Assets ÷ Current Liabilities', healthy: currentRatio !== null && currentRatio >= 1.5 ? 'good' : currentRatio !== null && currentRatio >= 1 ? 'ok' : 'low' },
      { name: 'Quick Ratio (Acid Test)', value: fmtR(quickRatio), formula: '(Current Assets − Stock) ÷ Current Liabilities', healthy: quickRatio !== null && quickRatio >= 1 ? 'good' : 'low' },
      { name: 'Cash Ratio', value: fmtR(cashRatio), formula: '(Cash + Bank) ÷ Current Liabilities' },
    ]},
    { group: 'Profitability', ratios: [
      { name: 'Gross Profit Margin', value: fmtP(gpMargin), formula: 'Gross Profit ÷ Sales' },
      { name: 'Net Profit Margin', value: fmtP(npMargin), formula: 'Net Profit ÷ Sales' },
    ]},
    { group: 'Activity / Efficiency', ratios: [
      { name: 'Inventory Turnover', value: fmtR(inventoryTurnover, 'x'), formula: 'COGS ÷ Closing Stock' },
      { name: 'Avg Receivable Days', value: fmtR(receivableDays), formula: 'Debtors × Days ÷ Sales' },
      { name: 'Avg Payable Days', value: fmtR(payableDays), formula: 'Creditors × Days ÷ Purchases' },
    ]},
    { group: 'Solvency', ratios: [
      { name: 'Debt-to-Equity', value: fmtR(debtToEquity), formula: 'Outside Liab ÷ Owners Equity' },
    ]},
  ];

  return (
    <div>
      <div className="flex justify-between items-baseline mb-3">
        <div>
          <h3 className="display text-2xl">Ratio Analysis</h3>
          <div className="text-xs text-mute italic">P&L: {fmtDate(from)} to {fmtDate(to)} · BS as on {fmtDate(asOf)}</div>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-3 mb-5">
        <div className="bg-paper2/50 border border-rule p-3 rounded-sm">
          <div className="smcap text-mute">Working Capital</div>
          <div className={`num text-xl ${currAssets - currLiab >= 0 ? '' : 'text-gold'}`}>₹ {inr(currAssets - currLiab)}</div>
          <div className="text-xs text-mute">Current Assets − Current Liabilities</div>
        </div>
        <div className="bg-paper2/50 border border-rule p-3 rounded-sm">
          <div className="smcap text-mute">Owners Equity</div>
          <div className="num text-xl">₹ {inr(capital)}</div>
          <div className="text-xs text-mute">Capital + Reserves + Profit</div>
        </div>
        <div className="bg-paper2/50 border border-rule p-3 rounded-sm">
          <div className="smcap text-mute">Total Assets</div>
          <div className="num text-xl">₹ {inr(totalAssets)}</div>
          <div className="text-xs text-mute">Fixed + Current</div>
        </div>
      </div>

      {rows.map(grp => (
        <div key={grp.group} className="mb-4">
          <h4 className="smcap text-wax mb-1 border-b border-rule pb-1">{grp.group}</h4>
          <table className="ledger">
            <thead>
              <tr><th>Ratio</th><th>Formula</th><th style={{textAlign:'right', width:'15%'}}>Value</th></tr>
            </thead>
            <tbody>
              {grp.ratios.map((r, i) => (
                <tr key={i}>
                  <td className="font-medium">{r.name}</td>
                  <td className="text-xs text-mute italic">{r.formula}</td>
                  <td className={`num text-right font-semibold ${r.healthy === 'good' ? 'text-ok' : r.healthy === 'low' ? 'text-gold' : ''}`}>{r.value}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ))}
      <div className="text-xs text-mute italic mt-3">
        Ratios are derived from posted vouchers and weighted-avg inventory valuation.  A few may show "—" if the denominator is zero (e.g. no sales in this period).
      </div>
    </div>
  );
}

function LoginScreen({ onError }) {
  const [email, setEmail] = useState('');
  const [pwd, setPwd] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const submit = async (e) => {
    e && e.preventDefault();
    if (!email.trim() || !pwd) { setErr('Enter username and password'); return; }
    if (!cloudReady()) { setErr('Cloud connection unavailable. Check internet.'); return; }
    setErr(''); setBusy(true);
    try {
      await fbAuth().signInWithEmailAndPassword(email.trim(), pwd);
      // onAuthStateChanged in App takes over
    } catch (e2) {
      const code = (e2 && e2.code) || '';
      let msg = 'Sign in failed';
      if (code === 'auth/invalid-email')              msg = 'Invalid email format';
      else if (code === 'auth/user-not-found')        msg = 'No such user';
      else if (code === 'auth/wrong-password' ||
               code === 'auth/invalid-credential' ||
               code === 'auth/invalid-login-credentials') msg = 'Wrong email or password';
      else if (code === 'auth/too-many-requests')     msg = 'Too many attempts — wait a minute';
      else if (code === 'auth/network-request-failed') msg = 'No internet';
      setErr(msg);
      setBusy(false);
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-4">
      <div style={{ position: 'fixed', top: 16, right: 16 }} className="no-print">
        <DarkModeToggle />
      </div>

          <img src={BRAND_LOGO_DATA_URL} alt={BUSINESS_NAME} className="brand-logo-lg mb-3" />

        </div>

          <div>
            <label className="smcap text-mute block mb-1">Username</label>
            <input
              type="text" autoFocus autoComplete="username" className="w-full"
              value={email} onChange={(e) => setEmail(e.target.value)}
              disabled={busy}
            />
          </div>
          <div>
            <label className="smcap text-mute block mb-1">Password</label>
            <input
              type="password" autoComplete="current-password" className="w-full"
              value={pwd} onChange={(e) => setPwd(e.target.value)}

function BackupsModal({ open, onClose, onRestore, onView, toast }) {
  const [snaps, setSnaps] = useState(loadSnapshots());

  useEffect(() => { if (open) setSnaps(loadSnapshots()); }, [open]);

  const refresh = () => setSnaps(loadSnapshots());

  const handlePin = (date, pinned) => { pinSnapshot(date, pinned); refresh(); };
  const handleDelete = (date) => {
    if (!confirm(`Delete snapshot from ${fmtDate(date)}?`)) return;
    deleteSnapshot(date); refresh(); toast('Snapshot deleted');
  };
  const handleDownload = (snap) => {
    try {
      const blob = new Blob([snap.payload], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `nds-erp-${snap.date}.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) { toast('Download failed'); }
  };
  const handleView = (snap) => {
    try { onView(JSON.parse(snap.payload), snap.date); }
    catch (e) { toast('Snapshot corrupted'); }
  };
  const handleRestore = (snap) => {
    if (!confirm(`Restore the books to their state on ${fmtDate(snap.date)}?\n\nThis will overwrite current data on this device AND in the cloud. (Today's snapshot is taken automatically before this happens.)`)) return;
    if (!confirm('Really restore? Last chance to cancel.')) return;
    try {
      const data = JSON.parse(snap.payload);
      onRestore(normalizeState(data));
      toast(`Restored to ${fmtDate(snap.date)}`);
      onClose();
    } catch (e) { toast('Restore failed — snapshot corrupted'); }
  };

  return (
    <Modal open={open} onClose={onClose} title="Daily Snapshots — In-app history"
           footer={<button onClick={onClose} className="btn btn-ghost">Close</button>}>
      {snaps.length === 0 ? (
        <p className="text-mute italic text-sm py-6 text-center">
          No snapshots yet. One is taken automatically each day on the first save.
        </p>
      ) : (
        <>
          <table className="ledger">
            <thead>
              <tr>
                <th>Date</th>
                <th style={{textAlign:'right'}}>Vouchers</th>
                <th style={{textAlign:'right'}}>Sales</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {snaps.map(s => (
                <tr key={s.date}>
                  <td>
                    <span className="num">{fmtDate(s.date)}</span>
                    {s.pinned && <span className="chip ml-2" title="Pinned"
                      style={{ background: 'rgba(160,122,42,0.18)', color: '#7a5a1a' }}>★ pinned</span>}
                  </td>
                  <td className="num text-right">{s.voucherCount}</td>
                  <td className="num text-right">₹ {inr(s.totalSales)}</td>
                  <td className="text-right whitespace-nowrap">
                    <button className="btn btn-ghost text-[10px] px-2 py-0.5 mr-1" onClick={() => handleView(s)}>View</button>
                    <button className="btn btn-ghost text-[10px] px-2 py-0.5 mr-1" onClick={() => handleDownload(s)}>⬇</button>
                    <button className="btn btn-ghost text-[10px] px-2 py-0.5 mr-1" onClick={() => handlePin(s.date, !s.pinned)}>{s.pinned ? '☆' : '★'}</button>
                    <button className="btn btn-ghost text-[10px] px-2 py-0.5 mr-1" onClick={() => handleRestore(s)}>Restore</button>
                    <button className="btn btn-danger text-[10px] px-2 py-0.5" onClick={() => handleDelete(s.date)}>×</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </>
      )}
    </Modal>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// APP SHELL
// ──────────────────────────────────────────────────────────────────────────

function App() {
  const [state, setStateRaw] = useState(loadStateLocal);
  const [screen, setScreen] = useState('SALES');
  const [toastMsg, setToastMsg] = useState('');
  const [receiptPrefill, setReceiptPrefill] = useState(null);
  const [reportJumpTo, setReportJumpTo] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showBackups, setShowBackups] = useState(false);
  const [viewingSnap, setViewingSnap] = useState(null); // { snapshot, date }

  // Auth: 'loading' | 'login' | 'ready' | 'local-fallback'
  const [authPhase, setAuthPhase] = useState(() => cloudReady() ? 'loading' : 'local-fallback');
  const [user, setUser] = useState(null);

  // Sync: 'idle' | 'syncing' | 'offline' | 'error' | 'local'
  const [syncStatus, setSyncStatus] = useState(cloudReady() ? 'syncing' : 'local');
  const [lastSyncAt, setLastSyncAt] = useState(0);
  const [autoDownload, setAutoDownload] = useState(() => localStorage.getItem(AUTO_DL_PREF_KEY) === '1');

  const debounceRef = useRef(null);
  const lastWrittenPayloadRef = useRef(null);  // Last payload we wrote to Firestore
  const lastReceivedPayloadRef = useRef(null); // Last payload received from listener
  const initializedRef = useRef(false);

  const toast = useCallback((m) => setToastMsg(m), []);

  // ── Auth listener ────────────────────────────────────────────────────────
  useEffect(() => {
    if (!cloudReady()) return;
    const unsub = fbAuth().onAuthStateChanged((u) => {
      setUser(u);
      setAuthPhase(u ? 'ready' : 'login');
    }, (err) => {
      console.error('Auth listener error:', err);
      setAuthPhase('local-fallback');
    });
    return unsub;
  }, []);

  // ── Firestore real-time subscription ─────────────────────────────────────
  useEffect(() => {
    if (!cloudReady() || !user) return;
    const ref = fbDB().doc(FIRESTORE_DOC_PATH);

    const unsub = ref.onSnapshot(
      (snap) => {
        const fromCache = snap.metadata && snap.metadata.fromCache;
        if (snap.exists) {
          const data = snap.data();
          const payload = data && data.payload;
          if (payload) {
            // Skip if it's our own write echoing back
            if (lastWrittenPayloadRef.current === payload) {
              setSyncStatus(fromCache ? 'offline' : 'idle');
              setLastSyncAt(Date.now());
              initializedRef.current = true;
              return;
            }
            // Skip if identical to what we already have
            if (lastReceivedPayloadRef.current === payload) {
              setSyncStatus(fromCache ? 'offline' : 'idle');
              return;
            }
            try {
              const remote = normalizeState(JSON.parse(payload));
              lastReceivedPayloadRef.current = payload;
              setStateRaw(remote);
              saveStateLocal(remote);
              captureSnapshotIfNeeded(remote);
              if (!initializedRef.current) {
                triggerDailyAutoDownload(remote);
                initializedRef.current = true;
              }
            } catch (e) {
              console.error('Failed to parse Firestore payload', e);
            }
          }
        } else {
          // First time — push current local state to seed Firestore
          if (!initializedRef.current) {
            const seed = JSON.stringify(state);
            ref.set({
              payload: seed,
              updatedAt: fbNS().firestore.FieldValue.serverTimestamp(),
              updatedBy: user.email || 'unknown',
              version: 1,
            }).then(() => {
              lastWrittenPayloadRef.current = seed;
              initializedRef.current = true;
            }).catch(err => console.error('Seed write failed:', err));
          }
        }
        setSyncStatus(fromCache ? 'offline' : 'idle');
        setLastSyncAt(Date.now());
      },
      (err) => {
        console.error('Firestore listen error:', err);
        setSyncStatus('error');
      }
    );
    return unsub;
  }, [user]); // eslint-disable-line

  // ── setState — write-through to local + (debounced) Firestore ────────────
  const setState = useCallback((s) => {
    setStateRaw(prev => {
      const next = typeof s === 'function' ? s(prev) : s;
      // Mirror to localStorage immediately (instant cache, offline survival)
      saveStateLocal(next);
      // Capture daily snapshot if it's a new day
      captureSnapshotIfNeeded(next);

      if (cloudReady() && user) {
        setSyncStatus('syncing');
        if (debounceRef.current) clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(() => {
          const payload = JSON.stringify(next);
          // Avoid no-op writes
          if (lastWrittenPayloadRef.current === payload) {
            setSyncStatus('idle');
            return;
          }
          fbDB().doc(FIRESTORE_DOC_PATH).set({
            payload,
            updatedAt: fbNS().firestore.FieldValue.serverTimestamp(),
            updatedBy: (user && user.email) || 'unknown',
            version: 1,
          }).then(() => {
            lastWrittenPayloadRef.current = payload;
            setSyncStatus('idle');
            setLastSyncAt(Date.now());
          }).catch(err => {
            console.error('Firestore write failed:', err);
            setSyncStatus('error');
          });
        }, 500);
      }
      return next;
    });
  }, [user]);

  // ── F-key navigation, global ─────────────────────────────────────────────
  useEffect(() => {
    const onKey = (e) => {
      const fkeys = { 'F1': 'PURCHASES', 'F2': 'SALES', 'F3': 'PAYMENT', 'F4': 'RECEIPT', 'F5': 'JOURNAL', 'F6': 'REPORTS', 'F7': 'MASTERS', 'F8': 'REPORTS' };
      if (fkeys[e.key]) {
        e.preventDefault();
        if (authPhase === 'login' || authPhase === 'loading') return;
        if (viewingSnap) return;
        setScreen(fkeys[e.key]);
        if (e.key === 'F8') setReportJumpTo('daybook');
        if (fkeys[e.key] !== 'RECEIPT') setReceiptPrefill(null);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [authPhase, viewingSnap]);

  const switchScreen = (key) => {
    setScreen(key);
    if (key !== 'RECEIPT') setReceiptPrefill(null);
  };

  const gotoReceipt = (salesVoucher) => {
    setReceiptPrefill(salesVoucher);
    setScreen('RECEIPT');
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `nds-erp-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Exported');
  };

  // ── Excel export — multi-sheet workbook (humans only, not re-importable) ──
  const exportExcel = () => {
    if (typeof XLSX === 'undefined') { toast('Excel library not loaded — check internet and reload'); return; }
    try {
      const wb = XLSX.utils.book_new();
      const groupName = (gid) => state.groups.find(g => g.id === gid)?.name || '';
      const ledgerName = (lid) => state.ledgers.find(l => l.id === lid)?.name || '';
      const itemName = (iid) => state.items.find(i => i.id === iid)?.name || '';

      // 1) Vouchers
      const voucherRows = state.vouchers.map(v => ({
        'Date': fmtDate(v.date),
        'Type': v.type,
        'Voucher #': v.voucherNo,
        'Party': v.partyName || '',
        'Address': v.address || '',
        'Contact': v.contact || '',
        'Vehicle': v.vehicle || '',
        'Subtotal': Number(v.total) || 0,
        'Other Charges': Number(v.charges) || 0,
        'Grand Total': Number(v.grand) || 0,
        'Narration': v.narration || '',
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(voucherRows), 'Vouchers');

      // 2) Voucher Lines (one row per item line across all vouchers)
      const lineRows = [];
      state.vouchers.forEach(v => {
        (v.lines || []).forEach(l => {
          const item = state.items.find(i => i.id === l.itemId);
          const unit = item ? state.units.find(u => u.id === item.unitId) : null;
          lineRows.push({
            'Date': fmtDate(v.date),
            'Type': v.type,
            'Voucher #': v.voucherNo,
            'Party': v.partyName || '',
            'Item': item?.name || '',
            'Qty': Number(l.qty) || 0,
            'Unit': unit?.name || '',
            'Rate': Number(l.rate) || 0,
            'Line Total': (Number(l.qty) || 0) * (Number(l.rate) || 0),
          });
        });
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(lineRows), 'Voucher Lines');

      // 3) Ledgers with current balance
      const ledgerRows = state.ledgers.map(l => {
        const bal = ledgerBalance(state, l.id);
        return {
          'Ledger': l.name,
          'Group': groupName(l.groupId),
          'Opening Balance': Number(l.openingBalance) || 0,
          'Current Balance': bal.amount,
          'Side': bal.amount > 0 ? bal.side.toUpperCase() : '',
          'Contact': l.contact || '',
          'Address': l.address || '',
        };
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ledgerRows), 'Ledgers');

      // 4) Items with stock
      const itemRows = state.items.map(it => {
        const unit = state.units.find(u => u.id === it.unitId);
        const sup = state.superCategories.find(s => s.id === it.superCategoryId);
        const sub = state.subCategories.find(s => s.id === it.subCategoryId);
        return {
          'Item': it.name,
          'Unit': unit?.name || '',
          'Super Category': sup?.name || '',
          'Sub Category': sub?.name || '',
          'Opening Stock': Number(it.openingBalance) || 0,
          'Current Stock': stockBalance(state, it.id),
          'Last Sale Price': Number(it.lastSalePrice) || 0,
          'Last Purchase Price': Number(it.lastPurchasePrice) || 0,
        };
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(itemRows), 'Items');

      // 5) Stock Entries
      const stockRows = state.stockEntries.map(e => ({
        'Date': fmtDate(e.date),
        'Item': itemName(e.itemId),
        'In': Number(e.in) || 0,
        'Out': Number(e.out) || 0,
        'Rate': Number(e.rate) || 0,
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(stockRows), 'Stock Entries');

      // 6) Ledger Entries (the double-entry record)
      const entryRows = state.ledgerEntries.map(e => ({
        'Date': fmtDate(e.date),
        'Ledger': ledgerName(e.ledgerId),
        'Dr': Number(e.dr) || 0,
        'Cr': Number(e.cr) || 0,
        'Narration': e.narration || '',
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(entryRows), 'Ledger Entries');

      // 7) Summary cover sheet
      const totalSales = state.vouchers.filter(v => v.type === 'sales').reduce((s, v) => s + (Number(v.grand) || 0), 0);
      const totalPurch = state.vouchers.filter(v => v.type === 'purchase').reduce((s, v) => s + (Number(v.grand) || 0), 0);
      const summary = [
        { Field: 'Business', Value: state.meta.businessName },
        { Field: 'Exported on', Value: fmtDate(todayISO()) + ' (IST)' },
        { Field: 'FY Start', Value: fmtDate(state.meta.fyStart) },
        { Field: '', Value: '' },
        { Field: 'Total Vouchers', Value: state.vouchers.length },
        { Field: 'Total Sales (₹)', Value: totalSales },
        { Field: 'Total Purchases (₹)', Value: totalPurch },
        { Field: 'Ledgers', Value: state.ledgers.length },
        { Field: 'Items', Value: state.items.length },
      ];
      const summarySheet = XLSX.utils.json_to_sheet(summary);
      XLSX.utils.book_append_sheet(wb, summarySheet, 'Summary');

      XLSX.writeFile(wb, `nds-erp-${todayISO()}.xlsx`);
      toast('Excel exported');
    } catch (e) {
      console.error('Excel export failed', e);
      toast('Excel export failed');
    }
  };

  // ── PDF export — printable summary report (humans only, not re-importable) ──
  const exportPDF = () => {
    const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
    if (!jsPDFCtor) { toast('PDF library not loaded — check internet and reload'); return; }
    try {
      const doc = new jsPDFCtor({ unit: 'pt', format: 'a4' });
      const W = doc.internal.pageSize.getWidth();
      let y = 36;

      // Header
      doc.setFont('helvetica', 'bold'); doc.setFontSize(20); doc.setTextColor(27, 110, 132);
      doc.text(state.meta.businessName || BUSINESS_NAME, 36, y);
      doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(100);
      y += 18;
      doc.text(`Books export · ${fmtDateLong(todayISO())}`, 36, y);
      y += 6;
      doc.setDrawColor(27, 110, 132); doc.setLineWidth(2);
      doc.line(36, y, W - 36, y);
      y += 16;

      // Summary block
      const totalSales = state.vouchers.filter(v => v.type === 'sales').reduce((s, v) => s + (Number(v.grand) || 0), 0);
      const totalPurch = state.vouchers.filter(v => v.type === 'purchase').reduce((s, v) => s + (Number(v.grand) || 0), 0);

      doc.setTextColor(30); doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
      doc.text('Summary', 36, y); y += 6;
      doc.autoTable({
        startY: y,
        theme: 'plain',
        styles: { font: 'helvetica', fontSize: 10, cellPadding: 4 },
        body: [
          ['FY Start',          fmtDate(state.meta.fyStart) || '—'],
          ['Total Vouchers',    String(state.vouchers.length)],
          ['Total Sales (Rs.)', inr(totalSales)],
          ['Total Purchases (Rs.)', inr(totalPurch)],
          ['Ledgers',           String(state.ledgers.length)],
          ['Items',             String(state.items.length)],
        ],
      });
      y = doc.lastAutoTable.finalY + 18;

      // Recent vouchers (last 30)
      const recentVouchers = [...state.vouchers].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 30);
      doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
      doc.text('Recent Vouchers (most recent 30)', 36, y); y += 4;
      doc.autoTable({
        startY: y + 4,
        head: [['Date', 'Type', '#', 'Party', 'Amount (Rs.)']],
        body: recentVouchers.map(v => [
          fmtDate(v.date),
          v.type,
          String(v.voucherNo),
          (v.partyName || '').slice(0, 32),
          inr(v.grand || 0),
        ]),
        styles:    { font: 'helvetica', fontSize: 9, cellPadding: 4 },
        headStyles:{ fillColor: [27, 110, 132], textColor: 245, halign: 'left' },
        columnStyles: { 4: { halign: 'right' } },
      });
      y = doc.lastAutoTable.finalY + 18;

      // Stock summary
      const stockRows = state.items
        .map(it => {
          const unit = state.units.find(u => u.id === it.unitId);
          return [it.name, unit?.name || '', String(stockBalance(state, it.id))];
        })
        .sort((a, b) => Number(b[2]) - Number(a[2]));
      if (stockRows.length > 0) {
        doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
        doc.text('Stock Summary', 36, y); y += 4;
        doc.autoTable({
          startY: y + 4,
          head: [['Item', 'Unit', 'Stock']],
          body: stockRows,
          styles:    { font: 'helvetica', fontSize: 9, cellPadding: 4 },
          headStyles:{ fillColor: [27, 110, 132], textColor: 245, halign: 'left' },
          columnStyles: { 2: { halign: 'right' } },
        });
        y = doc.lastAutoTable.finalY + 18;
      }

      // Ledger balances grouped by group
      doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
      doc.text('Ledger Balances', 36, y); y += 4;
      const ledgerByGroup = state.groups
        .map(g => {
          const rows = state.ledgers
            .filter(l => l.groupId === g.id)
            .map(l => {
              const b = ledgerBalance(state, l.id);
              return [l.name, b.amount > 0 ? `Rs. ${inr(b.amount)} ${b.side.toUpperCase()}` : '—'];
            });
          return { group: g, rows };
        })
        .filter(x => x.rows.length > 0);

      const balBody = [];
      ledgerByGroup.forEach(({ group, rows }) => {
        balBody.push([{ content: group.name, colSpan: 2, styles: { fillColor: [237, 229, 210], fontStyle: 'bold' } }]);
        rows.forEach(r => balBody.push(r));
      });
      doc.autoTable({
        startY: y + 4,
        head: [['Ledger', 'Balance']],
        body: balBody,
        styles:    { font: 'helvetica', fontSize: 9, cellPadding: 4 },
        headStyles:{ fillColor: [27, 110, 132], textColor: 245, halign: 'left' },
        columnStyles: { 1: { halign: 'right' } },
      });

      // Footer with page numbers
      const pageCount = doc.internal.getNumberOfPages();
      for (let i = 1; i <= pageCount; i++) {
        doc.setPage(i);
        doc.setFont('helvetica', 'italic'); doc.setFontSize(8); doc.setTextColor(120);
        doc.text(`${state.meta.businessName} · NDS ERP v1.0 · page ${i} of ${pageCount}`, W / 2, doc.internal.pageSize.getHeight() - 18, { align: 'center' });
      }

      doc.save(`nds-erp-${todayISO()}.pdf`);
      toast('PDF exported');
    } catch (e) {
      console.error('PDF export failed', e);
      toast('PDF export failed');
    }
  };

  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = normalizeState(JSON.parse(reader.result));
        setState(data);
        toast('Data imported');
      } catch (e) { toast('Invalid file'); }
    };
    reader.readAsText(file);
  };

  const wipeAll = () => {
    if (!confirm('This will erase ALL data — local AND in the cloud. Are you sure?')) return;
    if (!confirm('Really erase everything? This cannot be undone.')) return;
    // units: [] ensures default seeded units (Pcs, Kg, etc.) are also wiped.
    const fresh = { ...initialState(), units: [] };
    localStorage.removeItem(STORAGE_KEY);
    setStateRaw(fresh);
    saveStateLocal(fresh);
    if (cloudReady() && user) {
      const payload = JSON.stringify(fresh);
      fbDB().doc(FIRESTORE_DOC_PATH).set({
        payload,
        updatedAt: fbNS().firestore.FieldValue.serverTimestamp(),
        updatedBy: (user && user.email) || 'unknown',
        version: 1,
      }).then(() => { lastWrittenPayloadRef.current = payload; }).catch(console.error);
    }
    toast('All data erased');
  };

  const restoreFromSnapshot = (snapState) => {
    setState(snapState);
  };

  const handleAutoDownloadToggle = (e) => {
    const on = e.target.checked;
    setAutoDownload(on);
    localStorage.setItem(AUTO_DL_PREF_KEY, on ? '1' : '0');
    if (on) toast('Daily auto-download enabled — first download tomorrow');
  };

  const handleSignOut = async () => {
    if (!confirm('Sign out of NDS ERP on this device?')) return;
    try {
      await fbAuth().signOut();
      // localStorage stays so re-sign-in is instant
      setShowSettings(false);
      toast('Signed out');
    } catch (e) { toast('Sign out failed'); }
  };

  // ── Render: auth gate ────────────────────────────────────────────────────
  if (authPhase === 'loading') {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center">
          <img src={BRAND_LOGO_DATA_URL} alt={BUSINESS_NAME} className="brand-logo-lg mx-auto mb-4" />
          <div className="smcap text-mute mt-1">Connecting to cloud…</div>
        </div>
      </div>
    );
  }
  if (authPhase === 'login') {
    return <LoginScreen />;
  }
  // 'ready' or 'local-fallback' — render the app

  // ── Render: main app ─────────────────────────────────────────────────────
  return (
    <div className="min-h-screen flex flex-col">
      {/* Top Chrome — logo + business name + date */}
      <header className="bg-paper border-b border-rule2 px-6 pt-3 pb-0 no-print">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-4">
            <img src={BRAND_LOGO_DATA_URL} alt={state.meta.businessName} className="brand-logo" />
            <div>
              <h1 className="display text-xl leading-none">{state.meta.businessName}</h1>
              <div className="text-xs text-mute italic mt-1 num">{fmtDateLong(todayISO())}</div>
            </div>
          </div>
          <div className="flex items-center gap-5">
            <DarkModeToggle />
            <button onClick={() => setShowSettings(true)} className="btn btn-ghost text-xs">Data ⚙</button>
          </div>
        </div>
        <div className="brand-rule mt-3"></div>
      </header>

      {/* Main */}
      <div className="flex flex-1 min-h-0">
        <main className="flex-1 px-8 py-6 overflow-auto">
          {screen === 'PURCHASES' && <PurchasesScreen state={state} setState={setState} toast={toast} />}
          {screen === 'SALES'     && <SalesScreen     state={state} setState={setState} toast={toast} gotoReceipt={gotoReceipt} />}
          {screen === 'PAYMENT'   && <PaymentReceiptScreen state={state} setState={setState} toast={toast} mode="PAYMENT" />}
          {screen === 'RECEIPT'   && <PaymentReceiptScreen state={state} setState={setState} toast={toast} mode="RECEIPT" prefill={receiptPrefill} />}
          {screen === 'JOURNAL'   && <JournalScreen   state={state} setState={setState} toast={toast} />}
          {screen === 'REPORTS'   && <ReportsScreen   state={state} jumpTo={reportJumpTo} onJumpTo={() => setReportJumpTo(null)} />}
          {screen === 'MASTERS'   && <MastersScreen   state={state} setState={setState} toast={toast} />}
        </main>

        <HotKeysSidebar active={screen} onSwitch={switchScreen} />
      </div>

      {/* Footer */}
      <footer className="border-t border-rule2 bg-paper2/30 px-6 py-2 flex justify-between items-center text-xs text-mute no-print">
        <div className="flex items-center gap-3">
          <span className="key">F1</span><span>Purchases</span>
          <span className="key">F2</span><span>Sales</span>
          <span className="key">F3</span><span>Payment</span>
          <span className="key">F4</span><span>Receipt</span>
          <span className="key">F5</span><span>Journal</span>
          <span className="key">F6</span><span>Reports</span>
          <span className="key">F7</span><span>Masters</span>
          <span className="key">F8</span><span>Day Book</span>
        </div>
        <div className="flex items-center gap-3">
          <span>{state.vouchers.length} vouchers · {state.ledgers.length} ledgers · {state.items.length} items</span>
          <span className="text-rule2">·</span>
          <SyncStatusPill status={syncStatus} lastSyncAt={lastSyncAt} />
          <span className="text-rule2">·</span>
          <span className="italic text-[10px]">v1.0</span>
        </div>
      </footer>

      {/* Settings */}
      <Modal open={showSettings} onClose={() => setShowSettings(false)} title="Data & Settings"
             footer={<button onClick={() => setShowSettings(false)} className="btn btn-ghost">Done</button>}>
        <div className="space-y-5">
          {/* Account */}
          {cloudReady() && user && (
            <div>
              <div className="smcap text-mute mb-2">Account</div>
              <div className="flex items-center justify-between text-sm">
                <div>
                  <div className="font-medium">{user.email}</div>
                </div>
                <button onClick={handleSignOut} className="btn btn-ghost text-xs">Sign Out</button>
              </div>
            </div>
          )}
          {!cloudReady() && (
            <div className="bg-paper2/50 border border-rule2 rounded p-3 text-xs text-mute">
              <div className="font-semibold text-ink mb-1">⚠ Cloud sync unavailable</div>
              Firebase didn't load — likely a network or CDN issue. The app is running on local storage only. Reload when you're back online.
            </div>
          )}

          <div className="border-t border-rule pt-4">
            <div className="smcap text-mute mb-2">Business</div>
            <div className="space-y-3">
              <div>
                <label className="smcap text-mute block mb-1">Business Name</label>
                <div className="px-2 py-1.5 bg-paper2/60 border border-rule rounded-sm text-sm font-medium">
                  <span>{state.meta.businessName}</span>
                </div>
              </div>
              <div>
                <label className="smcap text-mute block mb-1">FY Start</label>
                <input type="date" className="w-full" value={state.meta.fyStart} onChange={(e) => setState({ ...state, meta: { ...state.meta, fyStart: e.target.value } })} />
              </div>
            </div>
          </div>

          <div className="border-t border-rule pt-4">
            <div className="smcap text-mute mb-2">Backup & Restore</div>
            <div className="flex gap-2 flex-wrap">
              <button onClick={() => setShowBackups(true)} className="btn btn-ghost">📚 Daily Snapshots ({loadSnapshots().length})</button>
              <button onClick={exportData} className="btn btn-ghost" title="Machine-readable. Used by the app for import/export.">⬇ Export JSON</button>
              <button onClick={exportExcel} className="btn btn-ghost" title="Multi-sheet workbook for humans. Cannot be re-imported.">⬇ Export Excel</button>
              <button onClick={exportPDF} className="btn btn-ghost" title="Printable summary report for humans. Cannot be re-imported.">⬇ Export PDF</button>
              <label className="btn btn-ghost cursor-pointer">
                ⬆ Import JSON
                <input type="file" accept=".json" className="hidden" onChange={(e) => e.target.files[0] && importData(e.target.files[0])} />
              </label>
              <button onClick={wipeAll} className="btn btn-danger">Erase All Data</button>
            </div>
            <label className="flex items-start gap-2 mt-4 cursor-pointer text-xs">
              <input type="checkbox" checked={autoDownload} onChange={handleAutoDownloadToggle}
                     style={{ width: 'auto', marginTop: 2 }} />
              <span className="font-medium not-italic">Auto-download a JSON backup once per day</span>
            </label>
          </div>
        </div>
      </Modal>

      {/* Backups (Daily Snapshots) */}
      <BackupsModal
        open={showBackups}
        onClose={() => setShowBackups(false)}
        onView={(snap, date) => { setShowBackups(false); setViewingSnap({ snap, date }); }}
        onRestore={restoreFromSnapshot}
        toast={toast}
      />

      {/* Read-only snapshot viewer */}
      {viewingSnap && (
        <SnapshotViewer
          snapshot={viewingSnap.snap}
          snapshotDate={viewingSnap.date}
          onClose={() => setViewingSnap(null)}
        />
      )}

      <Toast msg={toastMsg} onDone={() => setToastMsg('')} />
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch (err) {
  document.getElementById('root').innerHTML =
    '<div style="padding:32px;font-family:Geist Mono,monospace;color:#0a0a0a;max-width:640px;margin:40px auto;background:#f5f5f5;border:1px solid #e5e5e5;border-radius:0px"><h2 style="font-family:Geist Mono,monospace;margin:0 0 12px;color:#e7000b">App failed to load</h2><p>One of the script CDNs may be blocked. Try a different network or browser. Error: <code>' + (err && err.message ? err.message : err) + '</code></p></div>';
  console.error('NDS ERP failed to mount:', err);
}
</script>
</body>
</html>
