<style>
  /* ── THEME: LIGHT ──────────────────────────────────────────────────────── */
  :root {

<script type="text/babel">
'use strict';

const { useState, useEffect, useMemo, useRef, useCallback } = React;
const _R = (typeof Recharts !== 'undefined' && Recharts) ? Recharts : {};
const { LineChart, Line, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = _R;
const ChartsAvailable = !!_R.LineChart;

// ──────────────────────────────────────────────────────────────────────────
// DARK MODE — persisted in localStorage, applied to <html> class
// ──────────────────────────────────────────────────────────────────────────
const DARK_KEY = 'nds_dark';
const initDark = () => {
  const stored = localStorage.getItem(DARK_KEY);
  const isDark = stored === '1' || (stored === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
  if (isDark) document.documentElement.classList.add('dark');
  return isDark;
};
// Run immediately so there is no flash of wrong theme
initDark();

function DarkModeToggle() {
  const [dark, setDark] = useState(() => document.documentElement.classList.contains('dark'));
  const [animating, setAnimating] = useState(false);

  const toggle = () => {
    const next = !dark;
    setDark(next);
    setAnimating(true);
    setTimeout(() => setAnimating(false), 500);
    if (next) {
      document.documentElement.classList.add('dark');
      localStorage.setItem(DARK_KEY, '1');
    } else {
      document.documentElement.classList.remove('dark');
      localStorage.setItem(DARK_KEY, '0');
    }
  };

  // Sun SVG
  const SunIcon = ({size=18, color}) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2" x2="12" y2="6"/>
      <line x1="12" y1="18" x2="12" y2="22"/>
      <line x1="4.22" y1="4.22" x2="7.05" y2="7.05"/>
      <line x1="16.95" y1="16.95" x2="19.78" y2="19.78"/>
      <line x1="2" y1="12" x2="6" y2="12"/>
      <line x1="18" y1="12" x2="22" y2="12"/>
      <line x1="4.22" y1="19.78" x2="7.05" y2="16.95"/>
      <line x1="16.95" y1="7.05" x2="19.78" y2="4.22"/>
    </svg>
  );

  // Moon SVG
  const MoonIcon = ({size=18, color}) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  );

  const trackClass = `nds-toggle__track ${dark ? 'dark' : 'light'}`;
  const thumbClass = `nds-toggle__thumb ${dark ? 'dark' : 'light'}`;

  return (
    <button
      className="nds-toggle"
      onClick={toggle}
      title={dark ? 'Switch to light mode' : 'Switch to dark mode'}
      aria-label={dark ? 'Switch to light mode' : 'Switch to dark mode'}
      aria-pressed={dark}
      style={{background:'none',border:'none',padding:0}}
    >
      <div className={trackClass}>
        {/* Background icons */}
        <div className="nds-toggle__icons">
          <SunIcon size={18} color={dark ? 'rgba(253,224,71,0.5)' : '#d97706'} />
          <MoonIcon size={18} color={dark ? 'rgba(186,230,253,0.6)' : '#64748b'} />
        </div>
        {/* Sliding thumb */}
        <div className={thumbClass}>
          <div className="nds-toggle__thumb-shine" />
          <div className="nds-toggle__thumb-icon">
            {dark
              ? <MoonIcon size={18} color="#fde68a" />
              : <SunIcon size={18} color="#f59e0b" />
            }
          </div>
        </div>
      </div>
    </button>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ──────────────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'nds_erp_v1';

// ── BUSINESS IDENTITY (code-permanent) ─────────────────────────────────────
// Business name for this deployment. Edit BUSINESS_NAME here in the source.
// It is intentionally
// not editable from inside the app.
const BUSINESS_NAME = 'Narayandas Sweets and Bites - Since 1877';

// ── BRAND LOGO ─────────────────────────────────────────────────────────────
// NDS brand logo, embedded so the app stays a single self-contained file.

// Date helpers — anchored to IST (Asia/Kolkata) so a 1 AM voucher in India
// stays on the calendar day the user expects, never UTC-shifted to "yesterday".
const todayISO = () => {
  // 'en-CA' returns YYYY-MM-DD which matches our internal ISO format.
  return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
};
const fmtDate = (iso) => {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
};
const fmtDateLong = (iso) => {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  const dt = new Date(Date.UTC(Number(y), Number(m)-1, Number(d)));
  // Render as e.g. "Wednesday, 29 April 2026" in IST
  return dt.toLocaleDateString('en-IN', { timeZone: 'Asia/Kolkata', weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
};
const fmtTime = (ts) => {
  if (!ts) return '';
  return new Date(ts).toLocaleTimeString('en-IN', {
    timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', hour12: false
  });
};
const inr = (n) => {
  const num = Number(n) || 0;
  const sign = num < 0 ? '-' : '';
  const abs = Math.abs(num);
  // Indian numbering with 2dp
  const s = abs.toFixed(2);
  const [intP, decP] = s.split('.');
  const last3 = intP.slice(-3);
  const rest = intP.slice(0, -3);
  const restF = rest.replace(/\B(?=(\d{2})+(?!\d))/g, ',');
  return sign + (rest ? restF + ',' + last3 : last3) + '.' + decP;
};
const uid = (prefix) => `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;

// STORAGE — Layered: Firestore (primary, cross-device)
//                  ↔ localStorage (instant cache + offline)

const SNAPSHOT_KEY      = 'nds_erp_v1_snaps';
const LAST_DOWNLOAD_KEY = 'nds_erp_v1_lastDl';
const AUTO_DL_PREF_KEY  = 'nds_erp_v1_autoDl';
const SNAPSHOT_LIMIT    = 30; // keep 30 most recent days, plus pinned

const initialState = () => ({
  meta: {
    businessName: BUSINESS_NAME,        // sourced from the code-permanent constant
    fyStart: `${new Date().getFullYear()}-04-01`,
  },
  groups: DEFAULT_GROUPS,
  ledgers: DEFAULT_LEDGERS,
  units: DEFAULT_UNITS,
  superCategories: [],
  subCategories: [],
  items: [],
  vouchers: [],
  ledgerEntries: [],
  stockEntries: [],
  counters: { sales: 1, purchase: 1, payment: 1, receipt: 1, journal: 1 },
});

const normalizeState = (parsed) => {
  const base = initialState();
  // Migration: if loaded state has 19 groups (V2.2 era), append Stock-in-Hand
  // so reports work without forcing a wipe. If groups is missing entirely or
  // wrong-shaped, fall back to defaults.
  let groups = (parsed && parsed.groups && Array.isArray(parsed.groups)) ? parsed.groups : DEFAULT_GROUPS;
  if (groups.length === 19 && !groups.find(g => g.id === 'g_stock_in_hand')) {
    groups = [...groups, { id: 'g_stock_in_hand', name: 'Stock-in-Hand', nature: 'asset', order: 20, computed: true }];
  }
  if (groups.length !== 20) groups = DEFAULT_GROUPS;
  const merged = {
    ...base,
    ...(parsed || {}),
    groups,
  };
  // Force businessName to the code constant — it is intentionally not editable
  // from the UI. To rename for another business, edit BUSINESS_NAME in source.
  merged.meta = { ...(parsed?.meta || {}), ...base.meta, businessName: BUSINESS_NAME };
  // Drop the legacy 'since' field if present in old saved data
  if (merged.meta.since) delete merged.meta.since;

  // MIGRATION v2.4: Fix items that were saved with id:'' due to the spread-order
  // bug in saveItem (id: uid('it'), ...editingItem — editingItem.id='' overwrote uid).
  // Assign fresh uids to any item with a falsy id so they work correctly in pickers.
  if (Array.isArray(merged.items)) {
    merged.items = merged.items.map(item =>
      item.id ? item : { ...item, id: uid('it') }
    );
  }

  return merged;
};

// — localStorage mirror (Tier 2: instant first paint + offline) —
const loadStateLocal = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return initialState();
    return normalizeState(JSON.parse(raw));
  } catch (e) {
    console.error('Local load failed', e);
    return initialState();
  }
};
const saveStateLocal = (s) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) { console.error(e); }
};

// — daily snapshots ring buffer (Tier 3: in-app history) —
const loadSnapshots = () => {
  try {
    const raw = localStorage.getItem(SNAPSHOT_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
};
const saveSnapshots = (arr) => {
  try { localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(arr)); } catch (e) { console.error(e); }
};
const captureSnapshotIfNeeded = (s) => {
  try {
    const today = todayISO();
    const snaps = loadSnapshots();
    const idx = snaps.findIndex(x => x.date === today);
    const sales = (s.vouchers || []).filter(v => v.type === 'sales');
    const meta = {
      date: today,
      voucherCount: (s.vouchers || []).length,
      salesCount: sales.length,
      totalSales: sales.reduce((sum, v) => sum + (Number(v.grand) || 0), 0),
      capturedAt: Date.now(),
      pinned: idx >= 0 ? !!snaps[idx].pinned : false,
      payload: JSON.stringify(s),
    };
    if (idx >= 0) snaps[idx] = meta; else snaps.push(meta);
    // Keep most recent SNAPSHOT_LIMIT, plus any pinned, plus today's
    const sorted = snaps.sort((a, b) => b.date.localeCompare(a.date));
    const trimmed = sorted.filter((x, i) => x.pinned || x.date === today || i < SNAPSHOT_LIMIT);
    saveSnapshots(trimmed);
  } catch (e) { console.error('Snapshot capture failed', e); }
};
const pinSnapshot = (date, pin) => {
  const snaps = loadSnapshots();
  const idx = snaps.findIndex(x => x.date === date);
  if (idx >= 0) { snaps[idx].pinned = !!pin; saveSnapshots(snaps); }
};
const deleteSnapshot = (date) => {
  saveSnapshots(loadSnapshots().filter(x => x.date !== date));
};

// — daily auto-download (Tier 4: optional filesystem failsafe) —
const triggerDailyAutoDownload = (s) => {
  try {
    if (localStorage.getItem(AUTO_DL_PREF_KEY) !== '1') return;
    const today = todayISO();
    if (localStorage.getItem(LAST_DOWNLOAD_KEY) === today) return;
    const blob = new Blob([JSON.stringify(s, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `nds-erp-${today}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    localStorage.setItem(LAST_DOWNLOAD_KEY, today);
  } catch (e) { console.error('Auto-download failed', e); }
};

// Compute balance for a single ledger as of optional date (inclusive)
// Returns positive number with separate 'side' indicating Dr or Cr balance
function ledgerBalance(state, ledgerId, asOfDate) {
  const ledger = state.ledgers.find(l => l.id === ledgerId);
  if (!ledger) return { amount: 0, side: 'dr' };
  const group = state.groups.find(g => g.id === ledger.groupId);
  const naturalDr = group && (group.nature === 'asset' || group.nature === 'expense');
  let dr = 0, cr = 0;
  // Opening balance: assets/expenses are normally debit; liabilities/income normally credit
  if (ledger.openingBalance) {
    if (naturalDr) dr += Number(ledger.openingBalance) || 0;
    else cr += Number(ledger.openingBalance) || 0;
  }
  state.ledgerEntries.forEach(e => {
    if (e.ledgerId !== ledgerId) return;
    if (asOfDate && e.date > asOfDate) return;
    dr += Number(e.dr) || 0;
    cr += Number(e.cr) || 0;
  });
  const net = dr - cr;
  return { amount: Math.abs(net), side: net >= 0 ? 'dr' : 'cr', dr, cr };
}

// Stock balance for an item
function stockBalance(state, itemId, asOfDate) {
  const item = state.items.find(i => i.id === itemId);
  if (!item) return 0;
  let bal = Number(item.openingBalance) || 0;
  state.stockEntries.forEach(e => {
    if (e.itemId !== itemId) return;
    if (asOfDate && e.date > asOfDate) return;
    bal += (Number(e.in) || 0) - (Number(e.out) || 0);
  });
  return bal;
}

// Find or create a customer/vendor ledger by name
function findOrCreateParty(state, name, groupId) {
  const trimmed = (name || '').trim();
  if (!trimmed) return null;
  const existing = state.ledgers.find(l => l.name.toLowerCase() === trimmed.toLowerCase());
  if (existing) return existing;
  const newL = { id: uid('l'), name: trimmed, groupId, openingBalance: 0, contact: '', address: '' };
  state.ledgers.push(newL);
  return newL;
}

// ══════════════════════════════════════════════════════════════════════════
// INTEGRATED INVENTORY ↔ FINANCIAL ACCOUNTING HELPERS
//
// These helpers implement the bridge between the inventory module and the
// double-entry books — the single most important piece of a Tally-style ERP.
//
// In Tally's "Integrated Accounts with Inventory" mode:
//   • Purchases hit the Purchase A/c (P&L Dr) AND the inventory module (qty in)
//   • Sales hit the Sales A/c (P&L Cr) AND the inventory module (qty out)
//   • Closing Stock value is COMPUTED from inventory at any date — never posted
//   • Trading A/c: Opening Stock + Purchases + Direct Exp = Cost side
//                  Sales + Closing Stock + Direct Inc       = Revenue side
//                  Difference = Gross Profit (or Loss)
//   • P&L: starts from Gross Profit, adds Indirect Income, subtracts Indirect
//          Expenses → Net Profit (transferred to Capital on BS)
//   • Balance Sheet: Closing Stock appears as an asset under Stock-in-Hand
//
// Valuation method: Weighted Average Cost (Tally's default for stock items).
// Each purchase updates the running average; sales draw at that average.
// ══════════════════════════════════════════════════════════════════════════

// Weighted-average cost of an item as of a date (inclusive). Walks the stock
// entries chronologically and recomputes avg cost on each inward (purchase).
// Outward (sales) does NOT change the avg cost — only consumes qty at that avg.
function itemAvgCost(state, itemId, asOfDate) {
  const item = state.items.find(i => i.id === itemId);
  if (!item) return 0;
  const opening = Number(item.openingBalance) || 0;
  // If user provided an opening cost (lastPurchasePrice as starting estimate)
  // use it as the seed cost. Otherwise start at 0 — it will get set on first IN.
  const seedCost = Number(item.lastPurchasePrice) || 0;

  let qty = opening;
  let totalValue = opening * seedCost;

  const entries = state.stockEntries
    .filter(e => e.itemId === itemId && (!asOfDate || e.date <= asOfDate))
    .sort((a, b) => (a.date.localeCompare(b.date)) || (a.id || '').localeCompare(b.id || ''));

  for (const e of entries) {
    const inQty = Number(e.in) || 0;
    const outQty = Number(e.out) || 0;
    const rate = Number(e.rate) || 0;
    if (inQty > 0) {
      // Weighted-avg recompute on inward
      totalValue += inQty * rate;
      qty += inQty;
    }
    if (outQty > 0) {
      // Outward at current avg cost — drains value proportionally
      const avg = qty > 0 ? totalValue / qty : 0;
      totalValue -= outQty * avg;
      qty -= outQty;
      if (qty < 0) {
        // Negative stock — value goes negative too. Reset basis if it climbs back.
        totalValue = qty * (avg || rate);
      }
    }
  }
  return qty > 0 ? totalValue / qty : (seedCost || 0);
}

// Total inventory value (Stock-in-Hand) as of a date — Σ(qty × avg cost) across items.
function inventoryValue(state, asOfDate) {
  return state.items.reduce((sum, it) => {
    const qty = stockBalance(state, it.id, asOfDate);
    if (qty === 0) return sum;
    const cost = itemAvgCost(state, it.id, asOfDate);
    return sum + qty * cost;
  }, 0);
}

// Date helper — return the day BEFORE an ISO date (used for "as of day before from")
function dayBefore(iso) {
  if (!iso) return iso;
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() - 1);
  const yy = dt.getUTCFullYear();
  const mm = String(dt.getUTCMonth() + 1).padStart(2, '0');
  const dd = String(dt.getUTCDate()).padStart(2, '0');
  return `${yy}-${mm}-${dd}`;
}

// Compute Trading A/c figures for a period.
// Returns { openingStock, purchases, directExp, sales, closingStock, directInc, grossProfit }
// where grossProfit = (sales + closingStock + directInc) - (openingStock + purchases + directExp)
function tradingAccountFigures(state, from, to) {
  const openingDate = dayBefore(from);
  const openingStock = inventoryValue(state, openingDate);
  const closingStock = inventoryValue(state, to);

  let purchases = 0, sales = 0, directExp = 0, directInc = 0;
  state.ledgerEntries.forEach(e => {
    if (!inRange(e.date, from, to)) return;
    const l = state.ledgers.find(x => x.id === e.ledgerId);
    if (!l) return;
    const g = state.groups.find(x => x.id === l.groupId);
    if (!g) return;
    const drCr = (Number(e.dr) || 0) - (Number(e.cr) || 0);
    if (g.id === 'g_purchase')        purchases  += drCr;       // Dr balance
    else if (g.id === 'g_sales')      sales      += -drCr;      // Cr balance
    else if (g.id === 'g_direct_exp') directExp  += drCr;
    else if (g.id === 'g_direct_inc') directInc  += -drCr;
  });

  const grossProfit = (sales + closingStock + directInc) - (openingStock + purchases + directExp);
  return { openingStock, purchases, directExp, sales, closingStock, directInc, grossProfit };
}

// Compute P&L figures starting from Trading A/c gross profit.
// Returns { grossProfit, indirectInc, indirectExp, netProfit, indirectIncByLedger, indirectExpByLedger, ... }
function profitLossFigures(state, from, to) {
  const trading = tradingAccountFigures(state, from, to);
  let indirectInc = 0, indirectExp = 0;
  const incByLedger = {};
  const expByLedger = {};

  state.ledgerEntries.forEach(e => {
    if (!inRange(e.date, from, to)) return;
    const l = state.ledgers.find(x => x.id === e.ledgerId);
    if (!l) return;
    const g = state.groups.find(x => x.id === l.groupId);
    if (!g) return;
    const drAmt = Number(e.dr) || 0;
    const crAmt = Number(e.cr) || 0;
    if (g.id === 'g_indirect_inc') {
      indirectInc += (crAmt - drAmt);
      if (!incByLedger[l.id]) incByLedger[l.id] = { name: l.name, amount: 0 };
      incByLedger[l.id].amount += (crAmt - drAmt);
    } else if (g.id === 'g_indirect_exp') {
      indirectExp += (drAmt - crAmt);
      if (!expByLedger[l.id]) expByLedger[l.id] = { name: l.name, amount: 0 };
      expByLedger[l.id].amount += (drAmt - crAmt);
    }
  });

  const netProfit = trading.grossProfit + indirectInc - indirectExp;
  return {
    ...trading,
    indirectInc, indirectExp, netProfit,
    incByLedger, expByLedger,
  };
}

// Posted-only ledger balance (no opening) — entries within / up to a date.
// Returns { dr, cr, net } where net = dr - cr (positive Dr, negative Cr).
function ledgerPostedBalance(state, ledgerId, asOfDate) {
  let dr = 0, cr = 0;
  state.ledgerEntries.forEach(e => {
    if (e.ledgerId !== ledgerId) return;
    if (asOfDate && e.date > asOfDate) return;
    dr += Number(e.dr) || 0;
    cr += Number(e.cr) || 0;
  });
  return { dr, cr, net: dr - cr };
}

// Running-balance entries for a single ledger between from and to.
// Returns { opening: {dr,cr,net}, rows: [{...entry, runningDr, runningCr, runningSide, voucher}] , closing }
function ledgerStatement(state, ledgerId, from, to) {
  const ledger = state.ledgers.find(l => l.id === ledgerId);
  if (!ledger) return { opening: { dr: 0, cr: 0, net: 0 }, rows: [], closing: { dr: 0, cr: 0, net: 0 } };
  const group = state.groups.find(g => g.id === ledger.groupId);
  const naturalDr = group && (group.nature === 'asset' || group.nature === 'expense');
  const ob = Number(ledger.openingBalance) || 0;
  const obDr = naturalDr ? ob : 0;
  const obCr = naturalDr ? 0 : ob;

  // Opening = OB + entries before 'from'
  let openingDr = obDr, openingCr = obCr;
  state.ledgerEntries.forEach(e => {
    if (e.ledgerId !== ledgerId) return;
    if (e.date < from) {
      openingDr += Number(e.dr) || 0;
      openingCr += Number(e.cr) || 0;
    }
  });
  const openingNet = openingDr - openingCr;

  // In-range entries, sorted chronologically
  const rows = state.ledgerEntries
    .filter(e => e.ledgerId === ledgerId && inRange(e.date, from, to))
    .sort((a, b) => (a.date.localeCompare(b.date)) || (a.id || '').localeCompare(b.id || ''));

  // Decorate with voucher info + running balance
  let runningNet = openingNet;
  const decorated = rows.map(e => {
    const v = state.vouchers.find(x => x.id === e.voucherId);
    runningNet += (Number(e.dr) || 0) - (Number(e.cr) || 0);
    return {
      ...e,
      voucher: v,
      runningNet,
      runningAbs: Math.abs(runningNet),
      runningSide: runningNet >= 0 ? 'Dr' : 'Cr',
    };
  });

  return {
    opening: { dr: openingDr, cr: openingCr, net: openingNet },
    rows: decorated,
    closing: { dr: openingDr + rows.reduce((s, e) => s + (Number(e.dr) || 0), 0),
               cr: openingCr + rows.reduce((s, e) => s + (Number(e.cr) || 0), 0),
               net: runningNet },
  };
}

// Trial balance — every ledger with non-zero closing as of a date, side resolved.
// Plus a virtual row for Stock-in-Hand if the user wants TB to reconcile to BS.
// Returns rows + totals { totalDr, totalCr } and a difference flag.
function trialBalance(state, asOfDate) {
  const rows = [];
  state.ledgers.forEach(l => {
    const bal = ledgerBalance(state, l.id, asOfDate);
    if (bal.amount === 0) return;
    const g = state.groups.find(x => x.id === l.groupId);
    rows.push({
      id: l.id, name: l.name, group: g, groupName: g?.name || '',
      dr: bal.side === 'dr' ? bal.amount : 0,
      cr: bal.side === 'cr' ? bal.amount : 0,
    });
  });
  rows.sort((a, b) => (a.group?.order || 99) - (b.group?.order || 99) || a.name.localeCompare(b.name));
  const totalDr = rows.reduce((s, r) => s + r.dr, 0);
  const totalCr = rows.reduce((s, r) => s + r.cr, 0);
  return { rows, totalDr, totalCr, difference: totalDr - totalCr };
}

// Ageing buckets for an outstanding amount.
function ageingBucket(daysOld) {
  if (daysOld <= 30) return '0-30';
  if (daysOld <= 60) return '31-60';
  if (daysOld <= 90) return '61-90';
  if (daysOld <= 180) return '91-180';
  return '180+';
}

// Compute days between two ISO dates (b - a)
function daysBetween(aISO, bISO) {
  const a = new Date(aISO + 'T00:00:00Z');
  const b = new Date(bISO + 'T00:00:00Z');
  return Math.round((b - a) / (24 * 60 * 60 * 1000));
}

// FIFO bill-wise ageing for a party.  Walks vouchers chronologically; receipts
// (Cr the customer ledger) consume oldest open sales bills first.  Returns
// outstanding bills only, with days-old computed against asOfDate.
function billwiseAgeing(state, ledgerId, asOfDate, partyType /* 'customer' | 'vendor' */) {
  const isCustomer = partyType === 'customer';
  const billType = isCustomer ? 'sales' : 'purchase';
  const settlementType = isCustomer ? 'receipt' : 'payment';

  // Bills (sales for customer / purchases for vendor)
  const bills = state.vouchers
    .filter(v => v.partyId === ledgerId && v.type === billType && v.date <= asOfDate)
    .sort((a, b) => a.date.localeCompare(b.date))
    .map(v => ({
      id: v.id, voucherNo: v.voucherNo, date: v.date,
      amount: Number(v.grand) || 0, settled: 0, type: v.type,
    }));

  // Settlements (receipts from this customer / payments to this vendor)
  const settlements = state.vouchers
    .filter(v => v.partyId === ledgerId && v.type === settlementType && v.date <= asOfDate)
    .sort((a, b) => a.date.localeCompare(b.date));

  // Apply settlements FIFO to oldest unsettled bills
  let totalSettlement = settlements.reduce((s, v) => s + (Number(v.grand) || 0), 0);
  for (const b of bills) {
    if (totalSettlement <= 0) break;
    const open = b.amount - b.settled;
    const apply = Math.min(open, totalSettlement);
    b.settled += apply;
    totalSettlement -= apply;
  }

  // Build outstanding rows
  const out = bills
    .map(b => ({
      ...b,
      outstanding: b.amount - b.settled,
      daysOld: daysBetween(b.date, asOfDate),
      bucket: ageingBucket(daysBetween(b.date, asOfDate)),
    }))
    .filter(b => b.outstanding > 0.005);

  // If settlements exceed bills, surplus is "On account" credit (not assigned to a bill)
  const onAccount = totalSettlement > 0.005 ? totalSettlement : 0;
  return { rows: out, onAccount };
}

// Cash & Bank book — Tally-style.  Returns { opening, rows, closing } where
// rows = [{ date, voucher, particulars, dr, cr, runningNet }] ordered by date.
// 'particulars' is the OTHER side of the entry (the contra ledger), which is
// what makes a Cash Book readable: "Sales – Ramesh" rather than just "Sales".
function bookForLedger(state, ledgerId, from, to) {
  const ledger = state.ledgers.find(l => l.id === ledgerId);
  if (!ledger) return { opening: { net: 0 }, rows: [], closing: { net: 0 } };
  const group = state.groups.find(g => g.id === ledger.groupId);
  const naturalDr = group && (group.nature === 'asset' || group.nature === 'expense');
  const ob = Number(ledger.openingBalance) || 0;
  let openingNet = naturalDr ? ob : -ob;
  state.ledgerEntries.forEach(e => {
    if (e.ledgerId !== ledgerId) return;
    if (e.date < from) openingNet += (Number(e.dr) || 0) - (Number(e.cr) || 0);
  });

  const inRangeEntries = state.ledgerEntries
    .filter(e => e.ledgerId === ledgerId && inRange(e.date, from, to))
    .sort((a, b) => (a.date.localeCompare(b.date)) || (a.id || '').localeCompare(b.id || ''));

  let running = openingNet;
  const rows = inRangeEntries.map(e => {
    // Find the contra side(s) of the same voucher
    const sibling = state.ledgerEntries.filter(x => x.voucherId === e.voucherId && x.ledgerId !== ledgerId);
    const particulars = sibling.length === 0
      ? (e.narration || '—')
      : sibling.map(s => state.ledgers.find(l => l.id === s.ledgerId)?.name || '?').join(', ');
    const v = state.vouchers.find(x => x.id === e.voucherId);
    running += (Number(e.dr) || 0) - (Number(e.cr) || 0);
    return {
      ...e, voucher: v, particulars, runningNet: running,
    };
  });

  return {
    opening: { net: openingNet, side: openingNet >= 0 ? 'Dr' : 'Cr', amount: Math.abs(openingNet) },
    rows,
    closing: { net: running, side: running >= 0 ? 'Dr' : 'Cr', amount: Math.abs(running) },
  };
}

// inRange: small date helper used throughout the report code. Defined here so
// helpers above can use it; the original ReportsScreen already redefines it
// (idempotent — same shape).
function inRange(date, from, to) {
  return date >= from && date <= to;
}

// ── BillWiseDetails ───────────────────────────────────────────────────────────
// Tally-style bill reference picker for Payment / Receipt / Journal / Sales / Purchase
// billRefs: [{ id, type: 'new'|'against', refNo, amount }]
// openBills: [{ voucherNo, date, amount, outstanding }] — for Agst Ref picker
function BillWiseDetails({ billRefs, onChange, openBills = [], grandTotal, readOnly = false }) {
  const addRef = () => onChange([...billRefs, { id: uid('br'), type: 'new', refNo: '', amount: '' }]);
  const updateRef = (id, patch) => onChange(billRefs.map(r => r.id === id ? { ...r, ...patch } : r));
  const removeRef = (id) => onChange(billRefs.filter(r => r.id !== id));

  const allocatedTotal = billRefs.reduce((s, r) => s + (Number(r.amount) || 0), 0);
  const unallocated = (Number(grandTotal) || 0) - allocatedTotal;

  if (readOnly && billRefs.length === 0) return null;

  return (
    <div className="mt-4 border border-rule rounded-sm overflow-hidden">
      <div className="bg-paper2/60 px-3 py-2 flex justify-between items-center border-b border-rule">
        <span className="smcap text-mute text-[11px]">Bill-Wise Details</span>
        {!readOnly && (
          <button type="button" onClick={addRef} className="text-xs text-wax hover:text-ink font-medium">+ Add Ref</button>
        )}
      </div>
      {billRefs.length === 0 && !readOnly && (
        <div className="px-3 py-3 text-xs text-mute italic">No bill references — click + Add Ref to link bills</div>
      )}
      {billRefs.map((r) => (
        <div key={r.id} className="flex items-center gap-2 px-3 py-2 border-b border-rule last:border-b-0">
          {/* Type toggle */}
          <select
            className="text-xs w-28 shrink-0"
            value={r.type}
            onChange={(e) => updateRef(r.id, { type: e.target.value, refNo: e.target.value === 'new' ? r.refNo : '' })}
            disabled={readOnly}
          >
            <option value="new">New Ref</option>
            <option value="against">Agst Ref</option>
          </select>

          {/* Ref No — free text for New Ref, picker for Agst Ref */}
          {r.type === 'new' ? (
            <input
              className="flex-1 text-xs"
              value={r.refNo}
              onChange={(e) => updateRef(r.id, { refNo: e.target.value })}
              placeholder="Ref / bill number"
              disabled={readOnly}
            />
          ) : (
            <select
              className="flex-1 text-xs"
              value={r.refNo}
              onChange={(e) => {
                const bill = openBills.find(b => String(b.voucherNo) === e.target.value);
                updateRef(r.id, { refNo: e.target.value, amount: bill ? String(bill.outstanding) : r.amount });
              }}
              disabled={readOnly}
            >
              <option value="">— select open bill —</option>
              {openBills.map(b => (
                <option key={b.voucherNo} value={String(b.voucherNo)}>
                  #{b.voucherNo} · {fmtDate(b.date)} · ₹{inr(b.outstanding)}
                </option>
              ))}
            </select>
          )}

          {/* Amount */}
          <input
            className="num w-28 text-xs shrink-0"
            value={r.amount}
            onChange={(e) => updateRef(r.id, { amount: e.target.value })}
            placeholder="0.00"
            disabled={readOnly}
          />
          {!readOnly && (
            <button type="button" onClick={() => removeRef(r.id)} className="text-mute hover:text-gold text-base px-1 shrink-0">×</button>
          )}
        </div>
      ))}
      {billRefs.length > 0 && !readOnly && (
        <div className={`flex justify-between items-center px-3 py-2 text-xs font-medium ${Math.abs(unallocated) < 0.5 ? 'text-ok' : 'text-gold'}`}>
          <span>Unallocated</span>
          <span className="num">{unallocated < -0.5 ? '⚠ Over by ' : ''}{inr(Math.abs(unallocated))}</span>
        </div>
      )}
    </div>
  );
}

// Autocomplete picker — supports keyboard nav, fast filter, "create new" inline.
//
// V2.4 FIX — Picker architecture rewrite; see function Picker below.
// Earlier versions only auto-picked exact-match typed text on blur / Enter / Tab.
// In React 18 those state updates are batched, so when the user typed an item
// name and clicked Save Voucher, the order was:
//   1. blur fires → tryAutoPickExact → setLines QUEUED (not flushed)
//   2. click fires → save() runs synchronously with STALE lines (itemId = '')
//   3. validation fails → toast "Pick an item from the dropdown — typing alone is not enough"
//   4. React finally flushes the queued setLines, but the toast already fired.
// Three previous patches all stayed on the wrong side of this race because they
// hooked into blur / keydown — every one of which loses to the click handler.
// The real fix is to push the autopick UP into the keystroke handler, so by the
// time the user releases the last key the parent's lines[i].itemId is already set
// and there is nothing left to flush when click arrives.
// ── Picker v2.4 ─────────────────────────────────────────────────────────────
// Root-cause fixes applied in this version:
//
// BUG #1 (PRIMARY) — handleInput cleared itemId on every post-exact-match
//   keystroke via a stale closure `value`.  The old code called
//   `onChange('', null)` whenever the typed text didn't exactly match any
//   option.  Because `value` was read from the render-time closure (already
//   set to the picked id from the last render), any extra character the user
//   typed after a successful exact-match pick immediately wiped the selection.
//   FIX: handleInput now only clears the parent when the field is fully empty.
//   Partial / non-matching text leaves the current selection alone.
//
// BUG #3 — tryAutoPickExact read stale `query` and `value` from its closure.
//   FIX: Both are now read from live refs (queryRef / valueRef) that are
//   assigned synchronously on every render — no useEffect lag.
//
// BUG #5 — useEffect depended on `options.length` which missed in-place name
//   edits.  FIX: effect is gated by an `isEditing` ref so it never stomps the
//   user mid-keystroke, and uses the full `options` array so renamed ledgers
//   update the display correctly.
//
// BUG #8 — Tab path called tryAutoPickExact which could double-pick or mask
//   the real issue.  Still present but now harmless: tryAutoPickExact uses the
//   live refs and the stale-closure clear is gone, so it can only confirm or
//   no-op, never corrupt.
function Picker({ value, onChange, onTextChange, options, placeholder = '', getLabel = (o) => o.name, getMeta, allowCreate = false, onCreate, autoFocus, className = '' }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState(() => {
    if (!value) return '';
    const o = options.find(o => o.id === value);
    return o ? getLabel(o) : '';
  });
  const [active, setActive] = useState(0);
  const ref = useRef(null);

  // Live refs — assigned synchronously every render so closures always see the
  // latest value without waiting for a useEffect flush.
  const queryRef = useRef(query);
  const valueRef = useRef(value);
  queryRef.current = query;
  valueRef.current = value;

  // Flag: true while the user has focus on this input.  Prevents the sync
  // effect below from stomping the display mid-keystroke.
  const isEditing = useRef(false);

  // Sync display text when the external `value` or the matching option changes
  // (e.g. programmatic reset, ledger name edit in Masters).  Skipped while
  // the user is actively typing so we never overwrite their keystrokes.
  useEffect(() => {
    if (isEditing.current) return;
    if (!value) { setQuery(''); return; }
    const o = options.find(o => o.id === value);
    if (o) setQuery(getLabel(o));
  }, [value, options]); // full `options` ref — catches renamed ledgers

  const filtered = useMemo(() => {
    const q = query.toLowerCase().trim();
    if (!q) return options.slice(0, 50);
    return options.filter(o => getLabel(o).toLowerCase().includes(q)).slice(0, 50);
  }, [query, options]);

  // ── pick() — v2.4 flushSync fix ────────────────────────────────────────
  // Root cause of "Arrow+Enter → Save → toast" bug (confirmed by user):
  // React 18 concurrent mode (createRoot) can DEFER the commit of the
  // setLines({itemId}) triggered by onChange(id, opt). If the user clicks
  // Save before that deferred render commits, save() reads the pre-pick
  // closure where itemId is still ''. The display already showed the item
  // name (setQuery is local state, committed in the same flush), so the pick
  // looked successful but the parent's lines state was stale.
  //
  // ReactDOM.flushSync forces the parent's onChange (→ setLines / setCustomerId
  // / etc.) to commit synchronously inside this event handler, before pick()
  // returns. Any subsequent user event — Tab, typing qty, clicking Save — is
  // processed after the flush, so its closure always sees the correct itemId.
  const pick = (opt) => {
    // Flush parent state update synchronously (fixes concurrent-mode race).
    ReactDOM.flushSync(() => onChange(opt.id, opt));
    setQuery(getLabel(opt));
    setOpen(false);
  };

  const createNew = () => {
    const q = queryRef.current.trim();
    if (!q || !onCreate) return;
    const created = onCreate(q);
    if (created) {
      // flushSync for the same reason as pick() — ensure parent commits synchronously.
      ReactDOM.flushSync(() => onChange(created.id, created));
      setQuery(getLabel(created));
    }
    setOpen(false);
  };

  // Try to resolve the current query to an exact option match.
  // Uses live refs — no stale-closure risk (fixes bug #3).
  // Returns true if a match was found (already selected counts too).
  const tryAutoPickExact = () => {
    const q = queryRef.current.trim().toLowerCase();
    if (!q) return false;
    const exact = options.find(o => getLabel(o).toLowerCase().trim() === q);
    if (exact) {
      if (exact.id !== valueRef.current) {
        onChange(exact.id, exact);
        setQuery(getLabel(exact));
      }
      return true;
    }
    return false;
  };

  const onKey = (e) => {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setActive(a => Math.min(a + 1, filtered.length - (allowCreate ? 0 : 1)));
      setOpen(true);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setActive(a => Math.max(a - 1, 0));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (open && active < filtered.length) pick(filtered[active]);
      else if (allowCreate && queryRef.current.trim()) createNew();
      else tryAutoPickExact();
    } else if (e.key === 'Tab') {
      // Tab moves focus — commit the highlighted row if open, else try exact match.
      // Don't preventDefault — let browser move focus naturally.
      if (open && active >= 0 && active < filtered.length) {
        pick(filtered[active]);
      } else {
        tryAutoPickExact();
      }
      setOpen(false);
    } else if (e.key === 'Escape') {
      setOpen(false);
    }
  };

  // ── handleInput (v2.4 fix for bug #1) ─────────────────────────────────
  // Previous versions called onChange('', null) whenever typed text didn't
  // exactly match any option.  Because `value` was read from a stale closure
  // (already updated to the picked id from the previous render), typing even
  // one extra character after hitting an exact match wiped itemId.
  //
  // New contract:
  //   • Exact match   → notify parent immediately (fast-pick, kills blur race)
  //   • Empty field   → clear parent (user deleted everything intentionally)
  //   • Partial text  → leave parent value alone; notify onTextChange only
  //     (allowCreate pickers use this to track a typed-but-not-yet-saved name)
  //
  // On blur we revert the display to the current selection for non-create
  // pickers, so stale text never silently survives into save().
  const handleInput = (v) => {
    setQuery(v);
    setOpen(true);
    setActive(0);

    if (!v.trim()) {
      // Field fully cleared → clear the parent's selection
      if (valueRef.current) onChange('', null);
      if (onTextChange) onTextChange(v);
      return;
    }

    const trimmed = v.trim().toLowerCase();
    const exact = options.find(o => getLabel(o).toLowerCase().trim() === trimmed);
    if (exact) {
      // Exact match — push id to parent right now so save() never sees ''
      if (exact.id !== valueRef.current) onChange(exact.id, exact);
    } else {
      // Partial / no match — don't touch the parent's current value.
      // For allowCreate pickers the typed text IS the eventual party name.
      if (onTextChange) onTextChange(v);
    }
  };

  // On blur: finalise the selection.
  //   • Exact match found   → select it (handles typed-without-dropdown-click)
  //   • No match, no create → revert display to current selection's label so
  //                           stale partial text doesn't sit in the box
  //   • No match, allowCreate → keep typed text (user intends to create)
  const handleBlur = () => {
    isEditing.current = false;
    const found = tryAutoPickExact();
    if (!found && !allowCreate) {
      // Revert display to whatever is currently selected
      const cur = options.find(o => o.id === valueRef.current);
      setQuery(cur ? getLabel(cur) : '');
    }
    setTimeout(() => setOpen(false), 150);
  };

  return (
    <div className={`relative ${className}`} ref={ref}>
      <input
        value={query}
        autoFocus={autoFocus}
        onChange={(e) => handleInput(e.target.value)}
        onFocus={() => { isEditing.current = true; setOpen(true); }}
        onBlur={handleBlur}
        onKeyDown={onKey}
        placeholder={placeholder}
        className="w-full"
      />
      {open && (
        <div className="suggest">
          {filtered.length === 0 && !allowCreate && (
            <div className="suggest-item text-mute italic">No matches</div>
          )}
          {filtered.map((o, i) => (
            <div key={o.id} className={`suggest-item ${i === active ? 'active' : ''}`}
                 onMouseDown={() => pick(o)} onMouseEnter={() => setActive(i)}>
              <div className="font-medium">{getLabel(o)}</div>
              {getMeta && <div className="meta">{getMeta(o)}</div>}
            </div>
          ))}
          {allowCreate && query.trim() && !filtered.find(o => getLabel(o).toLowerCase() === query.toLowerCase().trim()) && (
            <div className={`suggest-item ${active === filtered.length ? 'active' : ''}`}
                 onMouseDown={createNew}
                 onMouseEnter={() => setActive(filtered.length)}>
              <span className="text-wax font-medium">+ Create</span> "{query.trim()}"
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Modal({ open, onClose, title, children, footer }) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={(e) => e.stopPropagation()}>
        <div className="px-6 pt-5 pb-3 border-b border-rule flex items-start justify-between">
          <h3 className="display text-2xl">{title}</h3>
          <button onClick={onClose} className="text-mute hover:text-ink text-xl leading-none">×</button>
        </div>
        <div className="px-6 py-4">{children}</div>
        {footer && <div className="px-6 py-4 border-t border-rule flex justify-end gap-2 bg-paper2/40">{footer}</div>}
      </div>
    </div>
  );
}

// ── QuickItemCreateModal ─────────────────────────────────────────────────────
// Pops up when "+ Create" is clicked on an item picker inside Sales / Purchases.
// Replicates the full Create Item form from Inventory Masters (F7), including
// inline quick-create for Unit, Super Category, and Sub Category.
// Everything created here is immediately persisted to state.
function QuickItemCreateModal({ open, initialName, state, setState, toast, onCreated, onClose }) {
  const [item, setItem] = useState({
    name: '', unitId: '', superCategoryId: '', subCategoryId: '',
    openingBalance: '', lastSalePrice: '', lastPurchasePrice: ''
  });

  // Reset + pre-fill name whenever the modal opens
  useEffect(() => {
    if (open) {
      setItem({
        name: initialName || '', unitId: '', superCategoryId: '', subCategoryId: '',
        openingBalance: '', lastSalePrice: '', lastPurchasePrice: ''
      });
    }
  }, [open]);

  // ── Inline creators — add to state immediately + select in form ──────────
  const quickCreateUnit = (name) => {
    const u = { id: uid('u'), name: name.trim() };
    setState(prev => ({ ...prev, units: [...prev.units, u] }));
    setItem(prev => ({ ...prev, unitId: u.id }));
    return u;
  };
  const quickCreateSuper = (name) => {
    const s = { id: uid('sc'), name: name.trim() };
    setState(prev => ({ ...prev, superCategories: [...prev.superCategories, s] }));
    setItem(prev => ({ ...prev, superCategoryId: s.id, subCategoryId: '' }));
    return s;
  };
  const quickCreateSub = (name) => {
    // Sub category inherits the currently-selected super category
    const s = { id: uid('sb'), name: name.trim(), superCategoryId: item.superCategoryId || '' };
    setState(prev => ({ ...prev, subCategories: [...prev.subCategories, s] }));
    setItem(prev => ({ ...prev, subCategoryId: s.id }));
    return s;
  };

  const saveItem = () => {
    if (!item.name.trim()) { toast('Item name required'); return; }
    const nameKey = item.name.trim().toLowerCase();
    if (state.items.some(x => x.name.trim().toLowerCase() === nameKey)) {
      toast(`Item "${item.name.trim()}" already exists`); return;
    }
    const newItem = {
      ...item,
      id: uid('it'),
      name: item.name.trim(),
      openingBalance: Number(item.openingBalance) || 0,
      lastSalePrice: Number(item.lastSalePrice) || 0,
      lastPurchasePrice: Number(item.lastPurchasePrice) || 0,
    };
    setState(prev => ({ ...prev, items: [...prev.items, newItem] }));
    onCreated(newItem);
    onClose();
    toast(`Item "${newItem.name}" created`);
  };

  // Filtered sub-cats based on selected super cat
  const filteredSubs = useMemo(() =>
    state.subCategories.filter(s => !item.superCategoryId || s.superCategoryId === item.superCategoryId),
    [state.subCategories, item.superCategoryId]
  );

  return (
    <div className="modal-bg" style={{ display: open ? 'flex' : 'none', zIndex: 150 }} onClick={onClose}>
      <div className="modal-card" style={{ maxWidth: 560 }} onClick={(e) => e.stopPropagation()}>
        <div className="px-6 pt-5 pb-3 border-b border-rule flex items-start justify-between">
          <div>
            <div className="smcap text-mute text-[10px] mb-0.5">Quick Create</div>
            <h3 className="display text-2xl">New Inventory Item</h3>
          </div>
          <button onClick={onClose} className="text-mute hover:text-ink text-xl leading-none">×</button>
        </div>
        {open && (
          <div className="px-6 py-4 space-y-4">
            {/* Item Name */}
            <div>
              <label className="smcap text-mute block mb-1">Item Name *</label>
              <input
                value={item.name}
                onChange={(e) => setItem(prev => ({ ...prev, name: e.target.value }))}
                className="w-full"
                placeholder="e.g. Helmet V12 Pro"
                autoFocus
              />
            </div>

            {/* Unit + Opening Balance */}
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Unit</label>
                <div className="text-[11px] text-mute italic mb-1">Type unit name, then pick or "+ Create"</div>
                <Picker
                  value={item.unitId}
                  onChange={(id) => setItem(prev => ({ ...prev, unitId: id }))}
                  options={state.units}
                  placeholder="Pcs / Kg / Ltr…"
                  allowCreate
                  onCreate={quickCreateUnit}
                />
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Opening Balance</label>
                <input
                  className="num w-full"
                  value={item.openingBalance}
                  onChange={(e) => setItem(prev => ({ ...prev, openingBalance: e.target.value }))}
                  placeholder="0"
                />
              </div>
            </div>

            {/* Super / Sub Category */}
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Super Category</label>
                <Picker
                  value={item.superCategoryId}
                  onChange={(id) => setItem(prev => ({ ...prev, superCategoryId: id, subCategoryId: '' }))}
                  options={state.superCategories}
                  placeholder="Accessories / Tyres…"
                  allowCreate
                  onCreate={quickCreateSuper}
                />
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Sub Category</label>
                <Picker
                  value={item.subCategoryId}
                  onChange={(id) => setItem(prev => ({ ...prev, subCategoryId: id }))}
                  options={filteredSubs}
                  placeholder="Helmets / MRF…"
                  allowCreate
                  onCreate={quickCreateSub}
                />
              </div>
            </div>

            {/* Default Prices */}
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Default Sale Price</label>
                <input
                  className="num w-full"
                  value={item.lastSalePrice}
                  onChange={(e) => setItem(prev => ({ ...prev, lastSalePrice: e.target.value }))}
                  placeholder="0.00"
                />
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Default Purchase Price</label>
                <input
                  className="num w-full"
                  value={item.lastPurchasePrice}
                  onChange={(e) => setItem(prev => ({ ...prev, lastPurchasePrice: e.target.value }))}
                  placeholder="0.00"
                />
              </div>
            </div>
          </div>
        )}
        <div className="px-6 py-4 border-t border-rule flex justify-end gap-2 bg-paper2/40">
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={saveItem} className="btn btn-primary">Create Item ↵</button>
        </div>
      </div>
    </div>
  );
}

function Toast({ msg, onDone }) {
  useEffect(() => {
    if (!msg) return;
    const t = setTimeout(onDone, 2400);
    return () => clearTimeout(t);
  }, [msg]);
  if (!msg) return null;
  return (
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] bg-ink text-paper px-5 py-3 rounded-sm shadow-lg text-sm font-medium animate-fadein">
      {msg}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// SALES SCREEN
// ──────────────────────────────────────────────────────────────────────────

function SalesScreen({ state, setState, toast, gotoReceipt }) {
  const nextCounter = state.counters.sales;
  const [voucherNo, setVoucherNo] = useState(() => String(state.counters.sales));
  const [voucherNoError, setVoucherNoError] = useState('');
  const [date, setDate] = useState(todayISO());
  const [customerId, setCustomerId] = useState('');
  const [customerName, setCustomerName] = useState('');
  const [address, setAddress] = useState('');
  const [contact, setContact] = useState('');
  const [billRefs, setBillRefs] = useState([]);
  const [lines, setLines] = useState([{ id: uid('ln'), itemId: '', qty: '', rate: '' }]);
  // linesRef mirrors lines, updated every render synchronously.
  // save() reads linesRef.current so it always has the latest value even if
  // React's concurrent mode hasn't committed the latest setLines yet.
  const linesRef = useRef(null);
  linesRef.current = lines;
  const [otherCharges, setOtherCharges] = useState([]); // [{ledgerId, amount}]
  const [narration, setNarration] = useState('');
  const [savedVoucher, setSavedVoucher] = useState(null);
  // Settlement — set after save(), shows settlement modal
  const [pendingSettlement, setPendingSettlement] = useState(null);
  // Quick-create item — which line triggered the modal + pre-fill name
  const [quickItemLineId, setQuickItemLineId]   = useState(null);
  const [quickItemName,   setQuickItemName]     = useState('');

  // Customer picker: Sundry Debtors only — Cash/Bank are not valid sales customers.
  const customers = useMemo(() =>
    state.ledgers.filter(l => l.groupId === 'g_sundry_dr'),
    [state.ledgers]);

  // Other-charge picker: Direct Income (preferred), other income, duties — NOT Current Liabilities.
  const otherChargeLedgers = useMemo(() => state.ledgers.filter(l => {
    const g = state.groups.find(x => x.id === l.groupId);
    return g && (g.nature === 'income' || g.id === 'g_duties');
  }), [state.ledgers, state.groups]);

  const total = useMemo(() => lines.reduce((s, l) => s + (Number(l.qty) || 0) * (Number(l.rate) || 0), 0), [lines]);
  const charges = useMemo(() => otherCharges.reduce((s, c) => s + (Number(c.amount) || 0), 0), [otherCharges]);
  const grand = total + charges;

  // Functional setters — avoid stale-closure overwrites when several fields are edited rapidly.
  const addLine = () => setLines(prev => [...prev, { id: uid('ln'), itemId: '', qty: '', rate: '' }]);
  const updateLine = (id, patch) => setLines(prev => prev.map(l => l.id === id ? { ...l, ...patch } : l));
  const removeLine = (id) => setLines(prev => prev.length > 1 ? prev.filter(l => l.id !== id) : prev);

  const addCharge = () => setOtherCharges(prev => [...prev, { id: uid('ch'), ledgerId: '', amount: '' }]);
  const updateCharge = (id, patch) => setOtherCharges(prev => prev.map(c => c.id === id ? { ...c, ...patch } : c));
  const removeCharge = (id) => setOtherCharges(prev => prev.filter(c => c.id !== id));

  // Auto-fill customer details on selection
  useEffect(() => {
    if (!customerId) return;
    const c = state.ledgers.find(l => l.id === customerId);
    if (c) {
      setCustomerName(c.name);
      if (c.address) setAddress(c.address);
      if (c.contact) setContact(c.contact);
    }
  }, [customerId]);

  const reset = () => {
    setCustomerId(''); setCustomerName(''); setAddress(''); setContact('');
    setLines([{ id: uid('ln'), itemId: '', qty: '', rate: '' }]);
    setOtherCharges([]); setNarration(''); setBillRefs([]);
    setSavedVoucher(null); setPendingSettlement(null);
    setDate(todayISO());
    setVoucherNo(String(state.counters.sales));
    setVoucherNoError('');
  };

  const save = () => {
    if (!customerName.trim()) { toast('Customer name required'); return; }

    // Belt-and-suspenders: read from linesRef.current (always the latest render's
    // lines) rather than the closure, in case React deferred this render in
    // concurrent mode and the closure is one render behind.
    const currentLines = linesRef.current;
    const validLines = currentLines.filter(l => l.itemId && Number(l.qty) > 0);
    if (validLines.length === 0) {
      const hasItem = currentLines.some(l => l.itemId);
      const hasQty  = currentLines.some(l => Number(l.qty) > 0);
      if (!hasItem)        toast('Pick an item from the dropdown — typing alone is not enough');
      else if (!hasQty)    toast('Enter a quantity (> 0) for the item');
      else                 toast('Each item needs both a name and a quantity');
      return;
    }

    // Negative-stock guard — soft warning only, save still proceeds.
    const negList = validLines.filter(l => {
      const it = state.items.find(i => i.id === l.itemId);
      if (!it) return false;
      return Number(l.qty) > stockBalance(state, l.itemId);
    });

    const next = { ...state };
    // Find/create customer (creation defaults to Sundry Debtors for credit-tracked customers)
    let custLedger = state.ledgers.find(l => l.id === customerId);
    if (!custLedger) {
      custLedger = findOrCreateParty(next, customerName, 'g_sundry_dr');
    } else {
      // Update party details (only for non-system, non-cash/bank parties)
      const idx = next.ledgers.findIndex(l => l.id === custLedger.id);
      if (!custLedger.locked) {
        next.ledgers[idx] = { ...custLedger, address, contact };
      }
    }

    const vNo = Number(voucherNo) || nextCounter;
    const isDup = state.vouchers.some(v => v.type === 'sales' && v.voucherNo === vNo);
    if (isDup) { setVoucherNoError(`Sales #${vNo} already exists`); toast(`Sales voucher #${vNo} already exists`); return; }
    setVoucherNoError('');
    const voucherId = uid('vch');
    const finalVoucherNo = vNo;
    const voucher = {
      id: voucherId, type: 'sales', voucherNo: finalVoucherNo, date,
      partyId: custLedger.id, partyName: customerName, address, contact,
      lines: validLines.map(l => ({ ...l })),
      otherCharges: otherCharges.filter(c => c.ledgerId && Number(c.amount) > 0),
      total, charges, grand, narration,
      billRefs: billRefs.filter(r => r.refNo || r.amount),
      createdAt: Date.now(),
    };
    next.vouchers = [...next.vouchers, voucher];
    const newCounter = Math.max(next.counters.sales, finalVoucherNo + 1);
    next.counters = { ...next.counters, sales: newCounter };

    // Update items with last sale price
    validLines.forEach(l => {
      const i = next.items.findIndex(it => it.id === l.itemId);
      if (i >= 0) next.items[i] = { ...next.items[i], lastSalePrice: Number(l.rate) };
    });

    // Ledger entries: Dr Customer (or Cash/Bank), Cr Sales (+ Cr Other charge ledgers)
    const entries = [
      { id: uid('le'), voucherId, ledgerId: custLedger.id, dr: grand, cr: 0, date, narration: `Sales — ${customerName}` },
      { id: uid('le'), voucherId, ledgerId: 'l_sales',     dr: 0, cr: total, date, narration: `Sales — ${customerName}` },
    ];
    voucher.otherCharges.forEach(c => {
      entries.push({ id: uid('le'), voucherId, ledgerId: c.ledgerId, dr: 0, cr: Number(c.amount), date, narration: `Sales charges — ${customerName}` });
    });
    next.ledgerEntries = [...next.ledgerEntries, ...entries];

    // Stock entries (sales = OUT)
    const stockEntries = validLines.map(l => ({
      id: uid('se'), voucherId, itemId: l.itemId, in: 0, out: Number(l.qty), rate: Number(l.rate), date
    }));
    next.stockEntries = [...next.stockEntries, ...stockEntries];

    setState(next);
    // Show settlement modal — operator chooses Cash / GPay / Part / Due
    // Note: settlement modal creates receipt entries on top of the already-saved sales entries.
    setPendingSettlement(voucher);
    if (negList.length > 0) {
      const names = negList.map(l => state.items.find(i => i.id === l.itemId)?.name).filter(Boolean).join(', ');
      toast(`Sales #${finalVoucherNo} saved · Warning: negative stock for ${names}`);
    } else {
      toast(`Sales #${finalVoucherNo} saved`);
    }
  };

  if (savedVoucher) {
    return <VoucherSaved voucher={savedVoucher} state={state} onNew={reset} onPay={() => gotoReceipt(savedVoucher)} />;
  }

  return (
    <div>
      <ScreenHeader title="Sales" voucherNo={voucherNo} onVoucherNoChange={setVoucherNo} voucherNoError={voucherNoError} voucherDate={date} onDateChange={setDate} />

      <div className="grid grid-cols-2 gap-x-8 gap-y-3 mb-4">
        <div>
          <label className="smcap text-mute block mb-1">Customer's Name</label>
          <Picker
            value={customerId}
            onChange={(id, opt) => { setCustomerId(id); if (opt) setCustomerName(opt.name); }}
            onTextChange={setCustomerName}
            options={customers}
            placeholder="Type to search or create…"
            allowCreate
            onCreate={(name) => {
              const created = { id: uid('l'), name, groupId: 'g_sundry_dr', openingBalance: 0, contact: '', address: '' };
              setState(prev => ({ ...prev, ledgers: [...prev.ledgers, created] }));
              setCustomerName(name);
              return created;
            }}
            getMeta={(o) => {
              const g = state.groups.find(gr => gr.id === o.groupId);
              const tag = g ? g.name : '';
              const ext = o.contact || o.address || '';
              return ext ? `${tag} · ${ext}` : tag;
            }}
            autoFocus
          />

        </div>
        <div>
          <label className="smcap text-mute block mb-1">Contact</label>
          <input value={contact} onChange={(e) => setContact(e.target.value)} className="w-full" placeholder="Phone" />
        </div>
        <div>
          <label className="smcap text-mute block mb-1">Address</label>
          <input value={address} onChange={(e) => setAddress(e.target.value)} className="w-full" placeholder="Address" />
        </div>

      </div>

      <div className="rule mb-4"></div>

      {customerId && (
        <BillWiseDetails
          billRefs={billRefs}
          onChange={setBillRefs}
          openBills={billwiseAgeing(state, customerId, date, 'customer').rows}
          grandTotal={grand}
        />
      )}
      {customerId && <div className="mb-4"></div>}

      <table className="ledger mb-4">
        <thead>
          <tr>
            <th style={{ width: '50%' }}>Item</th>
            <th style={{ width: '14%', textAlign: 'right' }}>Qty</th>
            <th style={{ width: '8%' }}>Unit</th>
            <th style={{ width: '14%', textAlign: 'right' }}>Rate</th>
            <th style={{ width: '14%', textAlign: 'right' }}>Total</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {lines.map((l, idx) => {
            const item = state.items.find(i => i.id === l.itemId);
            const unit = item ? state.units.find(u => u.id === item.unitId) : null;
            const lineTotal = (Number(l.qty) || 0) * (Number(l.rate) || 0);
            const stock = item ? stockBalance(state, item.id) : null;
            const wouldBeNegative = item && (Number(l.qty) || 0) > stock;
            return (
              <tr key={l.id}>
                <td>
                  <Picker
                    value={l.itemId}
                    onChange={(id, opt) => {
                      // FIX #6: l.rate captured from render closure may be stale.
                      // Use functional setLines to read the live line's rate.
                      setLines(prev => prev.map(ln => {
                        if (ln.id !== l.id) return ln;
                        const patch = { itemId: id };
                        if (opt && opt.lastSalePrice && !Number(ln.rate)) patch.rate = opt.lastSalePrice;
                        return { ...ln, ...patch };
                      }));
                    }}
                    options={state.items}
                    placeholder="Select item…"
                    getMeta={(o) => {
                      const u = state.units.find(u => u.id === o.unitId);
                      const s = stockBalance(state, o.id);
                      return `Stock: ${s} ${u?.name || ''} · last sold: ${o.lastSalePrice ? '₹' + inr(o.lastSalePrice) : '—'}`;
                    }}
                    allowCreate
                    onCreate={(name) => {
                      // Open quick-create modal — don't create inline
                      setQuickItemLineId(l.id);
                      setQuickItemName(name);
                      return undefined;
                    }}
                  />
                  {wouldBeNegative && (
                    <div className="mt-1">
                      <span className="chip chip-warn text-[10px]">⚠ negative stock — closing will be {stock - (Number(l.qty) || 0)}</span>
                    </div>
                  )}
                </td>
                <td><input className="num w-full" value={l.qty} onChange={(e) => updateLine(l.id, { qty: e.target.value })} /></td>
                <td className="text-mute text-sm">{unit?.name || '—'}</td>
                <td><input className="num w-full" value={l.rate} onChange={(e) => updateLine(l.id, { rate: e.target.value })} /></td>
                <td className="num text-right">{inr(lineTotal)}</td>
                <td>
                  <button onClick={() => removeLine(l.id)} className="text-mute hover:text-gold px-2">×</button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>

      <button onClick={addLine} className="btn btn-ghost mb-6">+ Add Item</button>

      <div className="grid grid-cols-2 gap-8">
        <div>
          <div className="smcap text-mute mb-2">Other Charges</div>
          {otherCharges.map(c => (
            <div key={c.id} className="flex gap-2 mb-2">
              <Picker
                value={c.ledgerId}
                onChange={(id) => updateCharge(c.id, { ledgerId: id })}
                options={otherChargeLedgers}
                placeholder="Delivery / Service Charge / etc."
                className="flex-1"
                allowCreate
                onCreate={(name) => {
                  // Other Charges create under Direct Income (income), NOT Current Liabilities.
                  const created = { id: uid('l'), name, groupId: 'g_direct_inc', openingBalance: 0 };
                  setState(prev => ({ ...prev, ledgers: [...prev.ledgers, created] }));
                  return created;
                }}
                getMeta={(o) => state.groups.find(g => g.id === o.groupId)?.name}
              />
              <input className="num w-32" value={c.amount} onChange={(e) => updateCharge(c.id, { amount: e.target.value })} placeholder="0.00" />
              <button onClick={() => removeCharge(c.id)} className="text-mute hover:text-gold px-2">×</button>
            </div>
          ))}
          <button onClick={addCharge} className="btn btn-ghost text-xs">+ Charge</button>

          <div className="mt-4">
            <div className="smcap text-mute mb-1">Narration</div>
            <textarea value={narration} onChange={(e) => setNarration(e.target.value)} rows={2} className="w-full" placeholder="" />
          </div>
        </div>

        <div className="bg-paper2/60 border border-rule rounded-sm p-5">
          <div className="flex justify-between py-2 border-b border-rule">
            <span className="text-sm">Subtotal</span>
            <span className="num">{inr(total)}</span>
          </div>
          <div className="flex justify-between py-2 border-b border-rule">
            <span className="text-sm">Other Charges</span>
            <span className="num">{inr(charges)}</span>
          </div>
          <div className="flex justify-between py-3 border-b-2 border-ink">
            <span className="display text-xl">Grand Total</span>
            <span className="num text-xl font-semibold">₹ {inr(grand)}</span>
          </div>
          <div className="mt-5 flex gap-2 justify-end">
            <button onClick={reset} className="btn btn-ghost">Clear</button>
            <button onClick={save} className="btn btn-primary">Save Voucher · ⏎</button>
          </div>
        </div>
      </div>

      {/* Quick Create Item modal — triggered by "+ Create" in item picker */}
      <QuickItemCreateModal
        open={!!quickItemLineId}
        initialName={quickItemName}
        state={state}
        setState={setState}
        toast={toast}
        onCreated={(newItem) => {
          setLines(prev => prev.map(ln => {
            if (ln.id !== quickItemLineId) return ln;
            const patch = { itemId: newItem.id };
            if (newItem.lastSalePrice && !Number(ln.rate)) patch.rate = newItem.lastSalePrice;
            return { ...ln, ...patch };
          }));
          setQuickItemLineId(null);
        }}
        onClose={() => setQuickItemLineId(null)}
      />

      {/* Settlement Modal — shown after saving a sales voucher */}
      <SettlementModal
        open={!!pendingSettlement}
        voucher={pendingSettlement}
        state={state}
        setState={setState}
        toast={toast}
        onSettled={() => { setSavedVoucher(pendingSettlement); setPendingSettlement(null); }}
        onDue={()     => { setSavedVoucher(pendingSettlement); setPendingSettlement(null); }}
        onClear={()   => { setPendingSettlement(null); reset(); }}
      />
    </div>
  );
}

function VoucherSaved({ voucher, state, onNew, onPay }) {
  const allowReceipt = voucher.type === 'sales';
  return (
    <div className="max-w-2xl mx-auto py-8">
      <div className="flex items-center gap-4 mb-4">
        <div className="seal text-base">Saved</div>
        <div>
          <div className="smcap text-mute">{voucher.type}</div>
          <h2 className="display text-3xl">Voucher #{voucher.voucherNo}</h2>
          <div className="text-mute text-sm">{fmtDate(voucher.date)}{voucher.createdAt ? ' · ' + fmtTime(voucher.createdAt) : ''} · ₹ {inr(voucher.grand || voucher.amount || 0)}</div>
        </div>
      </div>
      <div className="rule mb-4"></div>
      <p className="text-sm mb-2"><span className="text-mute">Party · </span>{voucher.partyName || '—'}</p>
      {voucher.lines && (
        <div className="text-sm mb-4">
          {voucher.lines.map((l, i) => {
            const item = state.items.find(it => it.id === l.itemId);
            return <div key={i} className="flex justify-between py-1 border-b border-rule">
              <span>{item?.name || '—'}</span>
              <span className="num">{l.qty} × ₹{inr(l.rate)} = ₹{inr((Number(l.qty)||0)*(Number(l.rate)||0))}</span>
            </div>;
          })}
        </div>
      )}
      {voucher.billRefs && voucher.billRefs.length > 0 && (
        <div className="mb-4">
          <BillWiseDetails billRefs={voucher.billRefs} onChange={() => {}} openBills={[]} grandTotal={voucher.grand} readOnly />
        </div>
      )}
      <div className="flex gap-2 justify-end">
        <button onClick={() => window.print()} className="btn btn-ghost">Print</button>
        {allowReceipt && <button onClick={onPay} className="btn btn-ghost">Settle in Receipt · F4</button>}
        <button onClick={onNew} className="btn btn-primary">New Voucher</button>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// SETTLEMENT MODAL
// Shown immediately after saving a Sales voucher.
// Lets the operator settle the bill as Cash / GPay / Part Payment / Due.
// Double-entry: Dr Cash|GPay, Cr Customer (Receipt voucher created inline).
// ──────────────────────────────────────────────────────────────────────────
function SettlementModal({ open, voucher, state, setState, toast, onSettled, onDue, onClear }) {
  const [mode, setMode] = useState('choose'); // 'choose'|'cash'|'gpay'|'part'
  const [cashAmt, setCashAmt]   = useState('');
  const [gpayAmt, setGpayAmt]   = useState('');
  const [partCash, setPartCash] = useState('');
  const [partGpay, setPartGpay] = useState('');

  const grand = voucher ? (Number(voucher.grand) || 0) : 0;
  const partDue = useMemo(() => {
    const d = grand - (Number(partCash) || 0) - (Number(partGpay) || 0);
    return d < 0 ? 0 : d;
  }, [grand, partCash, partGpay]);

  useEffect(() => {
    if (open) {
      setMode('choose');
      setCashAmt(grand.toFixed(2));
      setGpayAmt(grand.toFixed(2));
      setPartCash('');
      setPartGpay('');
    }
  }, [open, grand]);

  if (!open || !voucher) return null;

  // ── Find or create GPay ledger ────────────────────────────────────────
  const getOrCreateGPayLedger = (nextState) => {
    let gpay = nextState.ledgers.find(l =>
      /gpay|g-pay|google.?pay/i.test(l.name)
    );
    if (!gpay) {
      gpay = { id: 'l_gpay', name: 'GPay', groupId: 'g_bank', openingBalance: 0, locked: false };
      nextState.ledgers = [...nextState.ledgers, gpay];
    }
    return gpay;
  };

  // ── Core — create one receipt voucher (Dr accountId, Cr customer) ─────
  const makeReceipt = (nextState, accountLedgerId, amount, note) => {
    const voucherId = uid('vch');
    const rNo = nextState.counters.receipt;
    const receipt = {
      id: voucherId, type: 'receipt', voucherNo: rNo,
      date: voucher.date,
      partyId: voucher.partyId, partyName: voucher.partyName,
      grand: amount, narration: note, createdAt: Date.now(),
      settledFor: voucher.id,
    };
    nextState.vouchers = [...nextState.vouchers, receipt];
    nextState.counters = { ...nextState.counters, receipt: rNo + 1 };
    nextState.ledgerEntries = [
      ...nextState.ledgerEntries,
      { id: uid('le'), voucherId, ledgerId: accountLedgerId, dr: amount, cr: 0,      date: voucher.date, narration: note },
      { id: uid('le'), voucherId, ledgerId: voucher.partyId,  dr: 0,      cr: amount, date: voucher.date, narration: note },
    ];
  };

  // ── Settle handlers ───────────────────────────────────────────────────
  const settleCash = () => {
    const amt = Number(cashAmt);
    if (!amt || amt <= 0 || amt > grand + 0.005) { toast('Invalid amount'); return; }
    const next = { ...state, ledgers: [...state.ledgers], vouchers: [...state.vouchers], ledgerEntries: [...state.ledgerEntries], counters: { ...state.counters } };
    makeReceipt(next, 'l_cash', amt, `Cash receipt — Sales #${voucher.voucherNo}`);
    setState(next);
    toast(`₹ ${inr(amt)} settled in Cash`);
    onSettled();
  };

  const settleGpay = () => {
    const amt = Number(gpayAmt);
    if (!amt || amt <= 0 || amt > grand + 0.005) { toast('Invalid amount'); return; }
    const next = { ...state, ledgers: [...state.ledgers], vouchers: [...state.vouchers], ledgerEntries: [...state.ledgerEntries], counters: { ...state.counters } };
    const gpay = getOrCreateGPayLedger(next);
    makeReceipt(next, gpay.id, amt, `GPay receipt — Sales #${voucher.voucherNo}`);
    setState(next);
    toast(`₹ ${inr(amt)} settled via GPay`);
    onSettled();
  };

  const settlePart = () => {
    const cash = Number(partCash) || 0;
    const gpay = Number(partGpay) || 0;
    const due  = partDue;
    if (cash < 0 || gpay < 0 || due < 0) { toast('Amounts cannot be negative'); return; }
    if (cash + gpay + due < 0.005) { toast('Enter at least one payment amount'); return; }
    if (Math.abs(cash + gpay + due - grand) > 0.5) { toast(`Cash + GPay + Due must total ₹${inr(grand)}`); return; }

    const next = { ...state, ledgers: [...state.ledgers], vouchers: [...state.vouchers], ledgerEntries: [...state.ledgerEntries], counters: { ...state.counters } };
    if (cash > 0) makeReceipt(next, 'l_cash', cash, `Cash part — Sales #${voucher.voucherNo}`);
    if (gpay > 0) {
      const gpayL = getOrCreateGPayLedger(next);
      makeReceipt(next, gpayL.id, gpay, `GPay part — Sales #${voucher.voucherNo}`);
    }
    // 'due' stays as open receivable — no entry needed
    setState(next);
    const parts = [];
    if (cash > 0) parts.push(`Cash ₹${inr(cash)}`);
    if (gpay > 0) parts.push(`GPay ₹${inr(gpay)}`);
    if (due  > 0) parts.push(`Due ₹${inr(due)}`);
    toast(`Settlement: ${parts.join(' · ')}`);
    onSettled();
  };

  // ── Styles ────────────────────────────────────────────────────────────
  const btnSettle = 'flex flex-col items-center justify-center gap-1.5 rounded-sm border-2 p-4 cursor-pointer transition-all hover:scale-105 active:scale-95 font-semibold text-sm uppercase tracking-wider select-none';

  // ── Render ────────────────────────────────────────────────────────────
  return (
    <div className="modal-bg" style={{ zIndex: 120 }}>
      <div className="modal-card" style={{ maxWidth: 480 }} onClick={(e) => e.stopPropagation()}>

        {/* Header */}
        <div className="px-6 pt-5 pb-3 border-b border-rule">
          <div className="smcap text-mute text-[10px] mb-0.5">Sales #{voucher.voucherNo} · {voucher.partyName}</div>
          <div className="flex items-baseline gap-3">
            <h3 className="display text-2xl">Settle Bill</h3>
            <span className="num text-2xl font-semibold text-wax">₹ {inr(grand)}</span>
          </div>
        </div>

        <div className="px-6 py-5">
          {/* ── MODE: CHOOSE ────────────────────────────────────────── */}
          {mode === 'choose' && (
            <div>
              <div className="smcap text-mute mb-3">How was this paid?</div>
              <div className="grid grid-cols-2 gap-3 mb-4">
                {/* CASH */}
                <button
                  className={btnSettle + ' border-ok/60 text-ok hover:bg-ok/10'}
                  onClick={() => { setCashAmt(grand.toFixed(2)); setMode('cash'); }}
                >
                  <span className="text-2xl">💵</span>
                  <span>Cash</span>
                  <span className="num text-[11px] font-normal text-mute">Petty Cash A/c</span>
                </button>

                {/* GPAY */}
                <button
                  className={btnSettle + ' border-wax/60 text-wax hover:bg-wax/10'}
                  onClick={() => { setGpayAmt(grand.toFixed(2)); setMode('gpay'); }}
                >
                  <span className="text-2xl">📲</span>
                  <span>GPay</span>
                  <span className="num text-[11px] font-normal text-mute">GPay A/c</span>
                </button>

                {/* PART PAYMENT */}
                <button
                  className={btnSettle + ' border-border2 text-ink2 hover:bg-paper2/60 col-span-2'}
                  onClick={() => setMode('part')}
                >
                  <span className="text-xl">⚖️</span>
                  <span>Part Payment</span>
                  <span className="text-[11px] font-normal text-mute normal-case tracking-normal">Split between Cash, GPay & Due</span>
                </button>
              </div>

              <div className="grid grid-cols-2 gap-3">
                {/* DUE */}
                <button
                  className={btnSettle + ' border-gold/50 text-gold hover:bg-gold/10'}
                  onClick={onDue}
                >
                  <span className="text-xl">📋</span>
                  <span>Due</span>
                  <span className="text-[11px] font-normal text-mute normal-case tracking-normal">Sundry Debtor</span>
                </button>

                {/* CLEAR */}
                <button
                  className={btnSettle + ' border-border2 text-mute hover:bg-paper2/60'}
                  onClick={onClear}
                >
                  <span className="text-xl">🗑</span>
                  <span>Clear</span>
                  <span className="text-[11px] font-normal normal-case tracking-normal">New voucher</span>
                </button>
              </div>
            </div>
          )}

          {/* ── MODE: CASH ──────────────────────────────────────────── */}
          {mode === 'cash' && (
            <div className="space-y-4">
              <div className="bg-ok/10 border border-ok/30 rounded-sm px-4 py-3 flex items-center gap-3">
                <span className="text-2xl">💵</span>
                <div>
                  <div className="smcap text-mute text-[10px]">Cash Receipt</div>
                  <div className="text-sm">Amount will be added to <strong>Cash in Hand</strong></div>
                </div>
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Amount Received (₹)</label>
                <input
                  className="num w-full text-xl"
                  value={cashAmt}
                  onChange={(e) => setCashAmt(e.target.value)}
                  autoFocus
                  onFocus={(e) => e.target.select()}
                />
                {Number(cashAmt) < grand - 0.005 && Number(cashAmt) > 0 && (
                  <div className="text-xs text-gold mt-1">
                    Partial — ₹ {inr(grand - Number(cashAmt))} will remain due
                  </div>
                )}
              </div>
              <div className="flex gap-2 justify-end">
                <button onClick={() => setMode('choose')} className="btn btn-ghost">← Back</button>
                <button onClick={settleCash} className="btn btn-primary">Settle Cash ↵</button>
              </div>
            </div>
          )}

          {/* ── MODE: GPAY ──────────────────────────────────────────── */}
          {mode === 'gpay' && (
            <div className="space-y-4">
