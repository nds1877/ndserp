// ──────────────────────────────────────────────────────────────────────────
// EXCEL IMPORT MODAL — bulk entry via .xlsx template
// ──────────────────────────────────────────────────────────────────────────
// Template columns (row 1 = headers):
//   Type | Date(DD-MM-YYYY) | VoucherNo | Party | Account | LedgerDr | LedgerCr | Amount | ItemName | Qty | Rate | Narration | BillRef | BillType
//
// Type must be: Sales | Purchase | Payment | Receipt | Journal
// For Sales/Purchase: ItemName, Qty, Rate are used (one row per line item)
// For Payment/Receipt: Account (cash/bank), Party (vendor/customer), Amount
// For Journal: LedgerDr, LedgerCr, Amount

function ExcelImportModal({ open, onClose, state, setState, toast }) {
  const [rows, setRows] = useState([]);
  const [errors, setErrors] = useState([]);
  const [preview, setPreview] = useState(false);
  const [importing, setImporting] = useState(false);

  const reset = () => { setRows([]); setErrors([]); setPreview(false); };

  const downloadTemplate = () => {
    if (typeof XLSX === 'undefined') { toast('XLSX library not loaded'); return; }
    const wb = XLSX.utils.book_new();
    const headers = ['Type','Date','VoucherNo','Party','Account','LedgerDr','LedgerCr','Amount','ItemName','Qty','Rate','Narration','BillRef','BillType'];
    const sample = [
      ['Sales','01-04-2025','','Ramesh Kumar','','','','','Kaju Katli','2','850','','SB-001','New Ref'],
      ['Purchase','02-04-2025','','Gupta Suppliers','','','','','Raw Sugar','50','45','','',''],
      ['Payment','03-04-2025','','Gupta Suppliers','Cash in Hand','','','2250','','','','April payment','','Agst Ref'],
      ['Receipt','04-04-2025','','Ramesh Kumar','Cash in Hand','','','1700','','','','','',''],
      ['Journal','05-04-2025','','','','Rent Expense','Bank Account','5000','','','','April rent','',''],
    ];
    const ws = XLSX.utils.aoa_to_sheet([headers, ...sample]);
    ws['!cols'] = headers.map(() => ({ wch: 18 }));
    XLSX.utils.book_append_sheet(wb, ws, 'Transactions');
    XLSX.writeFile(wb, 'NDS_Import_Template.xlsx');
  };

  const parseFile = (file) => {
    if (typeof XLSX === 'undefined') { toast('XLSX library not loaded'); return; }
    reset();
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: false });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        if (raw.length < 2) { toast('Empty sheet'); return; }
        const hdrs = raw[0].map(h => String(h).trim());
        const required = ['Type','Date','Amount'];
        const missing = required.filter(h => !hdrs.includes(h));
        if (missing.length) { toast(`Missing columns: ${missing.join(', ')}`); return; }
        const parsed = [];
        for (let i = 1; i < raw.length; i++) {
          const row = raw[i];
          if (row.every(c => c === '' || c === null || c === undefined)) continue;
          const obj = {};
          hdrs.forEach((h, idx) => { obj[h] = String(row[idx] || '').trim(); });
          parsed.push({ rowNum: i + 1, ...obj });
        }
        setRows(parsed);
        setPreview(true);
      } catch (err) { toast('Could not parse file: ' + err.message); }
    };
    reader.readAsBinaryString(file);
  };

  const parseDate = (str) => {
    // Accepts DD-MM-YYYY, DD/MM/YYYY, YYYY-MM-DD
    if (!str) return '';
    const parts = str.includes('-') ? str.split('-') : str.split('/');
    if (parts.length === 3) {
      if (parts[0].length === 4) return str.replace(/\//g, '-'); // ISO
      if (parts[2].length === 4) return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
    }
    return todayISO();
  };

  const doImport = () => {
    if (rows.length === 0) return;
    setImporting(true);
    const errs = [];
    let next = { ...state,
      vouchers: [...state.vouchers],
      ledgerEntries: [...state.ledgerEntries],
      stockEntries: [...state.stockEntries],
      items: [...state.items],
      ledgers: [...state.ledgers],
      counters: { ...state.counters },
    };

    // Group rows by Type+Date+VoucherNo+Party (same key = same voucher)
    const groups = {};
    rows.forEach((r, idx) => {
      const key = [r.Type, r.Date, r.VoucherNo, r.Party].join('||');
      if (!groups[key]) groups[key] = [];
      groups[key].push({ ...r, _idx: idx });
    });

    Object.values(groups).forEach((grp) => {
      const r0 = grp[0];
      const type = r0.Type.toLowerCase();
      const date = parseDate(r0.Date) || todayISO();
      const amt = Number(r0.Amount) || 0;
      const narration = r0.Narration || '';
      const billRef = r0.BillRef || '';
      const billType = (r0.BillType || 'new').toLowerCase().includes('agst') ? 'against' : 'new';
      const billRefs = billRef ? [{ id: uid('br'), type: billType, refNo: billRef, amount: String(amt) }] : [];

      try {
        if (type === 'sales') {
          const partyName = r0.Party;
          if (!partyName) { errs.push(`Row ${r0.rowNum}: Party required for Sales`); return; }
          let party = next.ledgers.find(l => l.name.toLowerCase() === partyName.toLowerCase() && l.groupId === 'g_sundry_dr');
          if (!party) { party = findOrCreateParty(next, partyName, 'g_sundry_dr'); }
          const lines = grp.map(r => {
            const item = next.items.find(i => i.name.toLowerCase() === r.ItemName.toLowerCase());
            if (!item && r.ItemName) {
              next.items.push({ id: uid('it'), name: r.ItemName, unitId: '', openingBalance: 0 });
            }
            const it = next.items.find(i => i.name.toLowerCase() === r.ItemName.toLowerCase());
            return { id: uid('ln'), itemId: it?.id || '', qty: Number(r.Qty)||1, rate: Number(r.Rate)||0 };
          }).filter(l => l.itemId);
          if (lines.length === 0) { errs.push(`Row ${r0.rowNum}: No valid items for Sales`); return; }
          const grandTotal = lines.reduce((s,l) => s + l.qty*l.rate, 0) || amt;
          const customVNo = r0.VoucherNo ? Number(r0.VoucherNo) : next.counters.sales;
          const isDup = next.vouchers.some(v => v.type === 'sales' && v.voucherNo === customVNo);
          if (isDup) { errs.push(`Row ${r0.rowNum}: Sales #${customVNo} duplicate, skipped`); return; }
          const vId = uid('vch');
          next.vouchers.push({ id: vId, type: 'sales', voucherNo: customVNo, date, partyId: party.id, partyName, lines, grand: grandTotal, narration, billRefs, createdAt: Date.now() });
          next.counters.sales = Math.max(next.counters.sales, customVNo + 1);
          next.ledgerEntries.push({ id: uid('le'), voucherId: vId, ledgerId: party.id, dr: grandTotal, cr: 0, date, narration });
          next.ledgerEntries.push({ id: uid('le'), voucherId: vId, ledgerId: 'l_sales', dr: 0, cr: grandTotal, date, narration });
          lines.forEach(l => next.stockEntries.push({ id: uid('se'), voucherId: vId, itemId: l.itemId, in: 0, out: l.qty, rate: l.rate, date }));

        } else if (type === 'purchase') {
          const partyName = r0.Party;
          if (!partyName) { errs.push(`Row ${r0.rowNum}: Party required for Purchase`); return; }
          let party = next.ledgers.find(l => l.name.toLowerCase() === partyName.toLowerCase() && l.groupId === 'g_sundry_cr');
          if (!party) { party = findOrCreateParty(next, partyName, 'g_sundry_cr'); }
          const lines = grp.map(r => {
            let item = next.items.find(i => i.name.toLowerCase() === r.ItemName.toLowerCase());
            if (!item && r.ItemName) { item = { id: uid('it'), name: r.ItemName, unitId: '', openingBalance: 0 }; next.items.push(item); }
            return { id: uid('ln'), itemId: item?.id || '', qty: Number(r.Qty)||1, rate: Number(r.Rate)||0 };
          }).filter(l => l.itemId);
          if (lines.length === 0) { errs.push(`Row ${r0.rowNum}: No valid items for Purchase`); return; }
          const grandTotal = lines.reduce((s,l) => s + l.qty*l.rate, 0) || amt;
          const customVNo = r0.VoucherNo ? Number(r0.VoucherNo) : next.counters.purchase;
          const isDup = next.vouchers.some(v => v.type === 'purchase' && v.voucherNo === customVNo);
          if (isDup) { errs.push(`Row ${r0.rowNum}: Purchase #${customVNo} duplicate, skipped`); return; }
          const vId = uid('vch');
          next.vouchers.push({ id: vId, type: 'purchase', voucherNo: customVNo, date, partyId: party.id, partyName, lines, grand: grandTotal, narration, billRefs, createdAt: Date.now() });
          next.counters.purchase = Math.max(next.counters.purchase, customVNo + 1);
          next.ledgerEntries.push({ id: uid('le'), voucherId: vId, ledgerId: 'l_purchase', dr: grandTotal, cr: 0, date, narration });
          next.ledgerEntries.push({ id: uid('le'), voucherId: vId, ledgerId: party.id, dr: 0, cr: grandTotal, date, narration });
          lines.forEach(l => next.stockEntries.push({ id: uid('se'), voucherId: vId, itemId: l.itemId, in: l.qty, out: 0, rate: l.rate, date }));

        } else if (type === 'payment' || type === 'receipt') {
          const isPayment = type === 'payment';
          const partyName = r0.Party;
          const accName = r0.Account;
          if (!partyName && !r0.LedgerDr) { errs.push(`Row ${r0.rowNum}: Party or Expense Ledger required`); return; }
          const accLedger = next.ledgers.find(l => l.name.toLowerCase() === (accName||'cash in hand').toLowerCase())
                         || next.ledgers.find(l => l.id === 'l_cash');
          let counterLedger;
          if (partyName) {
            const gid = isPayment ? 'g_sundry_cr' : 'g_sundry_dr';
            counterLedger = next.ledgers.find(l => l.name.toLowerCase() === partyName.toLowerCase()) || findOrCreateParty(next, partyName, gid);
          } else {
            const expName = r0.LedgerDr || r0.LedgerCr;
            counterLedger = next.ledgers.find(l => l.name.toLowerCase() === expName.toLowerCase());
            if (!counterLedger) { errs.push(`Row ${r0.rowNum}: Ledger "${expName}" not found`); return; }
          }
          if (!amt) { errs.push(`Row ${r0.rowNum}: Amount required`); return; }
          const cKey = isPayment ? 'payment' : 'receipt';
          const customVNo = r0.VoucherNo ? Number(r0.VoucherNo) : next.counters[cKey];
          const isDup = next.vouchers.some(v => v.type === type && v.voucherNo === customVNo);
          if (isDup) { errs.push(`Row ${r0.rowNum}: ${type} #${customVNo} duplicate, skipped`); return; }
          const vId = uid('vch');
          next.vouchers.push({ id: vId, type, voucherNo: customVNo, date, partyId: counterLedger.id, partyName: counterLedger.name, accountId: accLedger?.id, grand: amt, narration, billRefs, createdAt: Date.now() });
          next.counters[cKey] = Math.max(next.counters[cKey], customVNo + 1);
          if (isPayment) {
            next.ledgerEntries.push({ id: uid('le'), voucherId: vId, ledgerId: counterLedger.id, dr: amt, cr: 0, date, narration });
            next.ledgerEntries.push({ id: uid('le'), voucherId: vId, ledgerId: accLedger?.id || 'l_cash', dr: 0, cr: amt, date, narration });
          } else {
            next.ledgerEntries.push({ id: uid('le'), voucherId: vId, ledgerId: accLedger?.id || 'l_cash', dr: amt, cr: 0, date, narration });
            next.ledgerEntries.push({ id: uid('le'), voucherId: vId, ledgerId: counterLedger.id, dr: 0, cr: amt, date, narration });
          }

        } else if (type === 'journal') {
          const drName = r0.LedgerDr;
          const crName = r0.LedgerCr;
          const drLedger = next.ledgers.find(l => l.name.toLowerCase() === drName.toLowerCase());
          const crLedger = next.ledgers.find(l => l.name.toLowerCase() === crName.toLowerCase());
          if (!drLedger) { errs.push(`Row ${r0.rowNum}: Dr ledger "${drName}" not found`); return; }
          if (!crLedger) { errs.push(`Row ${r0.rowNum}: Cr ledger "${crName}" not found`); return; }
          if (!amt) { errs.push(`Row ${r0.rowNum}: Amount required`); return; }
          const customVNo = r0.VoucherNo ? Number(r0.VoucherNo) : next.counters.journal;
          const isDup = next.vouchers.some(v => v.type === 'journal' && v.voucherNo === customVNo);
          if (isDup) { errs.push(`Row ${r0.rowNum}: Journal #${customVNo} duplicate, skipped`); return; }
          const vId = uid('vch');
          next.vouchers.push({ id: vId, type: 'journal', voucherNo: customVNo, date, drId: drLedger.id, crId: crLedger.id, drName, crName, grand: amt, narration, billRefs, createdAt: Date.now() });
          next.counters.journal = Math.max(next.counters.journal, customVNo + 1);
          next.ledgerEntries.push({ id: uid('le'), voucherId: vId, ledgerId: drLedger.id, dr: amt, cr: 0, date, narration });
          next.ledgerEntries.push({ id: uid('le'), voucherId: vId, ledgerId: crLedger.id, dr: 0, cr: amt, date, narration });

        } else {
          errs.push(`Row ${r0.rowNum}: Unknown type "${r0.Type}"`);
        }
      } catch(ex) {
        errs.push(`Row ${r0.rowNum}: ${ex.message}`);
      }
    });

    setErrors(errs);
    setState(next);
    setImporting(false);
    const imported = Object.keys(groups).length - errs.length;
    toast(`Imported ${imported} voucher(s)${errs.length ? ` · ${errs.length} error(s)` : ''}`);
    if (errs.length === 0) { reset(); onClose(); }
  };

  if (!open) return null;
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" style={{maxWidth:680}} onClick={e => e.stopPropagation()}>
        <div className="px-6 pt-5 pb-3 border-b border-rule flex items-start justify-between">
          <div>
            <h3 className="display text-2xl">Import Excel</h3>
            <p className="text-xs text-mute mt-1">Bulk-import Sales, Purchase, Payment, Receipt &amp; Journal entries from an .xlsx file</p>
          </div>
          <button onClick={onClose} className="text-mute hover:text-ink text-xl leading-none">×</button>
        </div>
        <div className="px-6 py-4">
          {!preview && (
            <div className="space-y-4">
              <div className="bg-paper2/50 border border-rule rounded-sm p-4 text-sm">
                <p className="font-semibold mb-2">Template columns:</p>
                <div className="text-xs text-mute font-mono leading-6">
                  Type · Date (DD-MM-YYYY) · VoucherNo · Party · Account · LedgerDr · LedgerCr · Amount · ItemName · Qty · Rate · Narration · BillRef · BillType
                </div>
                <p className="text-xs text-mute mt-2">One row per line item for Sales/Purchase. Same Type+Date+Party = same voucher.</p>
              </div>
              <button onClick={downloadTemplate} className="btn btn-ghost">⬇ Download Template</button>
              <div>
                <label className="smcap text-mute block mb-1">Select .xlsx File</label>
                <input type="file" accept=".xlsx,.xls,.csv" className="w-full text-sm"
                  onChange={e => e.target.files[0] && parseFile(e.target.files[0])} />
              </div>
            </div>
          )}
          {preview && (
            <div>
              <div className="flex justify-between items-center mb-3">
                <span className="smcap text-mute">{rows.length} rows parsed</span>
                <button onClick={reset} className="text-xs text-wax">← Back</button>
              </div>
              <div className="overflow-auto max-h-56 border border-rule rounded-sm mb-3">
                <table className="ledger" style={{fontSize:11}}>
                  <thead><tr><th>#</th><th>Type</th><th>Date</th><th>Party / Ledger</th><th>Amount</th><th>Item</th></tr></thead>
                  <tbody>
                    {rows.slice(0,50).map((r,i) => (
                      <tr key={i}>
                        <td className="text-mute">{r.rowNum}</td>
                        <td>{r.Type}</td>
                        <td>{r.Date}</td>
                        <td>{r.Party || r.LedgerDr || '—'}</td>
                        <td className="num">{r.Amount}</td>
                        <td>{r.ItemName || '—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {errors.length > 0 && (
                <div className="mb-3 p-3 bg-paper2 border border-rule rounded-sm max-h-32 overflow-auto">
                  <div className="smcap text-mute mb-1">{errors.length} Error(s)</div>
                  {errors.map((e,i) => <div key={i} className="text-xs" style={{color:'var(--danger)'}}>{e}</div>)}
                </div>
              )}
            </div>
          )}
        </div>
        {preview && (
          <div className="px-6 py-4 border-t border-rule flex justify-end gap-2 bg-paper2/40">
            <button onClick={onClose} className="btn btn-ghost">Cancel</button>
            <button onClick={doImport} disabled={importing} className="btn btn-primary">
              {importing ? 'Importing…' : `Import ${rows.length} rows`}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}


function App() {
  const [state, setStateRaw] = useState(loadStateLocal);
  const [screen, setScreen] = useState('SALES');
  const [toastMsg, setToastMsg] = useState('');
  const [receiptPrefill, setReceiptPrefill] = useState(null);
  const [reportJumpTo, setReportJumpTo] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showBackups, setShowBackups] = useState(false);
  const [viewingSnap, setViewingSnap] = useState(null); // { snapshot, date }

  // Auth: 'loading' | 'login' | 'ready' | 'local-fallback'
  const [authPhase, setAuthPhase] = useState(() => cloudReady() ? 'loading' : 'local-fallback');
  const [user, setUser] = useState(null);

  // Sync: 'idle' | 'syncing' | 'offline' | 'error' | 'local'
  const [syncStatus, setSyncStatus] = useState(cloudReady() ? 'syncing' : 'local');
  const [lastSyncAt, setLastSyncAt] = useState(0);
  const [autoDownload, setAutoDownload] = useState(() => localStorage.getItem(AUTO_DL_PREF_KEY) === '1');

  const debounceRef = useRef(null);
  const lastWrittenPayloadRef = useRef(null);  // Last payload we wrote to Firestore
  const lastReceivedPayloadRef = useRef(null); // Last payload received from listener
  const initializedRef = useRef(false);

  const toast = useCallback((m) => setToastMsg(m), []);

  // ── Auth listener ────────────────────────────────────────────────────────
  useEffect(() => {
    if (!cloudReady()) return;
    const unsub = fbAuth().onAuthStateChanged((u) => {
      setUser(u);
      setAuthPhase(u ? 'ready' : 'login');
    }, (err) => {
      console.error('Auth listener error:', err);
      setAuthPhase('local-fallback');
    });
    return unsub;
  }, []);

  // ── Firestore real-time subscription ─────────────────────────────────────
  useEffect(() => {
    if (!cloudReady() || !user) return;
    const ref = fbDB().doc(FIRESTORE_DOC_PATH);

    const unsub = ref.onSnapshot(
      (snap) => {
        const fromCache = snap.metadata && snap.metadata.fromCache;
        if (snap.exists) {
          const data = snap.data();
          const payload = data && data.payload;
          if (payload) {
            // Skip if it's our own write echoing back
            if (lastWrittenPayloadRef.current === payload) {
              setSyncStatus(fromCache ? 'offline' : 'idle');
              setLastSyncAt(Date.now());
              initializedRef.current = true;
              return;
            }
            // Skip if identical to what we already have
            if (lastReceivedPayloadRef.current === payload) {
              setSyncStatus(fromCache ? 'offline' : 'idle');
              return;
            }
            try {
              const remote = normalizeState(JSON.parse(payload));
              lastReceivedPayloadRef.current = payload;
              setStateRaw(remote);
              saveStateLocal(remote);
              captureSnapshotIfNeeded(remote);
              if (!initializedRef.current) {
                triggerDailyAutoDownload(remote);
                initializedRef.current = true;
              }
            } catch (e) {
              console.error('Failed to parse Firestore payload', e);
            }
          }
        } else {
          // First time — push current local state to seed Firestore
          if (!initializedRef.current) {
            const seed = JSON.stringify(state);
            ref.set({
              payload: seed,
              updatedAt: fbNS().firestore.FieldValue.serverTimestamp(),
              updatedBy: user.email || 'unknown',
              version: 1,
            }).then(() => {
              lastWrittenPayloadRef.current = seed;
              initializedRef.current = true;
            }).catch(err => console.error('Seed write failed:', err));
          }
        }
        setSyncStatus(fromCache ? 'offline' : 'idle');
        setLastSyncAt(Date.now());
      },
      (err) => {
        console.error('Firestore listen error:', err);
        setSyncStatus('error');
      }
    );
    return unsub;
  }, [user]); // eslint-disable-line

  // ── setState — write-through to local + (debounced) Firestore ────────────
  const setState = useCallback((s) => {
    setStateRaw(prev => {
      const next = typeof s === 'function' ? s(prev) : s;
      // Mirror to localStorage immediately (instant cache, offline survival)
      saveStateLocal(next);
      // Capture daily snapshot if it's a new day
      captureSnapshotIfNeeded(next);

      if (cloudReady() && user) {
        setSyncStatus('syncing');
        if (debounceRef.current) clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(() => {
          const payload = JSON.stringify(next);
          // Avoid no-op writes
          if (lastWrittenPayloadRef.current === payload) {
            setSyncStatus('idle');
            return;
          }
          fbDB().doc(FIRESTORE_DOC_PATH).set({
            payload,
            updatedAt: fbNS().firestore.FieldValue.serverTimestamp(),
            updatedBy: (user && user.email) || 'unknown',
            version: 1,
          }).then(() => {
            lastWrittenPayloadRef.current = payload;
            setSyncStatus('idle');
            setLastSyncAt(Date.now());
          }).catch(err => {
            console.error('Firestore write failed:', err);
            setSyncStatus('error');
          });
        }, 500);
      }
      return next;
    });
  }, [user]);

  // ── F-key navigation, global ─────────────────────────────────────────────
  useEffect(() => {
    const onKey = (e) => {
      const fkeys = { 'F1': 'PURCHASES', 'F2': 'SALES', 'F3': 'PAYMENT', 'F4': 'RECEIPT', 'F5': 'JOURNAL', 'F6': 'REPORTS', 'F7': 'MASTERS', 'F8': 'REPORTS' };
      if (fkeys[e.key]) {
        e.preventDefault();
        if (authPhase === 'login' || authPhase === 'loading') return;
        if (viewingSnap) return;
        setScreen(fkeys[e.key]);
        if (e.key === 'F8') setReportJumpTo('daybook');
        if (fkeys[e.key] !== 'RECEIPT') setReceiptPrefill(null);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [authPhase, viewingSnap]);

  const switchScreen = (key) => {
    setScreen(key);
    if (key !== 'RECEIPT') setReceiptPrefill(null);
  };

  const gotoReceipt = (salesVoucher) => {
    setReceiptPrefill(salesVoucher);
    setScreen('RECEIPT');
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `nds-erp-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Exported');
  };

  // ── Excel export — multi-sheet workbook (humans only, not re-importable) ──
  const exportExcel = () => {
    if (typeof XLSX === 'undefined') { toast('Excel library not loaded — check internet and reload'); return; }
    try {
      const wb = XLSX.utils.book_new();
      const groupName = (gid) => state.groups.find(g => g.id === gid)?.name || '';
      const ledgerName = (lid) => state.ledgers.find(l => l.id === lid)?.name || '';
      const itemName = (iid) => state.items.find(i => i.id === iid)?.name || '';

      // 1) Vouchers
      const voucherRows = state.vouchers.map(v => ({
        'Date': fmtDate(v.date),
        'Type': v.type,
        'Voucher #': v.voucherNo,
        'Party': v.partyName || '',
        'Address': v.address || '',
        'Contact': v.contact || '',
        
        'Subtotal': Number(v.total) || 0,
        'Other Charges': Number(v.charges) || 0,
        'Grand Total': Number(v.grand) || 0,
        'Narration': v.narration || '',
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(voucherRows), 'Vouchers');

      // 2) Voucher Lines (one row per item line across all vouchers)
      const lineRows = [];
      state.vouchers.forEach(v => {
        (v.lines || []).forEach(l => {
          const item = state.items.find(i => i.id === l.itemId);
          const unit = item ? state.units.find(u => u.id === item.unitId) : null;
          lineRows.push({
            'Date': fmtDate(v.date),
            'Type': v.type,
            'Voucher #': v.voucherNo,
            'Party': v.partyName || '',
            'Item': item?.name || '',
            'Qty': Number(l.qty) || 0,
            'Unit': unit?.name || '',
            'Rate': Number(l.rate) || 0,
            'Line Total': (Number(l.qty) || 0) * (Number(l.rate) || 0),
          });
        });
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(lineRows), 'Voucher Lines');

      // 3) Ledgers with current balance
      const ledgerRows = state.ledgers.map(l => {
        const bal = ledgerBalance(state, l.id);
        return {
          'Ledger': l.name,
          'Group': groupName(l.groupId),
          'Opening Balance': Number(l.openingBalance) || 0,
          'Current Balance': bal.amount,
          'Side': bal.amount > 0 ? bal.side.toUpperCase() : '',
          'Contact': l.contact || '',
          'Address': l.address || '',
        };
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ledgerRows), 'Ledgers');

      // 4) Items with stock
      const itemRows = state.items.map(it => {
        const unit = state.units.find(u => u.id === it.unitId);
        const sup = state.superCategories.find(s => s.id === it.superCategoryId);
        const sub = state.subCategories.find(s => s.id === it.subCategoryId);
        return {
          'Item': it.name,
          'Unit': unit?.name || '',
          'Super Category': sup?.name || '',
          'Sub Category': sub?.name || '',
          'Opening Stock': Number(it.openingBalance) || 0,
          'Current Stock': stockBalance(state, it.id),
          'Last Sale Price': Number(it.lastSalePrice) || 0,
          'Last Purchase Price': Number(it.lastPurchasePrice) || 0,
        };
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(itemRows), 'Items');

      // 5) Stock Entries
      const stockRows = state.stockEntries.map(e => ({
        'Date': fmtDate(e.date),
        'Item': itemName(e.itemId),
        'In': Number(e.in) || 0,
        'Out': Number(e.out) || 0,
        'Rate': Number(e.rate) || 0,
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(stockRows), 'Stock Entries');

      // 6) Ledger Entries (the double-entry record)
      const entryRows = state.ledgerEntries.map(e => ({
        'Date': fmtDate(e.date),
        'Ledger': ledgerName(e.ledgerId),
        'Dr': Number(e.dr) || 0,
        'Cr': Number(e.cr) || 0,
        'Narration': e.narration || '',
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(entryRows), 'Ledger Entries');

      // 7) Summary cover sheet
      const totalSales = state.vouchers.filter(v => v.type === 'sales').reduce((s, v) => s + (Number(v.grand) || 0), 0);
      const totalPurch = state.vouchers.filter(v => v.type === 'purchase').reduce((s, v) => s + (Number(v.grand) || 0), 0);
      const summary = [
        { Field: 'Business', Value: state.meta.businessName },
        { Field: 'Exported on', Value: fmtDate(todayISO()) + ' (IST)' },
        { Field: 'FY Start', Value: fmtDate(state.meta.fyStart) },
        { Field: '', Value: '' },
        { Field: 'Total Vouchers', Value: state.vouchers.length },
        { Field: 'Total Sales (₹)', Value: totalSales },
        { Field: 'Total Purchases (₹)', Value: totalPurch },
        { Field: 'Ledgers', Value: state.ledgers.length },
        { Field: 'Items', Value: state.items.length },
      ];
      const summarySheet = XLSX.utils.json_to_sheet(summary);
      XLSX.utils.book_append_sheet(wb, summarySheet, 'Summary');

      XLSX.writeFile(wb, `nds-erp-${todayISO()}.xlsx`);
      toast('Excel exported');
    } catch (e) {
      console.error('Excel export failed', e);
      toast('Excel export failed');
    }
  };

  // ── PDF export — printable summary report (humans only, not re-importable) ──
  const exportPDF = () => {
    const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
    if (!jsPDFCtor) { toast('PDF library not loaded — check internet and reload'); return; }
    try {
      const doc = new jsPDFCtor({ unit: 'pt', format: 'a4' });
      const W = doc.internal.pageSize.getWidth();
      let y = 36;

      // Header
      doc.setFont('helvetica', 'bold'); doc.setFontSize(20); doc.setTextColor(27, 110, 132);
      doc.text(state.meta.businessName || BUSINESS_NAME, 36, y);
      doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(100);
      y += 18;
      doc.text(`Books export · ${fmtDateLong(todayISO())}`, 36, y);
      y += 6;
      doc.setDrawColor(27, 110, 132); doc.setLineWidth(2);
      doc.line(36, y, W - 36, y);
      y += 16;

      // Summary block
      const totalSales = state.vouchers.filter(v => v.type === 'sales').reduce((s, v) => s + (Number(v.grand) || 0), 0);
      const totalPurch = state.vouchers.filter(v => v.type === 'purchase').reduce((s, v) => s + (Number(v.grand) || 0), 0);

      doc.setTextColor(30); doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
      doc.text('Summary', 36, y); y += 6;
      doc.autoTable({
        startY: y,
        theme: 'plain',
        styles: { font: 'helvetica', fontSize: 10, cellPadding: 4 },
        body: [
          ['FY Start',          fmtDate(state.meta.fyStart) || '—'],
          ['Total Vouchers',    String(state.vouchers.length)],
          ['Total Sales (Rs.)', inr(totalSales)],
          ['Total Purchases (Rs.)', inr(totalPurch)],
          ['Ledgers',           String(state.ledgers.length)],
          ['Items',             String(state.items.length)],
        ],
      });
      y = doc.lastAutoTable.finalY + 18;

      // Recent vouchers (last 30)
      const recentVouchers = [...state.vouchers].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 30);
      doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
      doc.text('Recent Vouchers (most recent 30)', 36, y); y += 4;
      doc.autoTable({
        startY: y + 4,
        head: [['Date', 'Type', '#', 'Party', 'Amount (Rs.)']],
        body: recentVouchers.map(v => [
          fmtDate(v.date),
          v.type,
          String(v.voucherNo),
          (v.partyName || '').slice(0, 32),
          inr(v.grand || 0),
        ]),
        styles:    { font: 'helvetica', fontSize: 9, cellPadding: 4 },
        headStyles:{ fillColor: [27, 110, 132], textColor: 245, halign: 'left' },
        columnStyles: { 4: { halign: 'right' } },
      });
      y = doc.lastAutoTable.finalY + 18;

      // Stock summary
      const stockRows = state.items
        .map(it => {
          const unit = state.units.find(u => u.id === it.unitId);
          return [it.name, unit?.name || '', String(stockBalance(state, it.id))];
        })
        .sort((a, b) => Number(b[2]) - Number(a[2]));
      if (stockRows.length > 0) {
        doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
        doc.text('Stock Summary', 36, y); y += 4;
        doc.autoTable({
          startY: y + 4,
          head: [['Item', 'Unit', 'Stock']],
          body: stockRows,
          styles:    { font: 'helvetica', fontSize: 9, cellPadding: 4 },
          headStyles:{ fillColor: [27, 110, 132], textColor: 245, halign: 'left' },
          columnStyles: { 2: { halign: 'right' } },
        });
        y = doc.lastAutoTable.finalY + 18;
      }

      // Ledger balances grouped by group
      doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
      doc.text('Ledger Balances', 36, y); y += 4;
      const ledgerByGroup = state.groups
        .map(g => {
          const rows = state.ledgers
            .filter(l => l.groupId === g.id)
            .map(l => {
              const b = ledgerBalance(state, l.id);
              return [l.name, b.amount > 0 ? `Rs. ${inr(b.amount)} ${b.side.toUpperCase()}` : '—'];
            });
          return { group: g, rows };
        })
        .filter(x => x.rows.length > 0);

      const balBody = [];
      ledgerByGroup.forEach(({ group, rows }) => {
        balBody.push([{ content: group.name, colSpan: 2, styles: { fillColor: [237, 229, 210], fontStyle: 'bold' } }]);
        rows.forEach(r => balBody.push(r));
      });
      doc.autoTable({
        startY: y + 4,
        head: [['Ledger', 'Balance']],
        body: balBody,
        styles:    { font: 'helvetica', fontSize: 9, cellPadding: 4 },
        headStyles:{ fillColor: [27, 110, 132], textColor: 245, halign: 'left' },
        columnStyles: { 1: { halign: 'right' } },
      });

      // Footer with page numbers
      const pageCount = doc.internal.getNumberOfPages();
      for (let i = 1; i <= pageCount; i++) {
        doc.setPage(i);
        doc.setFont('helvetica', 'italic'); doc.setFontSize(8); doc.setTextColor(120);
        doc.text(`${state.meta.businessName} · NDS ERP v1.5 · page ${i} of ${pageCount}`, W / 2, doc.internal.pageSize.getHeight() - 18, { align: 'center' });
      }

      doc.save(`nds-erp-${todayISO()}.pdf`);
      toast('PDF exported');
    } catch (e) {
      console.error('PDF export failed', e);
      toast('PDF export failed');
    }
  };

  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = normalizeState(JSON.parse(reader.result));
        setState(data);
        toast('Data imported');
      } catch (e) { toast('Invalid file'); }
    };
    reader.readAsText(file);
  };

  const wipeAll = () => {
    if (!confirm('This will erase ALL data — local AND in the cloud. Are you sure?')) return;
    if (!confirm('Really erase everything? This cannot be undone.')) return;
    // units: [] ensures default seeded units (Pcs, Kg, etc.) are also wiped.
    const fresh = { ...initialState(), units: [] };
    localStorage.removeItem(STORAGE_KEY);
    setStateRaw(fresh);
    saveStateLocal(fresh);
    if (cloudReady() && user) {
      const payload = JSON.stringify(fresh);
      fbDB().doc(FIRESTORE_DOC_PATH).set({
        payload,
        updatedAt: fbNS().firestore.FieldValue.serverTimestamp(),
        updatedBy: (user && user.email) || 'unknown',
        version: 1,
      }).then(() => { lastWrittenPayloadRef.current = payload; }).catch(console.error);
    }
    toast('All data erased');
  };

  const restoreFromSnapshot = (snapState) => {
    setState(snapState);
  };

  const handleAutoDownloadToggle = (e) => {
    const on = e.target.checked;
    setAutoDownload(on);
    localStorage.setItem(AUTO_DL_PREF_KEY, on ? '1' : '0');
    if (on) toast('Daily auto-download enabled — first download tomorrow');
  };

  const handleSignOut = async () => {
    if (!confirm('Sign out of NDS ERP on this device?')) return;
    try {
      await fbAuth().signOut();
      // localStorage stays so re-sign-in is instant
      setShowSettings(false);
      toast('Signed out');
    } catch (e) { toast('Sign out failed'); }
  };

  // ── Render: auth gate ────────────────────────────────────────────────────
  if (authPhase === 'loading') {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center">
          <img src={BRAND_LOGO_DATA_URL} alt={BUSINESS_NAME} className="brand-logo-lg mx-auto mb-4" />
          <div className="smcap text-mute mt-1">Connecting to cloud…</div>
        </div>
      </div>
    );
  }
  if (authPhase === 'login') {
    return <LoginScreen />;
  }
  // 'ready' or 'local-fallback' — render the app

  // ── Render: main app ─────────────────────────────────────────────────────
  return (
    <div className="min-h-screen flex flex-col">
      {/* Top Chrome — logo + business name + date */}
      <header className="bg-paper border-b border-rule2 px-6 pt-3 pb-0 no-print">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-4">
            <img src={BRAND_LOGO_DATA_URL} alt={state.meta.businessName} className="brand-logo" />
            <div>
              <h1 className="display text-xl leading-none">{state.meta.businessName}</h1>
              <div className="text-xs text-mute italic mt-1 num">{fmtDateLong(todayISO())}</div>
            </div>
          </div>
          <div className="flex items-center gap-5">
            <DarkModeToggle />
            <button onClick={() => setShowSettings(true)} className="btn btn-ghost text-xs">Data ⚙</button>
          </div>
        </div>
        <div className="brand-rule mt-3"></div>
      </header>

      {/* Main */}
      <div className="flex flex-1 min-h-0">
        <main className="flex-1 px-8 py-6 overflow-auto">
          {screen === 'PURCHASES' && <PurchasesScreen state={state} setState={setState} toast={toast} />}
          {screen === 'SALES'     && <SalesScreen     state={state} setState={setState} toast={toast} gotoReceipt={gotoReceipt} />}
          {screen === 'PAYMENT'   && <PaymentReceiptScreen state={state} setState={setState} toast={toast} mode="PAYMENT" />}
          {screen === 'RECEIPT'   && <PaymentReceiptScreen state={state} setState={setState} toast={toast} mode="RECEIPT" prefill={receiptPrefill} />}
          {screen === 'JOURNAL'   && <JournalScreen   state={state} setState={setState} toast={toast} />}
          {screen === 'REPORTS'   && <ReportsScreen   state={state} jumpTo={reportJumpTo} onJumpTo={() => setReportJumpTo(null)} />}
          {screen === 'MASTERS'   && <MastersScreen   state={state} setState={setState} toast={toast} />}
        </main>

        <HotKeysSidebar active={screen} onSwitch={switchScreen} />
      </div>

      {/* Footer */}
      <footer className="border-t border-rule2 bg-paper2/30 px-6 py-2 flex justify-between items-center text-xs text-mute no-print">
        <div className="flex items-center gap-3">
          <span className="key">F1</span><span>Purchases</span>
          <span className="key">F2</span><span>Sales</span>
          <span className="key">F3</span><span>Payment</span>
          <span className="key">F4</span><span>Receipt</span>
          <span className="key">F5</span><span>Journal</span>
          <span className="key">F6</span><span>Reports</span>
          <span className="key">F7</span><span>Masters</span>
          <span className="key">F8</span><span>Day Book</span>
        </div>
        <div className="flex items-center gap-3">
          <span>{state.vouchers.length} vouchers · {state.ledgers.length} ledgers · {state.items.length} items</span>
          <span className="text-rule2">·</span>
          <SyncStatusPill status={syncStatus} lastSyncAt={lastSyncAt} />
          <span className="text-rule2">·</span>
          <span className="italic text-[10px]">v1.5</span>
        </div>
      </footer>

      {/* Settings */}
      <Modal open={showSettings} onClose={() => setShowSettings(false)} title="Data & Settings"
             footer={<button onClick={() => setShowSettings(false)} className="btn btn-ghost">Done</button>}>
        <div className="space-y-5">
          {/* Account */}
          {cloudReady() && user && (
            <div>
              <div className="smcap text-mute mb-2">Account</div>
              <div className="flex items-center justify-between text-sm">
                <div>
                  <div className="font-medium">{user.email}</div>
                </div>
                <button onClick={handleSignOut} className="btn btn-ghost text-xs">Sign Out</button>
              </div>
            </div>
          )}
          {!cloudReady() && (
            <div className="bg-paper2/50 border border-rule2 rounded p-3 text-xs text-mute">
              <div className="font-semibold text-ink mb-1">⚠ Cloud sync unavailable</div>
              Firebase didn't load — likely a network or CDN issue. The app is running on local storage only. Reload when you're back online.
            </div>
          )}

          <div className="border-t border-rule pt-4">
            <div className="smcap text-mute mb-2">Business</div>
            <div className="space-y-3">
              <div>
                <label className="smcap text-mute block mb-1">Business Name</label>
                <div className="px-2 py-1.5 bg-paper2/60 border border-rule rounded-sm text-sm font-medium">
                  <span>{state.meta.businessName}</span>
                </div>
              </div>
              <div>
                <label className="smcap text-mute block mb-1">FY Start</label>
                <input type="date" className="w-full" value={state.meta.fyStart} onChange={(e) => setState({ ...state, meta: { ...state.meta, fyStart: e.target.value } })} />
              </div>
            </div>
          </div>

          <div className="border-t border-rule pt-4">
            <div className="smcap text-mute mb-2">Backup & Restore</div>
            <div className="flex gap-2 flex-wrap">
              <button onClick={() => setShowBackups(true)} className="btn btn-ghost">📚 Daily Snapshots ({loadSnapshots().length})</button>
              <button onClick={exportData} className="btn btn-ghost" title="Machine-readable. Used by the app for import/export.">⬇ Export JSON</button>
              <button onClick={exportExcel} className="btn btn-ghost" title="Multi-sheet workbook for humans. Cannot be re-imported.">⬇ Export Excel</button>
              <button onClick={exportPDF} className="btn btn-ghost" title="Printable summary report for humans. Cannot be re-imported.">⬇ Export PDF</button>
              <label className="btn btn-ghost cursor-pointer">
                ⬆ Import JSON
                <input type="file" accept=".json" className="hidden" onChange={(e) => e.target.files[0] && importData(e.target.files[0])} />
              </label>
              <button onClick={() => { setShowSettings(false); setShowImport(true); }} className="btn btn-ghost">⬆ Import Excel</button>
              <button onClick={wipeAll} className="btn btn-danger">Erase All Data</button>
            </div>
            <label className="flex items-start gap-2 mt-4 cursor-pointer text-xs">
              <input type="checkbox" checked={autoDownload} onChange={handleAutoDownloadToggle}
                     style={{ width: 'auto', marginTop: 2 }} />
              <span className="font-medium not-italic">Auto-download a JSON backup once per day</span>
            </label>
          </div>
        </div>
      </Modal>

      {/* Backups (Daily Snapshots) */}
      <BackupsModal
        open={showBackups}
        onClose={() => setShowBackups(false)}
        onView={(snap, date) => { setShowBackups(false); setViewingSnap({ snap, date }); }}
        onRestore={restoreFromSnapshot}
        toast={toast}
      />

      {/* Excel Import Modal */}
      <ExcelImportModal
        open={showImport}
        onClose={() => setShowImport(false)}
        state={state}
        setState={setState}
        toast={toast}
      />

      {/* Read-only snapshot viewer */}
      {viewingSnap && (
        <SnapshotViewer
          snapshot={viewingSnap.snap}
          snapshotDate={viewingSnap.date}
          onClose={() => setViewingSnap(null)}
        />
      )}

      <Toast msg={toastMsg} onDone={() => setToastMsg('')} />
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch (err) {
  document.getElementById('root').innerHTML =
    '<div style="padding:32px;font-family:Geist Mono,monospace;color:#0a0a0a;max-width:640px;margin:40px auto;background:#f5f5f5;border:1px solid #e5e5e5;border-radius:0px"><h2 style="font-family:Geist Mono,monospace;margin:0 0 12px;color:#e7000b">App failed to load</h2><p>One of the script CDNs may be blocked. Try a different network or browser. Error: <code>' + (err && err.message ? err.message : err) + '</code></p></div>';
  console.error('NDS ERP failed to mount:', err);
}
</script>
</body>
</html>
