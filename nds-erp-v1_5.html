              <div className="bg-wax/10 border border-wax/30 rounded-sm px-4 py-3 flex items-center gap-3">
                <span className="text-2xl">📲</span>
                <div>
                  <div className="smcap text-mute text-[10px]">GPay Receipt</div>
                  <div className="text-sm">Amount will be added to <strong>GPay A/c</strong> (Bank)</div>
                </div>
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Amount Received (₹)</label>
                <input
                  className="num w-full text-xl"
                  value={gpayAmt}
                  onChange={(e) => setGpayAmt(e.target.value)}
                  autoFocus
                  onFocus={(e) => e.target.select()}
                />
                {Number(gpayAmt) < grand - 0.005 && Number(gpayAmt) > 0 && (
                  <div className="text-xs text-gold mt-1">
                    Partial — ₹ {inr(grand - Number(gpayAmt))} will remain due
                  </div>
                )}
              </div>
              <div className="flex gap-2 justify-end">
                <button onClick={() => setMode('choose')} className="btn btn-ghost">← Back</button>
                <button onClick={settleGpay} className="btn btn-primary">Settle GPay ↵</button>
              </div>
            </div>
          )}

          {/* ── MODE: PART ──────────────────────────────────────────── */}
          {mode === 'part' && (
            <div className="space-y-4">
              <div className="smcap text-mute">Split payment — total must equal ₹ {inr(grand)}</div>

              <div className="space-y-3">
                {/* Cash row */}
                <div className="flex items-center gap-3">
                  <span className="text-xl w-8 shrink-0">💵</span>
                  <label className="smcap text-mute w-16 shrink-0 text-right">Cash</label>
                  <input
                    className="num flex-1"
                    value={partCash}
                    onChange={(e) => setPartCash(e.target.value)}
                    placeholder="0.00"
                    onFocus={(e) => e.target.select()}
                  />
                </div>
                {/* GPay row */}
                <div className="flex items-center gap-3">
                  <span className="text-xl w-8 shrink-0">📲</span>
                  <label className="smcap text-mute w-16 shrink-0 text-right">GPay</label>
                  <input
                    className="num flex-1"
                    value={partGpay}
                    onChange={(e) => setPartGpay(e.target.value)}
                    placeholder="0.00"
                    onFocus={(e) => e.target.select()}
                  />
                </div>
                {/* Due row — auto-computed */}
                <div className="flex items-center gap-3 border-t border-rule pt-3">
                  <span className="text-xl w-8 shrink-0">📋</span>
                  <label className="smcap text-mute w-16 shrink-0 text-right">Due</label>
                  <div className={`num flex-1 px-2 py-1.5 rounded-sm text-right font-semibold text-sm ${partDue < -0.005 ? 'text-gold bg-gold/10' : 'text-ink2 bg-paper2/60'}`}>
                    {partDue < -0.005 ? '⚠ Over' : inr(partDue)}
                  </div>
                </div>
              </div>

              {/* Total check */}
              <div className={`flex justify-between items-center py-2 border-t-2 ${Math.abs((Number(partCash)||0)+(Number(partGpay)||0)+partDue - grand) < 0.5 ? 'border-ok text-ok' : 'border-rule2 text-mute'}`}>
                <span className="smcap text-[10px]">Total</span>
                <span className="num font-semibold">₹ {inr((Number(partCash)||0)+(Number(partGpay)||0)+partDue)}</span>
              </div>

              <div className="flex gap-2 justify-end">
                <button onClick={() => setMode('choose')} className="btn btn-ghost">← Back</button>
                <button onClick={settlePart} className="btn btn-primary">Confirm Split ↵</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// PURCHASES SCREEN
// ──────────────────────────────────────────────────────────────────────────

function PurchasesScreen({ state, setState, toast }) {
  const nextCounter = state.counters.purchase;
  const [voucherNo, setVoucherNo] = useState(() => String(state.counters.purchase));
  const [voucherNoError, setVoucherNoError] = useState('');
  const [date, setDate] = useState(todayISO());
  const [vendorId, setVendorId] = useState('');
  const [vendorName, setVendorName] = useState('');
  const [address, setAddress] = useState('');
  const [contact, setContact] = useState('');
  const [billRefs, setBillRefs] = useState([]);
  const [lines, setLines] = useState([{ id: uid('ln'), itemId: '', qty: '', rate: '' }]);
  const linesRef = useRef(null);
  linesRef.current = lines;
  const [narration, setNarration] = useState('');
  const [saved, setSaved] = useState(null);
  // Quick-create item
  const [quickItemLineId, setQuickItemLineId] = useState(null);
  const [quickItemName,   setQuickItemName]   = useState('');

  // Vendor picker: Sundry Creditors (credit vendor) + Cash in Hand + Bank Accounts + Bank O/D Accounts.
  const vendors = useMemo(() =>
    state.ledgers.filter(l => VENDOR_GROUPS.includes(l.groupId)),
    [state.ledgers]);
  const total = useMemo(() => lines.reduce((s, l) => s + (Number(l.qty) || 0) * (Number(l.rate) || 0), 0), [lines]);

  useEffect(() => {
    if (!vendorId) return;
    const v = state.ledgers.find(l => l.id === vendorId);
    if (v) {
      setVendorName(v.name);
      if (v.address) setAddress(v.address);
      if (v.contact) setContact(v.contact);
    }
  }, [vendorId]);

  const reset = () => {
    setVendorId(''); setVendorName(''); setAddress(''); setContact('');
    setLines([{ id: uid('ln'), itemId: '', qty: '', rate: '' }]);
    setNarration(''); setBillRefs([]); setSaved(null); setDate(todayISO());
    setVoucherNo(String(state.counters.purchase));
    setVoucherNoError('');
  };

  const save = () => {
    if (!vendorName.trim()) { toast('Vendor name required'); return; }
    const currentLines = linesRef.current;
    const validLines = currentLines.filter(l => l.itemId && Number(l.qty) > 0);
    if (validLines.length === 0) {
      const hasItem = currentLines.some(l => l.itemId);
      const hasQty  = currentLines.some(l => Number(l.qty) > 0);
      if (!hasItem)        toast('Pick an item from the dropdown — typing alone is not enough');
      else if (!hasQty)    toast('Enter a quantity (> 0) for the item');
      else                 toast('Each item needs both a name and a quantity');
      return;
    }

    const next = { ...state };
    let v = state.ledgers.find(l => l.id === vendorId);
    if (!v) v = findOrCreateParty(next, vendorName, 'g_sundry_cr');
    else if (!v.locked) {
      const i = next.ledgers.findIndex(l => l.id === v.id);
      next.ledgers[i] = { ...v, address, contact };
    }

    // Update items with last purchase price
    validLines.forEach(l => {
      const i = next.items.findIndex(it => it.id === l.itemId);
      if (i >= 0) next.items[i] = { ...next.items[i], lastPurchasePrice: Number(l.rate) };
    });

    const vNo = Number(voucherNo) || nextCounter;
    const isDup = state.vouchers.some(x => x.type === 'purchase' && x.voucherNo === vNo);
    if (isDup) { setVoucherNoError(`Purchase #${vNo} already exists`); toast(`Purchase voucher #${vNo} already exists`); return; }
    setVoucherNoError('');
    const voucherId = uid('vch');
    const finalVoucherNo = vNo;
    const voucher = {
      id: voucherId, type: 'purchase', voucherNo: finalVoucherNo, date,
      partyId: v.id, partyName: vendorName, address, contact,
      lines: validLines.map(l => ({ ...l })),
      grand: total, narration,
      billRefs: billRefs.filter(r => r.refNo || r.amount),
      createdAt: Date.now(),
    };
    next.vouchers = [...next.vouchers, voucher];
    const newCounter = Math.max(next.counters.purchase, finalVoucherNo + 1);
    next.counters = { ...next.counters, purchase: newCounter };

    // Dr Purchase, Cr Vendor (or Cr Cash/Bank if vendor side is a cash/bank ledger — same double-entry shape).
    const entries = [
      { id: uid('le'), voucherId, ledgerId: 'l_purchase', dr: total, cr: 0, date, narration: `Purchase — ${vendorName}` },
      { id: uid('le'), voucherId, ledgerId: v.id,         dr: 0, cr: total, date, narration: `Purchase — ${vendorName}` },
    ];
    next.ledgerEntries = [...next.ledgerEntries, ...entries];

    const stockEntries = validLines.map(l => ({
      id: uid('se'), voucherId, itemId: l.itemId, in: Number(l.qty), out: 0, rate: Number(l.rate), date
    }));
    next.stockEntries = [...next.stockEntries, ...stockEntries];

    setState(next);
    setSaved(voucher);
    toast(`Purchase #${finalVoucherNo} saved`);
  };

  // Functional setters — avoid stale-closure overwrites when several fields change rapidly.
  const addLine = () => setLines(prev => [...prev, { id: uid('ln'), itemId: '', qty: '', rate: '' }]);
  const updateLine = (id, patch) => setLines(prev => prev.map(l => l.id === id ? { ...l, ...patch } : l));
  const removeLine = (id) => setLines(prev => prev.length > 1 ? prev.filter(l => l.id !== id) : prev);

  if (saved) return <VoucherSaved voucher={saved} state={state} onNew={reset} />;

  return (
    <div>
      <ScreenHeader title="Purchases" voucherNo={voucherNo} onVoucherNoChange={setVoucherNo} voucherNoError={voucherNoError} voucherDate={date} onDateChange={setDate} />

      <div className="grid grid-cols-2 gap-x-8 gap-y-3 mb-4">
        <div>
          <label className="smcap text-mute block mb-1">Vendor's Name</label>
          <Picker
            value={vendorId}
            onChange={(id, opt) => { setVendorId(id); if (opt) setVendorName(opt.name); }}
            onTextChange={setVendorName}
            options={vendors}
            placeholder="Type to search or create…"
            allowCreate
            onCreate={(name) => {
              const created = { id: uid('l'), name, groupId: 'g_sundry_cr', openingBalance: 0, contact: '', address: '' };
              setState(prev => ({ ...prev, ledgers: [...prev.ledgers, created] }));
              setVendorName(name);
              return created;
            }}
            getMeta={(o) => {
              const g = state.groups.find(gr => gr.id === o.groupId);
              const tag = g ? g.name : '';
              const ext = o.contact || o.address || '';
              return ext ? `${tag} · ${ext}` : tag;
            }}
            autoFocus
          />

        </div>
        <div>
          <label className="smcap text-mute block mb-1">Contact</label>
          <input value={contact} onChange={(e) => setContact(e.target.value)} className="w-full" />
        </div>
        <div className="col-span-2">
          <label className="smcap text-mute block mb-1">Address</label>
          <input value={address} onChange={(e) => setAddress(e.target.value)} className="w-full" />
        </div>
      </div>

      <div className="rule mb-4"></div>

      {vendorId && (
        <BillWiseDetails
          billRefs={billRefs}
          onChange={setBillRefs}
          openBills={billwiseAgeing(state, vendorId, date, 'vendor').rows}
          grandTotal={total}
        />
      )}
      {vendorId && <div className="mb-4"></div>}

      <table className="ledger mb-4">
        <thead>
          <tr>
            <th style={{ width: '50%' }}>Item</th>
            <th style={{ width: '14%', textAlign: 'right' }}>Qty</th>
            <th style={{ width: '8%' }}>Unit</th>
            <th style={{ width: '14%', textAlign: 'right' }}>Rate</th>
            <th style={{ width: '14%', textAlign: 'right' }}>Total</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {lines.map((l) => {
            const item = state.items.find(i => i.id === l.itemId);
            const unit = item ? state.units.find(u => u.id === item.unitId) : null;
            const lineTotal = (Number(l.qty) || 0) * (Number(l.rate) || 0);
            return (
              <tr key={l.id}>
                <td>
                  <Picker
                    value={l.itemId}
                    onChange={(id, opt) => {
                      // FIX #6: l.rate captured from render closure may be stale.
                      // Use functional setLines to read the live line's rate.
                      setLines(prev => prev.map(ln => {
                        if (ln.id !== l.id) return ln;
                        const patch = { itemId: id };
                        if (opt && opt.lastPurchasePrice && !Number(ln.rate)) patch.rate = opt.lastPurchasePrice;
                        return { ...ln, ...patch };
                      }));
                    }}
                    options={state.items}
                    placeholder="Select item…"
                    getMeta={(o) => {
                      const u = state.units.find(u => u.id === o.unitId);
                      return `Stock: ${stockBalance(state, o.id)} ${u?.name || ''} · last bought: ${o.lastPurchasePrice ? '₹'+inr(o.lastPurchasePrice) : '—'}`;
                    }}
                    allowCreate
                    onCreate={(name) => {
                      setQuickItemLineId(l.id);
                      setQuickItemName(name);
                      return undefined;
                    }}
                  />
                </td>
                <td><input className="num w-full" value={l.qty} onChange={(e) => updateLine(l.id, { qty: e.target.value })} /></td>
                <td className="text-mute text-sm">{unit?.name || '—'}</td>
                <td><input className="num w-full" value={l.rate} onChange={(e) => updateLine(l.id, { rate: e.target.value })} /></td>
                <td className="num text-right">{inr(lineTotal)}</td>
                <td><button onClick={() => removeLine(l.id)} className="text-mute hover:text-gold px-2">×</button></td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <button onClick={addLine} className="btn btn-ghost mb-6">+ Add Item</button>

      <div className="grid grid-cols-2 gap-8">
        <div>
          <div className="smcap text-mute mb-1">Narration</div>
          <textarea value={narration} onChange={(e) => setNarration(e.target.value)} rows={3} className="w-full" placeholder="" />
        </div>
        <div className="bg-paper2/60 border border-rule rounded-sm p-5">
          <div className="flex justify-between py-3 border-b-2 border-ink">
            <span className="display text-xl">Total</span>
            <span className="num text-xl font-semibold">₹ {inr(total)}</span>
          </div>
          <div className="mt-5 flex gap-2 justify-end">
            <button onClick={reset} className="btn btn-ghost">Clear</button>
            <button onClick={save} className="btn btn-primary">Save Voucher</button>
          </div>
        </div>
      </div>

      {/* Quick Create Item modal — triggered by "+ Create" in item picker */}
      <QuickItemCreateModal
        open={!!quickItemLineId}
        initialName={quickItemName}
        state={state}
        setState={setState}
        toast={toast}
        onCreated={(newItem) => {
          setLines(prev => prev.map(ln => {
            if (ln.id !== quickItemLineId) return ln;
            const patch = { itemId: newItem.id };
            if (newItem.lastPurchasePrice && !Number(ln.rate)) patch.rate = newItem.lastPurchasePrice;
            return { ...ln, ...patch };
          }));
          setQuickItemLineId(null);
        }}
        onClose={() => setQuickItemLineId(null)}
      />
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// PAYMENT & RECEIPT SCREENS (similar shape, different sign)
// ──────────────────────────────────────────────────────────────────────────

function PaymentReceiptScreen({ state, setState, toast, mode, prefill }) {
  // mode: 'PAYMENT' | 'RECEIPT'
  const isPayment = mode === 'PAYMENT';
  const counterKey = isPayment ? 'payment' : 'receipt';
  const nextCounter = state.counters[counterKey];
  const [voucherNo, setVoucherNo] = useState(() => String(state.counters[counterKey]));
  const [voucherNoError, setVoucherNoError] = useState('');
  const [billRefs, setBillRefs] = useState([]);

  const [date, setDate] = useState(todayISO());
  const [accountId, setAccountId] = useState('l_cash');
  const [partyId, setPartyId] = useState(prefill?.partyId || '');
  const [partyName, setPartyName] = useState(prefill?.partyName || '');
  const [otherSide, setOtherSide] = useState(prefill ? 'PARTY' : 'PARTY'); // 'PARTY' or 'OTHER'
  const [otherLedgerId, setOtherLedgerId] = useState('');
  const [amount, setAmount] = useState(prefill?.grand ? String(prefill.grand) : '');
  const [narration, setNarration] = useState(prefill ? `Against Sales #${prefill.voucherNo}` : '');
  const [saved, setSaved] = useState(null);

  // Available account-type ledgers (Cash / Bank / Bank OD)
  const accountLedgers = useMemo(() =>
    state.ledgers.filter(l => ['g_cash', 'g_bank', 'g_bank_od'].includes(l.groupId)), [state.ledgers]);

  // Parties for this mode: payment → vendors (Sundry Creditors); receipt → customers (Sundry Debtors)
  const partyGroup = isPayment ? 'g_sundry_cr' : 'g_sundry_dr';
  const parties = useMemo(() => state.ledgers.filter(l => l.groupId === partyGroup), [state.ledgers, partyGroup]);

  // Other-side ledgers: payment → expenses + indirect; receipt → income + other charges
  const otherLedgers = useMemo(() => state.ledgers.filter(l => {
    const g = state.groups.find(x => x.id === l.groupId);
    if (!g) return false;
    if (isPayment) return g.nature === 'expense' || g.id === 'g_curr_liab' || g.id === 'g_duties' || g.id === 'g_fixed_assets';
    return g.nature === 'income' || g.id === 'g_curr_liab' || g.id === 'g_duties';
  }), [state.ledgers, state.groups, isPayment]);

  // For party — show pending balance
  const partyBal = useMemo(() => {
    if (!partyId) return null;
    return ledgerBalance(state, partyId);
  }, [partyId, state]);

  // Show pending vouchers for the selected party
  const pendingVouchers = useMemo(() => {
    if (!partyId) return [];
    return state.vouchers.filter(v => v.partyId === partyId && (v.type === 'sales' || v.type === 'purchase'))
      .slice(-5).reverse();
  }, [partyId, state.vouchers]);

  const reset = () => {
    setAccountId('l_cash'); setPartyId(''); setPartyName(''); setOtherSide('PARTY');
    setOtherLedgerId(''); setAmount(''); setNarration(''); setSaved(null); setDate(todayISO());
    setBillRefs([]); setVoucherNo(String(state.counters[counterKey])); setVoucherNoError('');
  };

  const save = () => {
    const amt = Number(amount);
    if (!amt || amt <= 0) { toast('Amount required'); return; }
    if (otherSide === 'PARTY' && !partyName.trim()) { toast('Party name required'); return; }
    if (otherSide === 'OTHER' && !otherLedgerId) { toast('Select an expense/income ledger'); return; }

    const next = { ...state };
    let counterLedgerId;
    let counterName;

    if (otherSide === 'PARTY') {
      let p = state.ledgers.find(l => l.id === partyId);
      if (!p) p = findOrCreateParty(next, partyName, partyGroup);
      counterLedgerId = p.id;
      counterName = p.name;
    } else {
      counterLedgerId = otherLedgerId;
      counterName = state.ledgers.find(l => l.id === otherLedgerId)?.name || '';
    }

    const voucherId = uid('vch');
    const voucherNo = state.counters[counterKey];
    const voucher = {
      id: voucherId, type: isPayment ? 'payment' : 'receipt', voucherNo, date,
      accountId, partyId: counterLedgerId, partyName: counterName,
      grand: amt, narration, createdAt: Date.now(),
    };
    next.vouchers = [...next.vouchers, voucher];
    next.counters = { ...next.counters, [counterKey]: voucherNo + 1 };

    // Payment: Dr counter (expense or vendor), Cr account
    // Receipt: Dr account, Cr counter (customer or income)
    const entries = isPayment ? [
      { id: uid('le'), voucherId, ledgerId: counterLedgerId, dr: amt, cr: 0, date, narration: narration || `Payment — ${counterName}` },
      { id: uid('le'), voucherId, ledgerId: accountId,       dr: 0, cr: amt, date, narration: narration || `Payment — ${counterName}` },
    ] : [
      { id: uid('le'), voucherId, ledgerId: accountId,       dr: amt, cr: 0, date, narration: narration || `Receipt — ${counterName}` },
      { id: uid('le'), voucherId, ledgerId: counterLedgerId, dr: 0, cr: amt, date, narration: narration || `Receipt — ${counterName}` },
    ];
    next.ledgerEntries = [...next.ledgerEntries, ...entries];

    setState(next);
    setSaved(voucher);
    toast(`${isPayment ? 'Payment' : 'Receipt'} #${finalVoucherNo} saved`);
  };

  if (saved) return <VoucherSaved voucher={saved} state={state} onNew={reset} />;

  return (
    <div>
      <ScreenHeader title={isPayment ? 'Payment' : 'Receipt'} voucherNo={voucherNo} onVoucherNoChange={setVoucherNo} voucherNoError={voucherNoError} voucherDate={date} onDateChange={setDate} />

      <div className="max-w-3xl">
        <div className="grid grid-cols-2 gap-x-8 gap-y-4 mb-5">
          <div>
            <label className="smcap text-mute block mb-1">Account Type</label>
            <Picker value={accountId} onChange={(id) => setAccountId(id)} options={accountLedgers}
                    getMeta={(o) => state.groups.find(g => g.id === o.groupId)?.name} />
          </div>
          <div>
            <label className="smcap text-mute block mb-1">Amount</label>
            <input className="num w-full text-lg" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0.00" />
          </div>
        </div>

        <div className="bg-paper2/40 border border-rule rounded-sm p-4 mb-4">
          <div className="flex gap-1 mb-3 text-sm">
            <button className={`btn ${otherSide === 'PARTY' ? 'btn-primary' : 'btn-ghost'}`} onClick={() => setOtherSide('PARTY')}>
              {isPayment ? 'Pay Vendor' : 'Receive from Customer'}
            </button>
            <span className="text-mute self-center mx-1">or</span>
            <button className={`btn ${otherSide === 'OTHER' ? 'btn-primary' : 'btn-ghost'}`} onClick={() => setOtherSide('OTHER')}>
              {isPayment ? 'Direct Expense' : 'Other Income / Charge'}
            </button>
          </div>

          {otherSide === 'PARTY' ? (
            <div>
              <label className="smcap text-mute block mb-1">{isPayment ? "Vendor's Name" : 'Customer Name'}</label>
              <Picker
                value={partyId}
                onChange={(id, opt) => { setPartyId(id); if (opt) setPartyName(opt.name); }}
                onTextChange={setPartyName}
                options={parties}
                placeholder="Type to search or create…"
                allowCreate
                onCreate={(name) => {
                  const next = { ...state };
                  const l = findOrCreateParty(next, name, partyGroup);
                  setState(next); setPartyName(name);
                  return l;
                }}
                getMeta={(o) => {
                  const b = ledgerBalance(state, o.id);
                  return b.amount > 0 ? `Pending: ₹${inr(b.amount)} ${b.side === 'cr' ? 'Cr (you owe)' : 'Dr (owes you)'}` : 'No balance';
                }}
              />

              {partyBal && partyBal.amount > 0 && (
                <div className="mt-3 px-3 py-2 bg-paper border border-rule rounded-sm">
                  <div className="flex justify-between text-sm">
                    <span className="smcap text-mute">{isPayment ? 'Outstanding to vendor' : 'Outstanding from customer'}</span>
                    <span className="num font-semibold">₹ {inr(partyBal.amount)} {partyBal.side === 'cr' ? 'Cr' : 'Dr'}</span>
                  </div>
                  {pendingVouchers.length > 0 && (
                    <div className="mt-2 text-xs text-mute">
                      Recent: {pendingVouchers.map(v => `#${v.voucherNo} (${fmtDate(v.date)} ₹${inr(v.grand)})`).join(' · ')}
                    </div>
                  )}
                </div>
              )}
            </div>
          ) : (
            <div>
              <label className="smcap text-mute block mb-1">{isPayment ? 'Expense Ledger' : 'Income / Charge Ledger'}</label>
              <Picker
                value={otherLedgerId}
                onChange={(id) => setOtherLedgerId(id)}
                options={otherLedgers}
                placeholder="Select or create…"
                allowCreate
                onCreate={(name) => {
                  // FIX #4: was next.ledgers.push(l) on a shallow copy — mutated original array.
                  // useMemo for otherLedgers might not recompute; new ledger wouldn't appear.
                  const groupId = isPayment ? 'g_indirect_exp' : 'g_indirect_inc';
                  const l = { id: uid('l'), name, groupId, openingBalance: 0 };
                  setState(prev => ({ ...prev, ledgers: [...prev.ledgers, l] }));
                  return l;
                }}
                getMeta={(o) => state.groups.find(g => g.id === o.groupId)?.name}
              />
            </div>
          )}
        </div>

        <div className="mb-4">
          <label className="smcap text-mute block mb-1">Narration</label>
          <textarea value={narration} onChange={(e) => setNarration(e.target.value)} rows={2} className="w-full" placeholder="" />
        </div>

        {otherSide === 'PARTY' && partyId && (
          <BillWiseDetails
            billRefs={billRefs}
            onChange={setBillRefs}
            openBills={billwiseAgeing(state, partyId, date, isPayment ? 'vendor' : 'customer').rows}
            grandTotal={amount}
          />
        )}

        <div className="flex gap-2 justify-end mt-4">
          <button onClick={reset} className="btn btn-ghost">Clear</button>
          <button onClick={save} className="btn btn-primary">Save Voucher</button>
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// JOURNAL SCREEN
// ──────────────────────────────────────────────────────────────────────────

function JournalScreen({ state, setState, toast }) {
  const nextCounter = state.counters.journal;
  const [voucherNo, setVoucherNo] = useState(() => String(state.counters.journal));
  const [voucherNoError, setVoucherNoError] = useState('');
  const [date, setDate] = useState(todayISO());
  const [drId, setDrId] = useState('');
  const [crId, setCrId] = useState('');
  const [amount, setAmount] = useState('');
  const [narration, setNarration] = useState('');
  const [billRefs, setBillRefs] = useState([]);
  const [saved, setSaved] = useState(null);

  const reset = () => { setDrId(''); setCrId(''); setAmount(''); setNarration(''); setBillRefs([]); setSaved(null); setDate(todayISO()); setVoucherNo(String(state.counters.journal)); setVoucherNoError(''); };

  const save = () => {
    if (!drId || !crId) { toast('Select both Dr and Cr ledgers'); return; }
    if (drId === crId) { toast('Dr and Cr must differ'); return; }
    const amt = Number(amount);
    if (!amt || amt <= 0) { toast('Amount required'); return; }

    const vNo = Number(voucherNo) || nextCounter;
    const isDup = state.vouchers.some(x => x.type === 'journal' && x.voucherNo === vNo);
    if (isDup) { setVoucherNoError(`Journal #${vNo} already exists`); toast(`Journal voucher #${vNo} already exists`); return; }
    setVoucherNoError('');
    const next = { ...state };
    const voucherId = uid('vch');
    const finalVoucherNo = vNo;
    const drName = state.ledgers.find(l => l.id === drId)?.name;
    const crName = state.ledgers.find(l => l.id === crId)?.name;
    const voucher = {
      id: voucherId, type: 'journal', voucherNo: finalVoucherNo, date,
      drId, crId, drName, crName, grand: amt, narration,
      billRefs: billRefs.filter(r => r.refNo || r.amount),
      createdAt: Date.now(),
    };
    next.vouchers = [...next.vouchers, voucher];
    const newCounter = Math.max(next.counters.journal, finalVoucherNo + 1);
    next.counters = { ...next.counters, journal: newCounter };

    const entries = [
      { id: uid('le'), voucherId, ledgerId: drId, dr: amt, cr: 0, date, narration },
      { id: uid('le'), voucherId, ledgerId: crId, dr: 0, cr: amt, date, narration },
    ];
    next.ledgerEntries = [...next.ledgerEntries, ...entries];

    setState(next);
    setSaved(voucher);
    toast(`Journal #${finalVoucherNo} saved`);
  };

  if (saved) return <VoucherSaved voucher={saved} state={state} onNew={reset} />;

  return (
    <div className="max-w-3xl">
      <ScreenHeader title="Journal" voucherNo={voucherNo} onVoucherNoChange={setVoucherNo} voucherNoError={voucherNoError} voucherDate={date} onDateChange={setDate} />

      <div className="grid grid-cols-[80px_1fr_1fr] gap-x-3 gap-y-3 items-center mb-4">
        <div className="smcap text-wax">By / Dr</div>
        <Picker value={drId} onChange={setDrId} options={state.ledgers}
                getMeta={(o) => state.groups.find(g => g.id === o.groupId)?.name}
                placeholder="Debit ledger…" />
        <input className="num" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="Amount" />

        <div className="smcap text-wax">To / Cr</div>
        <Picker value={crId} onChange={setCrId} options={state.ledgers}
                getMeta={(o) => state.groups.find(g => g.id === o.groupId)?.name}
                placeholder="Credit ledger…" />
        <div className="num text-right text-mute">{amount && `₹ ${inr(Number(amount))}`}</div>
      </div>

      <div className="mb-5">
        <div className="smcap text-mute mb-1">Narration</div>
        <textarea value={narration} onChange={(e) => setNarration(e.target.value)} rows={2} className="w-full" placeholder="" />
      </div>

      <BillWiseDetails
        billRefs={billRefs}
        onChange={setBillRefs}
        openBills={[]}
        grandTotal={amount}
      />

      <div className="flex gap-2 justify-end mt-4">
        <button onClick={reset} className="btn btn-ghost">Clear</button>
        <button onClick={save} className="btn btn-primary">Save Voucher</button>
      </div>
    </div>
  );
}

function AccountsMaster({ state, setState, toast }) {
  const [editing, setEditing] = useState(null); // null | { id, name, groupId, openingBalance, contact, address }
  const [showGroupList, setShowGroupList] = useState(false);

  const groupOf = (gid) => state.groups.find(g => g.id === gid);
  const ledgersByGroup = useMemo(() => {
    const map = {};
    state.groups.forEach(g => map[g.id] = []);
    state.ledgers.forEach(l => { if (map[l.groupId]) map[l.groupId].push(l); });
    return map;
  }, [state.ledgers, state.groups]);

  const create = () => setEditing({ id: '', name: '', groupId: '', openingBalance: '', contact: '', address: '' });
  const editL = (l) => setEditing({ ...l, openingBalance: String(l.openingBalance || '') });

  const remove = (l) => {
    if (l.locked) { toast('System ledger cannot be deleted'); return; }
    const used = state.ledgerEntries.some(e => e.ledgerId === l.id) || state.vouchers.some(v => v.partyId === l.id);
    if (used) { toast('Ledger has transactions — cannot delete'); return; }
    if (!confirm(`Delete ledger "${l.name}"?`)) return;
    setState({ ...state, ledgers: state.ledgers.filter(x => x.id !== l.id) });
    toast('Ledger deleted');
  };

  const save = () => {
    if (!editing.name.trim()) { toast('Name required'); return; }
    if (!editing.groupId) { toast('Select a group'); return; }
    const nameKey = editing.name.trim().toLowerCase();
    const isDup = state.ledgers.some(l => l.id !== editing.id && l.name.trim().toLowerCase() === nameKey);
    if (isDup) { toast(`Ledger "${editing.name.trim()}" already exists`); return; }
    // FIX #4 (AccountsMaster): spread creates shallow copy — mutating next.ledgers[i] and
    // next.ledgers.push() both mutate the shared array reference.  Use immutable updates.
    if (editing.id) {
      setState(prev => ({
        ...prev,
        ledgers: prev.ledgers.map(l => l.id === editing.id
          ? { ...l, name: editing.name.trim(), groupId: editing.groupId, openingBalance: Number(editing.openingBalance) || 0, contact: editing.contact, address: editing.address }
          : l),
      }));
    } else {
      const newL = { id: uid('l'), name: editing.name.trim(), groupId: editing.groupId, openingBalance: Number(editing.openingBalance) || 0, contact: editing.contact, address: editing.address };
      setState(prev => ({ ...prev, ledgers: [...prev.ledgers, newL] }));
    }
    setEditing(null); toast('Ledger saved');
  };

  return (
    <div>
      <div className="flex gap-2 mb-4">
        <button onClick={create} className="btn btn-primary">+ Create Ledger</button>
        <button onClick={() => setShowGroupList(true)} className="btn btn-ghost">View 19 Predefined Groups</button>
      </div>

      <div className="grid grid-cols-2 gap-x-8 gap-y-2">
        {state.groups.map(g => (
          <div key={g.id} className="mb-3">
            <div className="flex items-baseline justify-between border-b border-rule pb-1 mb-1">
              <span className="smcap text-ink2">{g.name}</span>
              <span className="text-xs text-mute italic">{g.nature}</span>
            </div>
            {ledgersByGroup[g.id]?.length === 0 && <div className="text-xs text-mute italic py-1">— no ledgers —</div>}
            {ledgersByGroup[g.id]?.map(l => {
              const bal = ledgerBalance(state, l.id);
              return (
                <div key={l.id} className="group flex items-center justify-between py-1 hover:bg-paper2/40 px-1 rounded-sm">
                  <span className="text-sm flex items-center gap-2">
                    {l.name}
                    {l.locked && <span className="chip text-[10px]">system</span>}
                  </span>
                  <span className="flex items-center gap-3">
                    <span className="num text-xs text-mute">{bal.amount > 0 ? `₹${inr(bal.amount)} ${bal.side}` : '—'}</span>
                    <button onClick={() => editL(l)} className="opacity-0 group-hover:opacity-100 text-xs text-wax">Edit</button>
                    {!l.locked && <button onClick={() => remove(l)} className="opacity-0 group-hover:opacity-100 text-xs text-mute hover:text-gold">×</button>}
                  </span>
                </div>
              );
            })}
          </div>
        ))}
      </div>

      <Modal open={!!editing} onClose={() => setEditing(null)} title={editing?.id ? 'Alter Ledger' : 'Create Ledger'}
             footer={<>
               <button onClick={() => setEditing(null)} className="btn btn-ghost">Cancel</button>
               <button onClick={save} className="btn btn-primary">Save</button>
             </>}>
        {editing && (
          <div className="space-y-3">
            <div>
              <label className="smcap text-mute block mb-1">Ledger Name</label>
              <input value={editing.name} onChange={(e) => setEditing({ ...editing, name: e.target.value })} className="w-full" autoFocus />
            </div>
            <div>
              <label className="smcap text-mute block mb-1">Select Group</label>
              <select value={editing.groupId} onChange={(e) => setEditing({ ...editing, groupId: e.target.value })} className="w-full">
                <option value="">— select —</option>
                {state.groups.map(g => <option key={g.id} value={g.id}>{g.name} ({g.nature})</option>)}
              </select>
            </div>
            <div>
              <label className="smcap text-mute block mb-1">Opening Balance</label>
              <input className="num w-full" value={editing.openingBalance} onChange={(e) => setEditing({ ...editing, openingBalance: e.target.value })} placeholder="0.00" />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Contact</label>
                <input value={editing.contact || ''} onChange={(e) => setEditing({ ...editing, contact: e.target.value })} className="w-full" placeholder="Optional" />
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Address</label>
                <input value={editing.address || ''} onChange={(e) => setEditing({ ...editing, address: e.target.value })} className="w-full" placeholder="Optional" />
              </div>
            </div>
          </div>
        )}
      </Modal>

      <Modal open={showGroupList} onClose={() => setShowGroupList(false)} title="Predefined Ledger Groups">
        <table className="ledger">
          <thead><tr><th>#</th><th>Group</th><th>Nature</th></tr></thead>
          <tbody>
            {state.groups.map((g, i) => (
              <tr key={g.id}><td className="num text-mute">{i+1}</td><td>{g.name}</td><td className="text-mute italic">{g.nature}</td></tr>
            ))}
          </tbody>
        </table>
      </Modal>
    </div>
  );
}

function InventoryMaster({ state, setState, toast }) {
  const [editingItem, setEditingItem] = useState(null);
  const [editingUnit, setEditingUnit] = useState(null);
  const [editingSuper, setEditingSuper] = useState(null);
  const [editingSub, setEditingSub] = useState(null);

  const saveItem = () => {
    if (!editingItem.name.trim()) { toast('Item name required'); return; }
    const nameKey = editingItem.name.trim().toLowerCase();
    const isDup = state.items.some(x => x.id !== editingItem.id && x.name.trim().toLowerCase() === nameKey);
    if (isDup) { toast(`Item "${editingItem.name.trim()}" already exists`); return; }
    const next = { ...state };
    if (editingItem.id) {
      const i = next.items.findIndex(x => x.id === editingItem.id);
      next.items[i] = { ...next.items[i], ...editingItem, openingBalance: Number(editingItem.openingBalance) || 0 };
    } else {
      // FIX: id must come AFTER ...editingItem so the generated uid
      // is not overwritten by editingItem.id (which is '' for new items).
      next.items.push({ ...editingItem, id: uid('it'), openingBalance: Number(editingItem.openingBalance) || 0 });
    }
    setState(next); setEditingItem(null); toast('Item saved');
  };

  const removeItem = (it) => {
    const used = state.stockEntries.some(e => e.itemId === it.id);
    if (used) { toast('Item has transactions — cannot delete'); return; }
    if (!confirm(`Delete item "${it.name}"?`)) return;
    setState({ ...state, items: state.items.filter(x => x.id !== it.id) });
  };

  const saveUnit = () => {
    if (!editingUnit.name.trim()) return;
    const nameKey = editingUnit.name.trim().toLowerCase();
    const isDup = state.units.some(u => u.id !== editingUnit.id && u.name.trim().toLowerCase() === nameKey);
    if (isDup) { toast(`Unit "${editingUnit.name.trim()}" already exists`); return; }
    const next = { ...state };
    if (editingUnit.id) {
      const i = next.units.findIndex(u => u.id === editingUnit.id);
      next.units[i] = { ...next.units[i], name: editingUnit.name.trim() };
    } else {
      next.units.push({ id: uid('u'), name: editingUnit.name.trim() });
    }
    setState(next); setEditingUnit(null);
  };
  const saveSuper = () => {
    if (!editingSuper.name.trim()) return;
    const nameKey = editingSuper.name.trim().toLowerCase();
    const isDup = state.superCategories.some(s => s.id !== editingSuper.id && s.name.trim().toLowerCase() === nameKey);
    if (isDup) { toast(`Category "${editingSuper.name.trim()}" already exists`); return; }
    const next = { ...state };
    if (editingSuper.id) {
      const i = next.superCategories.findIndex(s => s.id === editingSuper.id);
      next.superCategories[i] = { ...next.superCategories[i], name: editingSuper.name.trim() };
    } else {
      next.superCategories.push({ id: uid('sc'), name: editingSuper.name.trim() });
    }
    setState(next); setEditingSuper(null);
  };
  const saveSub = () => {
    if (!editingSub.name.trim()) return;
    const nameKey = editingSub.name.trim().toLowerCase();
    const isDup = state.subCategories.some(s => s.id !== editingSub.id && s.name.trim().toLowerCase() === nameKey);
    if (isDup) { toast(`Sub-category "${editingSub.name.trim()}" already exists`); return; }
    const next = { ...state };
    if (editingSub.id) {
      const i = next.subCategories.findIndex(s => s.id === editingSub.id);
      next.subCategories[i] = { ...next.subCategories[i], name: editingSub.name.trim(), superCategoryId: editingSub.superCategoryId };
    } else {
      next.subCategories.push({ id: uid('sb'), name: editingSub.name.trim(), superCategoryId: editingSub.superCategoryId });
    }
    setState(next); setEditingSub(null);
  };

  return (
    <div className="grid grid-cols-3 gap-6">
      {/* Units */}
      <div>
        <div className="flex justify-between items-baseline mb-2">
          <h3 className="display text-lg">Units</h3>
          <button onClick={() => setEditingUnit({ id: '', name: '' })} className="text-wax text-sm">+ Create</button>
        </div>
        <div className="border border-rule rounded-sm overflow-hidden">
          {state.units.map(u => (
            <div key={u.id} className="px-3 py-2 border-b border-rule last:border-b-0 flex justify-between items-center hover:bg-paper2/40 group">
              <span className="text-sm">{u.name}</span>
              <span className="opacity-0 group-hover:opacity-100 flex gap-2">
                <button onClick={() => setEditingUnit(u)} className="text-xs text-wax">Edit</button>
                <button onClick={() => {
                  if (state.items.some(i => i.unitId === u.id)) { toast('Unit in use'); return; }
                  if (confirm('Delete?')) setState({ ...state, units: state.units.filter(x => x.id !== u.id) });
                }} className="text-xs text-mute hover:text-gold">×</button>
              </span>
            </div>
          ))}
          {state.units.length === 0 && <div className="px-3 py-4 text-center text-mute text-sm italic">No units yet</div>}
        </div>
      </div>

      {/* Super Categories */}
      <div>
        <div className="flex justify-between items-baseline mb-2">
          <h3 className="display text-lg">Super Categories</h3>
          <button onClick={() => setEditingSuper({ id: '', name: '' })} className="text-wax text-sm">+ Create</button>
        </div>
        <div className="border border-rule rounded-sm overflow-hidden">
          {state.superCategories.map(s => (
            <div key={s.id} className="px-3 py-2 border-b border-rule last:border-b-0 flex justify-between items-center hover:bg-paper2/40 group">
              <span className="text-sm">{s.name}</span>
              <span className="opacity-0 group-hover:opacity-100 flex gap-2">
                <button onClick={() => setEditingSuper(s)} className="text-xs text-wax">Edit</button>
                <button onClick={() => {
                  if (state.items.some(i => i.superCategoryId === s.id) || state.subCategories.some(sb => sb.superCategoryId === s.id)) { toast('Category in use'); return; }
                  if (confirm('Delete?')) setState({ ...state, superCategories: state.superCategories.filter(x => x.id !== s.id) });
                }} className="text-xs text-mute hover:text-gold">×</button>
              </span>
            </div>
          ))}
          {state.superCategories.length === 0 && <div className="px-3 py-4 text-center text-mute text-sm italic">None yet</div>}
        </div>
      </div>

      {/* Sub Categories */}
      <div>
        <div className="flex justify-between items-baseline mb-2">
          <h3 className="display text-lg">Sub Categories</h3>
          <button onClick={() => setEditingSub({ id: '', name: '', superCategoryId: '' })} className="text-wax text-sm">+ Create</button>
        </div>
        <div className="border border-rule rounded-sm overflow-hidden">
          {state.subCategories.map(s => {
            const sup = state.superCategories.find(x => x.id === s.superCategoryId);
            return (
              <div key={s.id} className="px-3 py-2 border-b border-rule last:border-b-0 flex justify-between items-center hover:bg-paper2/40 group">
                <span className="text-sm">{s.name} <span className="text-mute text-xs">/ {sup?.name || '—'}</span></span>
                <span className="opacity-0 group-hover:opacity-100 flex gap-2">
                  <button onClick={() => setEditingSub(s)} className="text-xs text-wax">Edit</button>
                  <button onClick={() => {
                    if (state.items.some(i => i.subCategoryId === s.id)) { toast('Sub-cat in use'); return; }
                    if (confirm('Delete?')) setState({ ...state, subCategories: state.subCategories.filter(x => x.id !== s.id) });
                  }} className="text-xs text-mute hover:text-gold">×</button>
                </span>
              </div>
            );
          })}
          {state.subCategories.length === 0 && <div className="px-3 py-4 text-center text-mute text-sm italic">None yet</div>}
        </div>
      </div>

      {/* Items */}
      <div className="col-span-3 mt-4">
        <div className="flex justify-between items-baseline mb-2">
          <h3 className="display text-xl">Items</h3>
          <button onClick={() => setEditingItem({ id: '', name: '', unitId: '', superCategoryId: '', subCategoryId: '', openingBalance: '', lastSalePrice: '', lastPurchasePrice: '' })}
                  className="btn btn-primary">+ Create Item</button>
        </div>
        <table className="ledger">
          <thead>
            <tr>
              <th>Name</th>
              <th>Unit</th>
              <th>Super Cat.</th>
              <th>Sub Cat.</th>
              <th style={{ textAlign: 'right' }}>Opening</th>
              <th style={{ textAlign: 'right' }}>Stock</th>
              <th style={{ textAlign: 'right' }}>Last Sold</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {state.items.map(it => {
              const unit = state.units.find(u => u.id === it.unitId);
              const sup = state.superCategories.find(s => s.id === it.superCategoryId);
              const sub = state.subCategories.find(s => s.id === it.subCategoryId);
              const stk = stockBalance(state, it.id);
              return (
                <tr key={it.id} className="group">
                  <td className="font-medium">{it.name}</td>
                  <td>{unit?.name || '—'}</td>
                  <td className="text-mute">{sup?.name || '—'}</td>
                  <td className="text-mute">{sub?.name || '—'}</td>
                  <td className="num text-right">{Number(it.openingBalance) || 0}</td>
                  <td className="num text-right font-semibold">{stk}</td>
                  <td className="num text-right text-mute">{it.lastSalePrice ? '₹'+inr(it.lastSalePrice) : '—'}</td>
                  <td className="text-right">
                    <button onClick={() => setEditingItem({ ...it, openingBalance: String(it.openingBalance || '') })} className="opacity-0 group-hover:opacity-100 text-wax text-xs mr-2">Edit</button>
                    <button onClick={() => removeItem(it)} className="opacity-0 group-hover:opacity-100 text-mute hover:text-gold text-xs">×</button>
                  </td>

            {state.items.length === 0 && (
              <tr><td colSpan="8" className="text-center text-mute italic py-8">No items yet — click Create Item to add your first product</td></tr>
            )}
          </tbody>
        </table>
      </div>

      {/* Modals */}
      <Modal open={!!editingUnit} onClose={() => setEditingUnit(null)} title={editingUnit?.id ? 'Alter Unit' : 'Create Unit'}
             footer={<><button onClick={() => setEditingUnit(null)} className="btn btn-ghost">Cancel</button><button onClick={saveUnit} className="btn btn-primary">Save</button></>}>
        {editingUnit && <input value={editingUnit.name} onChange={(e) => setEditingUnit({ ...editingUnit, name: e.target.value })} className="w-full" placeholder="Unit name (e.g. Kg)" autoFocus />}
      </Modal>

      <Modal open={!!editingSuper} onClose={() => setEditingSuper(null)} title={editingSuper?.id ? 'Alter Super Category' : 'Create Super Category'}
             footer={<><button onClick={() => setEditingSuper(null)} className="btn btn-ghost">Cancel</button><button onClick={saveSuper} className="btn btn-primary">Save</button></>}>
        {editingSuper && <input value={editingSuper.name} onChange={(e) => setEditingSuper({ ...editingSuper, name: e.target.value })} className="w-full" placeholder="e.g. Spare Parts" autoFocus />}
      </Modal>

      <Modal open={!!editingSub} onClose={() => setEditingSub(null)} title={editingSub?.id ? 'Alter Sub Category' : 'Create Sub Category'}
             footer={<><button onClick={() => setEditingSub(null)} className="btn btn-ghost">Cancel</button><button onClick={saveSub} className="btn btn-primary">Save</button></>}>
        {editingSub && (
          <div className="space-y-3">
            <input value={editingSub.name} onChange={(e) => setEditingSub({ ...editingSub, name: e.target.value })} className="w-full" placeholder="e.g. Bengali" autoFocus />
            <select value={editingSub.superCategoryId} onChange={(e) => setEditingSub({ ...editingSub, superCategoryId: e.target.value })} className="w-full">
              <option value="">— Super Category —</option>
              {state.superCategories.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </div>
        )}
      </Modal>

      <Modal open={!!editingItem} onClose={() => setEditingItem(null)} title={editingItem?.id ? 'Alter Item' : 'Create Item'}
             footer={<><button onClick={() => setEditingItem(null)} className="btn btn-ghost">Cancel</button><button onClick={saveItem} className="btn btn-primary">Save</button></>}>
        {editingItem && (
          <div className="space-y-3">
            <div>
              <label className="smcap text-mute block mb-1">Item Name</label>
              <input value={editingItem.name} onChange={(e) => setEditingItem({ ...editingItem, name: e.target.value })} className="w-full" autoFocus />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Unit</label>
                <select value={editingItem.unitId} onChange={(e) => setEditingItem({ ...editingItem, unitId: e.target.value })} className="w-full">
                  <option value="">— Unit —</option>
                  {state.units.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                </select>
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Opening Balance</label>
                <input className="num w-full" value={editingItem.openingBalance} onChange={(e) => setEditingItem({ ...editingItem, openingBalance: e.target.value })} placeholder="0" />
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Super Category</label>
                <select value={editingItem.superCategoryId} onChange={(e) => setEditingItem({ ...editingItem, superCategoryId: e.target.value, subCategoryId: '' })} className="w-full">
                  <option value="">— None —</option>
                  {state.superCategories.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Sub Category</label>
                <select value={editingItem.subCategoryId} onChange={(e) => setEditingItem({ ...editingItem, subCategoryId: e.target.value })} className="w-full">
                  <option value="">— None —</option>
                  {state.subCategories.filter(s => !editingItem.superCategoryId || s.superCategoryId === editingItem.superCategoryId).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Default Sale Price</label>
                <input className="num w-full" value={editingItem.lastSalePrice || ''} onChange={(e) => setEditingItem({ ...editingItem, lastSalePrice: e.target.value })} placeholder="0.00" />
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Default Purchase Price</label>
                <input className="num w-full" value={editingItem.lastPurchasePrice || ''} onChange={(e) => setEditingItem({ ...editingItem, lastPurchasePrice: e.target.value })} placeholder="0.00" />
              </div>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// REPORTS
// ──────────────────────────────────────────────────────────────────────────

// ══════════════════════════════════════════════════════════════════════════
// REPORTS — Tally-style books, registers and final accounts
//
// Organised into five sections:
//   • Books of Account  — Day Book, Cash Book, Bank Book
//   • Registers         — Sales / Purchase / Journal
//   • Statements        — Ledger (party-wise), Trial Balance
//   • Final Accounts    — Trading A/c, Profit & Loss, Balance Sheet
//   • Inventory & Analytics — Stock Summary, Item-wise Sales, Gross Profit,
//                             Receivables/Payables Ageing, Cash Flow,
//                             Vendor Analysis, Ratio Analysis
//
// Every report respects the date filter at the top.  Trading A/c, P&L and BS
// share the same period and reconcile: GP from Trading flows into P&L, NP
// from P&L flows into Capital on the BS, and Closing Stock from inventory
// appears on both Trading (Cr) and BS (Asset).
// ══════════════════════════════════════════════════════════════════════════

const REPORT_GROUPS = [
  { label: 'Books of Account', items: [
    { id: 'daybook',  name: 'Day Book' },
    { id: 'cashbook', name: 'Cash Book' },
    { id: 'bankbook', name: 'Bank Book' },
  ]},
  { label: 'Registers', items: [
    { id: 'salesreg',    name: 'Sales Register' },
    { id: 'purchasereg', name: 'Purchase Register' },
    { id: 'journalreg',  name: 'Journal Register' },
  ]},
  { label: 'Statements', items: [
    { id: 'ledger', name: 'Ledger (Party-wise)' },
    { id: 'tb',     name: 'Trial Balance' },
  ]},
  { label: 'Final Accounts', items: [
    { id: 'trading', name: 'Trading and Profit & Loss Account' },
    { id: 'bs',      name: 'Balance Sheet' },
  ]},
  { label: 'Inventory', items: [
    { id: 'stock',     name: 'Stock Summary' },
    { id: 'itemsales', name: 'Item-wise Sales' },
    { id: 'gp',        name: 'Gross Profit' },
  ]},
  { label: 'Outstanding & Analytics', items: [
    { id: 'recv',     name: 'Receivables Ageing' },
    { id: 'pay',      name: 'Payables Ageing' },
    { id: 'cf',       name: 'Cash Flow' },
    { id: 'vendor',   name: 'Vendor Analysis' },
    { id: 'ratios',   name: 'Ratio Analysis' },
  ]},
];

function ReportsScreen({ state, jumpTo, onJumpTo }) {
  const [active, setActive] = useState('daybook');
  const [from, setFrom] = useState(state.meta.fyStart || `${new Date().getFullYear()}-04-01`);
  const [to, setTo] = useState(todayISO());
  const [bsLedgerJump, setBsLedgerJump] = useState(null);

  // F8 / external jump handling
  useEffect(() => {
    if (jumpTo) { setActive(jumpTo); if (onJumpTo) onJumpTo(); }
  }, [jumpTo]);

  const setQuickRange = (key) => {
    const today = todayISO();
    const [yy, mm, dd] = today.split('-').map(Number);
    if (key === 'today') { setFrom(today); setTo(today); }
    else if (key === 'week') {
      const d = new Date(Date.UTC(yy, mm-1, dd));
      d.setUTCDate(d.getUTCDate() - 6);
      setFrom(d.toISOString().slice(0,10)); setTo(today);
    }
    else if (key === 'month') {
      setFrom(`${yy}-${String(mm).padStart(2,'0')}-01`); setTo(today);
    }
    else if (key === 'fy') {
      setFrom(state.meta.fyStart); setTo(today);
    }
  };

  return (
    <div>
      <ScreenHeader title="Reports" right={
        <div className="flex gap-3 items-center flex-wrap justify-end">
          <div className="flex gap-1">
            <button onClick={() => setQuickRange('today')} className="btn btn-ghost text-[10px] px-2 py-1">Today</button>
            <button onClick={() => setQuickRange('week')}  className="btn btn-ghost text-[10px] px-2 py-1">7D</button>
            <button onClick={() => setQuickRange('month')} className="btn btn-ghost text-[10px] px-2 py-1">MTD</button>
            <button onClick={() => setQuickRange('fy')}    className="btn btn-ghost text-[10px] px-2 py-1">FYTD</button>
          </div>
          <label className="text-sm flex items-center gap-2"><span className="smcap text-mute">From</span><input type="date" value={from} onChange={(e) => setFrom(e.target.value)} /></label>
          <label className="text-sm flex items-center gap-2"><span className="smcap text-mute">To</span><input type="date" value={to} onChange={(e) => setTo(e.target.value)} /></label>
          <button onClick={() => window.print()} className="btn btn-ghost text-xs">Print</button>
        </div>
      } />

      <div className="grid grid-cols-[230px_1fr] gap-6">
        <div className="space-y-4">
          {REPORT_GROUPS.map(grp => (
            <div key={grp.label}>
              <div className="smcap text-mute mb-1 px-2">{grp.label}</div>
              {grp.items.map(r => (
                <button key={r.id} onClick={() => setActive(r.id)}
                        className={`block w-full text-left px-3 py-1.5 text-sm border-l-2 ${active === r.id ? 'border-wax text-wax bg-paper2/60 font-semibold' : 'border-transparent text-ink2 hover:bg-paper2/40'}`}>
                  {r.name}
                </button>
              ))}
            </div>
          ))}
        </div>
        <div className="bg-paper border border-rule rounded-sm p-5 min-h-[400px]">
          {active === 'daybook'     && <DayBook        state={state} from={from} to={to} />}
          {active === 'cashbook'    && <CashBankBook   state={state} from={from} to={to} mode="cash" />}
          {active === 'bankbook'    && <CashBankBook   state={state} from={from} to={to} mode="bank" />}
          {active === 'salesreg'    && <Register       state={state} from={from} to={to} type="sales" />}
          {active === 'purchasereg' && <Register       state={state} from={from} to={to} type="purchase" />}
          {active === 'journalreg'  && <Register       state={state} from={from} to={to} type="journal" />}
          {active === 'ledger'      && <LedgerView     state={state} from={from} to={to} preselectId={bsLedgerJump} onPreselectConsumed={() => setBsLedgerJump(null)} />}
          {active === 'tb'          && <TrialBalanceView state={state} asOf={to} />}
          {active === 'trading'     && <TradingAndPL   state={state} from={from} to={to} />}
          {active === 'bs'          && <BalanceSheet   state={state} asOf={to} from={from} onLedgerClick={(lid) => { setBsLedgerJump(lid); setActive('ledger'); }} />}
          {active === 'stock'       && <StockSummary   state={state} from={from} to={to} />}
          {active === 'itemsales'   && <ItemSalesReport state={state} from={from} to={to} />}
          {active === 'gp'          && <GrossProfitReport state={state} from={from} to={to} />}
          {active === 'recv'        && <Ageing         state={state} asOf={to} type="customer" />}
          {active === 'pay'         && <Ageing         state={state} asOf={to} type="vendor" />}
          {active === 'cf'          && <CashFlow       state={state} from={from} to={to} />}
          {active === 'vendor'      && <VendorAnalysisReport state={state} from={from} to={to} />}
          {active === 'ratios'      && <RatioAnalysis  state={state} from={from} to={to} asOf={to} />}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// REPORT — Day Book (chronological list of all vouchers in range)
// ─────────────────────────────────────────────────────────────────────────

function DayBook({ state, from, to }) {
  const vouchers = state.vouchers
    .filter(v => inRange(v.date, from, to))
    .sort((a, b) => (a.date.localeCompare(b.date)) || (a.createdAt || 0) - (b.createdAt || 0));

  const totals = vouchers.reduce((s, v) => {
    s.total += Number(v.grand) || 0;
    s.byType[v.type] = (s.byType[v.type] || 0) + (Number(v.grand) || 0);
    return s;
  }, { total: 0, byType: {} });

  return (
    <div>
      <div className="flex justify-between items-baseline mb-3">
        <div>
          <h3 className="display text-2xl">Day Book</h3>
          <div className="text-xs text-mute italic">{fmtDate(from)} to {fmtDate(to)} · {vouchers.length} vouchers</div>
        </div>
        <div className="text-right text-xs text-mute">
          {Object.entries(totals.byType).map(([t, v]) =>
            <div key={t}><span className="capitalize">{t}</span>: <span className="num">₹{inr(v)}</span></div>
          )}
        </div>
      </div>
      <table className="ledger">
        <thead>
          <tr>
            <th style={{width:'12%'}}>Date</th>
            <th style={{width:'7%'}}>Time</th>
            <th style={{width:'10%'}}>Type</th>
            <th style={{width:'8%'}}>No.</th>
            <th>Particulars</th>
            <th style={{textAlign:'right', width:'15%'}}>Amount</th>
          </tr>
        </thead>
        <tbody>
          {vouchers.length === 0 && <tr><td colSpan="6" className="text-mute italic py-6 text-center">No vouchers in this range</td></tr>}
          {vouchers.map(v => {
            let particulars = v.partyName || '—';
            if (v.type === 'journal') particulars = `${v.drName || '?'} Dr / ${v.crName || '?'} Cr`;
            return (
              <tr key={v.id}>
                <td className="num text-mute">{fmtDate(v.date)}</td>
                <td className="num text-mute text-xs">{v.createdAt ? fmtTime(v.createdAt) : '—'}</td>
                <td><span className="chip text-[10px] capitalize">{v.type}</span></td>
                <td className="num">#{v.voucherNo}</td>
                <td>
                  <div>{particulars}</div>
                  {v.narration && <div className="text-xs text-mute italic truncate max-w-md">{v.narration}</div>}
                </td>
                <td className="num text-right">₹ {inr(v.grand || 0)}</td>
              </tr>
            );
          })}
        </tbody>
        {vouchers.length > 0 && (
          <tfoot>
            <tr className="font-semibold border-t-2 border-ink">
              <td colSpan="5" className="text-right">Total</td>
              <td className="num text-right">₹ {inr(totals.total)}</td>
            </tr>
          </tfoot>
        )}
      </table>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// REPORT — Cash Book / Bank Book (uses bookForLedger helper)
// ─────────────────────────────────────────────────────────────────────────

function CashBankBook({ state, from, to, mode }) {
  // mode = 'cash' or 'bank'
  const candidates = state.ledgers.filter(l => {
    if (mode === 'cash') return l.groupId === 'g_cash';
    return l.groupId === 'g_bank' || l.groupId === 'g_bank_od';
  });
  const [selectedId, setSelectedId] = useState(candidates[0]?.id || '');

  // If no cash/bank ledger exists, render a friendly prompt instead of blank.
  if (candidates.length === 0) {
    return (
      <div>
        <h3 className="display text-2xl mb-2">{mode === 'cash' ? 'Cash Book' : 'Bank Book'}</h3>
        <p className="text-mute italic text-sm py-6">
          No {mode === 'cash' ? 'cash' : 'bank'} ledger exists yet.
          {mode === 'bank' && ' Go to Masters → Accounts → Create Ledger and choose group "Bank Accounts" or "Bank O/D Accounts".'}
        </p>
      </div>
    );
  }

  const id = selectedId || candidates[0].id;
  const book = bookForLedger(state, id, from, to);
  const ledger = state.ledgers.find(l => l.id === id);

  const totalDr = book.rows.reduce((s, r) => s + (Number(r.dr) || 0), 0);
  const totalCr = book.rows.reduce((s, r) => s + (Number(r.cr) || 0), 0);

  return (
    <div>
      <div className="flex justify-between items-baseline mb-3 gap-3 flex-wrap">
        <div>
          <h3 className="display text-2xl">{mode === 'cash' ? 'Cash Book' : 'Bank Book'}</h3>
          <div className="text-xs text-mute italic">{fmtDate(from)} to {fmtDate(to)}</div>
        </div>
        {candidates.length > 1 && (
          <select value={id} onChange={e => setSelectedId(e.target.value)} className="text-sm">
            {candidates.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
          </select>
        )}
      </div>

      <div className="grid grid-cols-3 gap-3 mb-4">
        <div className="bg-paper2/50 border border-rule p-3 rounded-sm">
          <div className="smcap text-mute">Opening</div>
          <div className="num text-lg">₹ {inr(book.opening.amount)} <span className="text-xs">{book.opening.side}</span></div>
        </div>
        <div className="bg-paper2/50 border border-rule p-3 rounded-sm">
          <div className="smcap text-mute">Net Movement</div>
          <div className="num text-lg">
            <span className="text-ok">+₹ {inr(totalDr)}</span> / <span className="text-gold">−₹ {inr(totalCr)}</span>
          </div>
        </div>
        <div className="bg-paper2/50 border border-rule p-3 rounded-sm">
          <div className="smcap text-mute">Closing</div>
          <div className="num text-lg font-semibold">₹ {inr(book.closing.amount)} <span className="text-xs">{book.closing.side}</span></div>
        </div>
      </div>

      <table className="ledger">
        <thead>
          <tr>
            <th style={{width:'11%'}}>Date</th>
            <th style={{width:'9%'}}>Vch</th>
            <th>Particulars</th>
            <th style={{textAlign:'right', width:'12%'}}>Receipt (Dr)</th>
            <th style={{textAlign:'right', width:'12%'}}>Payment (Cr)</th>
            <th style={{textAlign:'right', width:'14%'}}>Balance</th>
          </tr>
        </thead>
        <tbody>
          <tr className="bg-paper2/40 italic">
            <td className="num text-mute">{fmtDate(from)}</td>
            <td>—</td>
            <td className="text-mute">Opening Balance</td>
            <td className="num text-right text-mute">{book.opening.side === 'Dr' && book.opening.amount > 0 ? '₹ ' + inr(book.opening.amount) : ''}</td>
            <td className="num text-right text-mute">{book.opening.side === 'Cr' && book.opening.amount > 0 ? '₹ ' + inr(book.opening.amount) : ''}</td>
            <td className="num text-right">₹ {inr(book.opening.amount)} {book.opening.side}</td>
          </tr>
          {book.rows.length === 0 && <tr><td colSpan="6" className="text-mute italic py-6 text-center">No movement in this range</td></tr>}
          {book.rows.map(r => (
            <tr key={r.id}>
              <td className="num text-mute">{fmtDate(r.date)}</td>
              <td className="text-xs">{r.voucher ? `${r.voucher.type[0].toUpperCase()}#${r.voucher.voucherNo}` : '—'}</td>
              <td>
                <div>{r.particulars}</div>
                {r.narration && <div className="text-xs text-mute italic">{r.narration}</div>}
              </td>
              <td className="num text-right text-ok">{r.dr > 0 ? '₹ ' + inr(r.dr) : ''}</td>
              <td className="num text-right text-gold">{r.cr > 0 ? '₹ ' + inr(r.cr) : ''}</td>
              <td className="num text-right">₹ {inr(Math.abs(r.runningNet))} {r.runningNet >= 0 ? 'Dr' : 'Cr'}</td>
            </tr>
          ))}
        </tbody>
        {book.rows.length > 0 && (
          <tfoot>
            <tr className="font-semibold border-t-2 border-ink">
              <td colSpan="3" className="text-right">Closing</td>
              <td className="num text-right">₹ {inr(totalDr)}</td>
              <td className="num text-right">₹ {inr(totalCr)}</td>
              <td className="num text-right">₹ {inr(book.closing.amount)} {book.closing.side}</td>
            </tr>
          </tfoot>
        )}
      </table>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// REPORT — Voucher Register (Sales / Purchase / Journal)
// ─────────────────────────────────────────────────────────────────────────

function Register({ state, from, to, type }) {
  const list = state.vouchers
    .filter(v => v.type === type && inRange(v.date, from, to))
    .sort((a, b) => (a.date.localeCompare(b.date)) || (a.voucherNo - b.voucherNo));

  const total = list.reduce((s, v) => s + (Number(v.grand) || 0), 0);
  const titleMap = { sales: 'Sales Register', purchase: 'Purchase Register', journal: 'Journal Register' };

  // Daily chart for sales/purchase
  const showChart = type !== 'journal' && ChartsAvailable && list.length > 0;
  const chartData = (() => {
    if (!showChart) return [];
    const byDay = {};
    list.forEach(v => { byDay[v.date] = (byDay[v.date] || 0) + (Number(v.grand) || 0); });
    return Object.keys(byDay).sort().map(d => ({ date: d.slice(5), amount: byDay[d] }));
  })();

  return (
    <div>
      <div className="flex justify-between items-baseline mb-3">
        <div>
          <h3 className="display text-2xl">{titleMap[type]}</h3>
          <div className="text-xs text-mute italic">{fmtDate(from)} to {fmtDate(to)} · {list.length} entries</div>
        </div>
        <div className="text-right">
          <div className="smcap text-mute">Total</div>
          <div className="num text-2xl font-semibold">₹ {inr(total)}</div>
        </div>
      </div>
      {showChart && (
        <div className="h-40 mb-5">
          <ResponsiveContainer>
            <BarChart data={chartData}>
              <CartesianGrid strokeDasharray="2 4" stroke="#c2b791" />
              <XAxis dataKey="date" tick={{ fontSize: 10, fill: '#7a7464' }} />
              <YAxis tick={{ fontSize: 10, fill: '#7a7464' }} />
              <Tooltip contentStyle={{ background: '#f5efe1', border: '1px solid #c2b791', borderRadius: 2, fontSize: 12 }} formatter={(v) => '₹ ' + inr(v)} />
              <Bar dataKey="amount" fill={type === 'sales' ? '#1b6e84' : '#c8252c'} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      )}
      <table className="ledger">
        <thead>
          <tr>
            <th style={{width:'11%'}}>Date</th>
            <th style={{width:'8%'}}>No.</th>
            {type !== 'journal' && <th>Party</th>}
            {type === 'journal' && <th>Debit Ledger</th>}
            {type === 'journal' && <th>Credit Ledger</th>}
            <th>Narration</th>
            <th style={{textAlign:'right', width:'14%'}}>Amount</th>
          </tr>
        </thead>
        <tbody>
          {list.length === 0 && <tr><td colSpan={type === 'journal' ? 5 : 4} className="text-mute italic py-6 text-center">No {type} vouchers in this range</td></tr>}
          {list.map(v => (
            <tr key={v.id}>
              <td className="num text-mute">{fmtDate(v.date)}</td>
              <td className="num">#{v.voucherNo}</td>
              {type !== 'journal' && <td>{v.partyName || '—'}</td>}
              {type === 'journal' && <td>{v.drName || '?'}</td>}
              {type === 'journal' && <td>{v.crName || '?'}</td>}
              <td className="text-sm text-ink2 truncate max-w-md">{v.narration || ''}</td>
              <td className="num text-right">₹ {inr(v.grand || 0)}</td>
            </tr>
          ))}
        </tbody>
        {list.length > 0 && (
          <tfoot>
            <tr className="font-semibold border-t-2 border-ink">
              <td colSpan={type === 'journal' ? 4 : 3} className="text-right">Total</td>
              <td className="num text-right">₹ {inr(total)}</td>
            </tr>
          </tfoot>
        )}
      </table>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// REPORT — Ledger view (party-wise / any-ledger drill-down with running bal)
// ─────────────────────────────────────────────────────────────────────────

function LedgerView({ state, from, to, preselectId, onPreselectConsumed }) {
  const [ledgerId, setLedgerId] = useState(preselectId || '');
  // Sort ledgers by group order then name for the picker
  const ledgersSorted = useMemo(() => {
    const groupOrder = id => state.groups.find(g => g.id === id)?.order || 99;
    return [...state.ledgers].sort((a, b) =>
      groupOrder(a.groupId) - groupOrder(b.groupId) || a.name.localeCompare(b.name));
  }, [state.ledgers, state.groups]);

  // Handle external navigation from Balance Sheet
  useEffect(() => {
    if (preselectId) {
      setLedgerId(preselectId);
      if (onPreselectConsumed) onPreselectConsumed();
    }
  }, [preselectId]);

  if (!ledgerId && ledgersSorted.length > 0) {
    // Auto-select cash by default
    const cash = ledgersSorted.find(l => l.id === 'l_cash') || ledgersSorted[0];
    if (cash) setTimeout(() => setLedgerId(cash.id), 0);
  }

  const ledger = state.ledgers.find(l => l.id === ledgerId);
  const stmt = ledger ? ledgerStatement(state, ledgerId, from, to) : null;
  const grp = ledger ? state.groups.find(g => g.id === ledger.groupId) : null;

  return (
    <div>
      <div className="flex justify-between items-baseline mb-3 gap-3 flex-wrap">
        <div>
          <h3 className="display text-2xl">Ledger Statement</h3>
          <div className="text-xs text-mute italic">{fmtDate(from)} to {fmtDate(to)}</div>
        </div>
        <div className="min-w-[260px]">
          <Picker
            value={ledgerId}
            onChange={(id) => setLedgerId(id)}
            options={ledgersSorted}
            placeholder="Pick a ledger…"
            getMeta={(o) => state.groups.find(g => g.id === o.groupId)?.name}
          />
        </div>
      </div>

      {!ledger && <p className="text-mute italic text-sm py-6">Select a ledger to view its statement.</p>}

      {ledger && stmt && (
        <>

function TradingAccount({ state, from, to, embedded }) {
  const t = tradingAccountFigures(state, from, to);
  // Direct expense / income breakdown by ledger
  const directExpByLedger = {};
  const directIncByLedger = {};
  state.ledgerEntries.forEach(e => {
    if (!inRange(e.date, from, to)) return;
    const l = state.ledgers.find(x => x.id === e.ledgerId);
    if (!l) return;
    const g = state.groups.find(x => x.id === l.groupId);
    if (!g) return;
    const drAmt = Number(e.dr) || 0, crAmt = Number(e.cr) || 0;
    if (g.id === 'g_direct_exp') {
      if (!directExpByLedger[l.id]) directExpByLedger[l.id] = { name: l.name, amount: 0 };
      directExpByLedger[l.id].amount += (drAmt - crAmt);
    } else if (g.id === 'g_direct_inc') {
      if (!directIncByLedger[l.id]) directIncByLedger[l.id] = { name: l.name, amount: 0 };
      directIncByLedger[l.id].amount += (crAmt - drAmt);
    }
  });

  const drSide = t.openingStock + t.purchases + t.directExp + Math.max(t.grossProfit, 0);
  const crSide = t.sales + t.closingStock + t.directInc + Math.max(-t.grossProfit, 0);

  return (
    <div>
      {!embedded && (
      <div className="flex justify-between items-baseline mb-3">
        <div>
          <h3 className="display text-2xl">Trading Account</h3>
          <div className="text-xs text-mute italic">{fmtDate(from)} to {fmtDate(to)}</div>
        </div>
        <div className="text-right">
          <div className="smcap text-mute">Gross {t.grossProfit >= 0 ? 'Profit' : 'Loss'}</div>
          <div className={`num text-2xl font-semibold ${t.grossProfit >= 0 ? 'text-ok' : 'text-gold'}`}>₹ {inr(Math.abs(t.grossProfit))}</div>
        </div>
      </div>
      )}
      {embedded && (
      <div className="flex justify-between items-baseline mb-3">
        <h4 className="display text-xl font-semibold">Trading Account</h4>
        <div className="text-right">
          <div className="smcap text-mute">Gross {t.grossProfit >= 0 ? 'Profit' : 'Loss'}</div>
          <div className={`num text-xl font-semibold ${t.grossProfit >= 0 ? 'text-ok' : 'text-gold'}`}>₹ {inr(Math.abs(t.grossProfit))}</div>
        </div>
      </div>
      )}
      <div className="grid grid-cols-2 gap-6">
        <div>
          <h4 className="smcap text-wax mb-2 border-b border-rule pb-1">Dr — Cost Side</h4>
          <TradingRow label="To Opening Stock" amount={t.openingStock} />
          <TradingRow label="To Purchases" amount={t.purchases} />
          {Object.values(directExpByLedger).filter(l => Math.abs(l.amount) > 0.005).length > 0 && (
            <>
              <div className="smcap text-mute mt-2">To Direct Expenses</div>
              {Object.values(directExpByLedger).filter(l => Math.abs(l.amount) > 0.005).map((l, i) => (
                <TradingRow key={i} label={l.name} amount={l.amount} indent />
              ))}
              <TradingRow label="Subtotal — Direct Expenses" amount={t.directExp} bold />
            </>
          )}
          {t.grossProfit > 0 && <TradingRow label="To Gross Profit c/d" amount={t.grossProfit} highlight />}
          <div className="flex justify-between border-t-2 border-ink pt-2 mt-3 font-semibold">
            <span className="display">Total</span><span className="num">₹ {inr(drSide)}</span>
          </div>
        </div>
        <div>
          <h4 className="smcap text-wax mb-2 border-b border-rule pb-1">Cr — Revenue Side</h4>
          <TradingRow label="By Sales" amount={t.sales} />
          <TradingRow label="By Closing Stock" amount={t.closingStock} note="from inventory" />
          {Object.values(directIncByLedger).filter(l => Math.abs(l.amount) > 0.005).length > 0 && (
            <>
              <div className="smcap text-mute mt-2">By Direct Incomes</div>
              {Object.values(directIncByLedger).filter(l => Math.abs(l.amount) > 0.005).map((l, i) => (
                <TradingRow key={i} label={l.name} amount={l.amount} indent />
              ))}
              <TradingRow label="Subtotal — Direct Incomes" amount={t.directInc} bold />
            </>
          )}
          {t.grossProfit < 0 && <TradingRow label="By Gross Loss c/d" amount={-t.grossProfit} highlight />}
          <div className="flex justify-between border-t-2 border-ink pt-2 mt-3 font-semibold">
            <span className="display">Total</span><span className="num">₹ {inr(crSide)}</span>
          </div>
        </div>
      </div>
      <div className="text-xs text-mute italic mt-3 px-2">
        Closing Stock is auto-valued at Weighted Average Cost from the inventory module.
        Gross {t.grossProfit >= 0 ? 'Profit' : 'Loss'} carries down to the Profit & Loss Account.
      </div>
    </div>
  );
}
